  const commanderTax = pState.commanderCasts > 0 ? pState.commanderCasts * 2 : 0;
  const cmdZone = pState.commanderZone;
  const variant = activeVariant || 'standard';

  let html = `<div class="turn-hq">`;

  // Header with back button (if focused)
  html += `<div class="turn-hq-header">`;
  if (turnHQFocus && turnHQFocus !== seatOrder[currentTurnIdx]) {
    html += `<button class="turn-hq-back" onclick="defocusTurnHQ()">← ${seatOrder && seatOrder[currentTurnIdx] ? esc(DATA.pod.players.find(p => p.id === seatOrder[currentTurnIdx])?.name || 'Player') : 'Game'}</button>`;
  }
  html += `<div class="turn-hq-label">TURN HQ</div>`;
  html += `</div>`;

  // Archenemy role badge + hero tabs
  if (variant === 'archenemy' && aeVillain) {
    const isVillain = pid === aeVillain;
    const heroIds = activePod.filter(id => id !== aeVillain && !(gameState?.players[id]?.isDead));
    const isHeroesTurn = timerRunning && !gamePaused && seatOrder && currentTurnIdx >= 0 && seatOrder[currentTurnIdx] !== aeVillain;
    html += `<div style="text-align:center;padding:4px 0;font-size:11px;color:${isVillain ? '#E88' : 'var(--blue)'}">${isVillain ? '😈 Archenemy' : '🛡 Hero'}</div>`;
    // Hero avatar tabs — shown during heroes' shared turn so you can switch between heroes
    if (isHeroesTurn && heroIds.length > 1) {
      html += `<div style="display:flex;gap:4px;justify-content:center;padding:2px 4px 6px;flex-wrap:wrap">`;
      heroIds.forEach(hid => {
        const hp = DATA.pod.players.find(p => p.id === hid);
        const hc = OWNER_COLORS[hid] || '#888';
        const hSelId = matchupSelections[hid];
        const hDeck = hSelId ? DATA.decks.decks.find(d => d.id === hSelId) : null;
        const hArt = hDeck?.commanderArt || '';
        const isFocused = pid === hid;
        html += `<div onclick="turnHQFocus='${hid}';renderAll()" style="cursor:pointer;display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;border:1px solid ${isFocused ? hc : 'var(--border)'};background:${isFocused ? hc+'22' : 'var(--surface)'};transition:all 0.2s">`;
        if (hArt) {
          html += `<img src="${hArt}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;border:1px solid ${hc}55">`;
        } else {
          html += `<div style="width:20px;height:20px;border-radius:50%;background:${hc}33;border:1px solid ${hc}55"></div>`;
        }
        html += `<span style="font-size:11px;font-weight:${isFocused?'700':'400'};color:${isFocused?hc:'var(--text-dim)'}">${esc(hp?.name||hid)}</span>`;
        html += `</div>`;
      });
      html += `</div>`;
    }
  }

  // ---- 2HG MERGED DUAL-COMMANDER VIEW ----
  if (variant === '2hg' && teamData) {
    const ti = teamData.playerTeam[pid];
    if (ti !== undefined) {
      const team = teamData.teams[ti];
      const tc = TEAM_COLORS[ti % TEAM_COLORS.length];
      const tcHex = TEAM_COLOR_HEX[ti % TEAM_COLOR_HEX.length];

      // Team header
      html += `<div style="text-align:center;padding:4px 0">
        <div style="font-size:11px;color:${tc};text-transform:uppercase;letter-spacing:2px;font-family:Cinzel,serif;font-weight:700">👥 Team ${ti + 1}</div>
      </div>`;

      // Dual commander art — side by side
      html += `<div style="display:flex;gap:4px;margin-bottom:4px">`;
      team.members.forEach(mid => {
        const mp = DATA.pod.players.find(x => x.id === mid);
        const mc = OWNER_COLORS[mid] || '#888';
        const mSelId = matchupSelections[mid];
        const mDeck = mSelId ? DATA.decks.decks.find(d => d.id === mSelId) : null;
        const mArt = mDeck?.commanderArt || '';
        const mColors = mDeck ? (mDeck.colors||[]).map(c => COLOR_MAP[c]||c).filter(Boolean) : [];
        const isFocused = turnHQFocus === mid;
        html += `<div onclick="turnHQFocus='${mid}';renderAll()" style="flex:1;cursor:pointer;border-radius:var(--radius-sm);overflow:hidden;border:2px solid ${isFocused ? mc : 'transparent'};transition:border 0.2s">
          <div style="height:80px;background:${mArt ? `url('${mArt}') center/cover` : `linear-gradient(135deg,${mc}33,#111)`};position:relative">
            <div style="position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(transparent,rgba(0,0,0,0.85))">
              <div style="font-size:12px;font-weight:700;color:${mc};text-shadow:0 1px 3px #000">${esc(mp?.name || mid)}</div>
              <div style="font-size:9px;color:var(--text-dim)">${mDeck ? esc(mDeck.name) : '—'}</div>
            </div>
          </div>
          <div style="display:flex;gap:2px;justify-content:center;padding:3px;background:rgba(0,0,0,0.5)">${manaPips(mColors, 14)}</div>
        </div>`;
      });
      html += `</div>`;

      // Shared team life — one counter
      html += `<div style="font-size:9px;color:var(--text-dim);text-align:center;margin-bottom:-2px">Team Life</div>`;
      html += `<div class="turn-hq-life">
        <button class="life-btn minus" onclick="adjustLife('${pid}', -5)">−5</button>
        <button class="life-btn minus" onclick="adjustLife('${pid}', -1)">−</button>
        <div class="turn-hq-life-num">${pState.life}</div>
        <button class="life-btn plus" onclick="adjustLife('${pid}', 1)">+</button>
        <button class="life-btn plus" onclick="adjustLife('${pid}', 5)">+5</button>
      </div>`;

      // Per-player commander zones and cast buttons
      html += `<div style="display:flex;flex-direction:column;gap:6px">`;
      team.members.forEach(mid => {
        const mp = DATA.pod.players.find(x => x.id === mid);
        const mc = OWNER_COLORS[mid] || '#888';
        const mSelId = matchupSelections[mid];
        const mDeck = mSelId ? DATA.decks.decks.find(d => d.id === mSelId) : null;
        const mState = gameState.players[mid];
        if (!mState) return;
        const mCmdZone = mState.commanderZone;
        const mTax = mState.commanderCasts > 0 ? mState.commanderCasts * 2 : 0;
        const mManaCost = mDeck?.commanderManaCost || null;
        const mCastCount = mState.commanderCasts > 0 ? `×${mState.commanderCasts}` : '';
        const mTaxLabel = mTax > 0 ? `<span class="cast-tax">+${manaImg(String(mTax), 14)} TAX</span>` : '';
        const mColors = mDeck ? (mDeck.colors||[]).map(c => COLOR_MAP[c]||c).filter(Boolean) : [];

        html += `<div style="padding:6px 8px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.03);border:1px solid ${mc}22">
          <div style="font-size:11px;font-weight:600;color:${mc};margin-bottom:3px">${esc(mp?.name || mid)} — ${mDeck ? esc(mDeck.commander || mDeck.name) : '—'}</div>
          <div class="turn-hq-zone" style="margin-bottom:3px">
            <div class="zone-label">Zone:</div>
            <button class="zone-btn ${mCmdZone === 'commandZone' ? 'active' : ''}" onclick="moveCommanderZone('${mid}', 'commandZone')">Cmd</button>
            <button class="zone-btn ${mCmdZone === 'battlefield' ? 'active' : ''}" onclick="moveCommanderZone('${mid}', 'battlefield')">Field</button>
            <button class="zone-btn ${mCmdZone === 'graveyard' ? 'active' : ''}" onclick="moveCommanderZone('${mid}', 'graveyard')">Grave</button>
            <button class="zone-btn ${mCmdZone === 'exile' ? 'active' : ''}" onclick="moveCommanderZone('${mid}', 'exile')">Exile</button>
          </div>`;
        if (mManaCost) {
          html += `<button class="turn-hq-cast-btn" onclick="castCommander('${mid}')" style="padding:4px 8px;font-size:11px">
            <span class="cast-label">⚔ Cast ${mCastCount}</span>
            <span class="cast-cost">${renderManaCost(mManaCost, 16)}</span>
            ${mTaxLabel}
          </button>`;
        } else {
          html += `<button class="turn-hq-cast-btn" onclick="castCommander('${mid}')" style="padding:4px 8px;font-size:11px">
            <span class="cast-label">⚔ Cast Commander ${mCastCount}</span>
            ${manaPips(mColors, 14)}
            ${mTaxLabel}
          </button>`;
        }
        html += `</div>`;
      });
      html += `</div>`;

      // Status badges — one set per player
      html += `<div style="display:flex;gap:8px">`;
      team.members.forEach(mid => {
        const mc = OWNER_COLORS[mid] || '#888';
        const mState = gameState.players[mid];
        if (!mState) return;
        html += `<div style="flex:1">
          <div style="font-size:9px;color:${mc};text-align:center;margin-bottom:2px">${esc(DATA.pod.players.find(x=>x.id===mid)?.name||mid)}</div>
          <div class="turn-hq-statuses" style="flex-wrap:wrap;justify-content:center">
            <button class="status-badge ${gameState.globals.monarchId === mid ? 'active' : ''}" onclick="setMonarch('${mid}')" title="Monarch" style="font-size:10px;padding:2px 6px">👑</button>
            <button class="status-badge ${gameState.globals.initiativeId === mid ? 'active' : ''}" onclick="setInitiative('${mid}')" title="Initiative" style="font-size:10px;padding:2px 6px">🏰</button>
            <button class="status-badge ${mState.hasCityBlessing ? 'active' : ''}" onclick="toggleCityBlessing('${mid}')" title="City's Blessing" style="font-size:10px;padding:2px 6px">🏙</button>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
  }
  // ---- STANDARD / OTHER VARIANTS: single/partner commander view ----
  else {
    const hasPartnerCmd = deck && deck.commanderPartner && deck.commanderPartnerArt;

    // Commander art — split for partners
    if (hasPartnerCmd) {
      html += `<div class="turn-hq-commander" style="background:none;display:flex;overflow:hidden">
        <div style="flex:1;background:url('${artUrl}') center/cover;position:relative">
          <div style="position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(transparent,rgba(0,0,0,0.85))">
            <div style="font-size:11px;font-weight:700;color:var(--text);text-shadow:0 1px 3px #000">${deck ? esc(deck.commander) : ''}</div>
          </div>
        </div>
        <div style="width:1px;background:rgba(0,0,0,0.6);z-index:1"></div>
        <div style="flex:1;background:url('${deck.commanderPartnerArt}') center/cover;position:relative">
          <div style="position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(transparent,rgba(0,0,0,0.85))">
            <div style="font-size:11px;font-weight:700;color:var(--text);text-shadow:0 1px 3px #000">${esc(deck.commanderPartner)}</div>
          </div>
        </div>
      </div>`;
      html += `<div style="text-align:center;font-size:10px;color:var(--text-dim);margin:-2px 0 4px">Partner Commanders</div>`;
    } else {
      html += `<div class="turn-hq-commander" style="background-image:url('${artUrl}')">
        <div class="turn-hq-commander-info">
          <div class="turn-hq-commander-name">${deck ? esc(deck.commander || deck.name) : '—'}</div>
          <div class="turn-hq-deck-name">${deck ? esc(deck.name) : 'No deck'}</div>
          <div style="margin-top:3px">${manaPips(colors, 16)}</div>
        </div>
      </div>`;
    }

    // Life total
    html += `<div class="turn-hq-life">
      <button class="life-btn minus" onclick="adjustLife('${pid}', -5)">−5</button>
      <button class="life-btn minus" onclick="adjustLife('${pid}', -1)">−</button>
      <div class="turn-hq-life-num">${pState.life}</div>
      <button class="life-btn plus" onclick="adjustLife('${pid}', 1)">+</button>
      <button class="life-btn plus" onclick="adjustLife('${pid}', 5)">+5</button>
    </div>`;

    // Full card art — show both for partners
    if (hasPartnerCmd) {
      const fullCardUrl1 = artUrl.replace('/art_crop/', '/normal/');
      const fullCardUrl2 = deck.commanderPartnerArt.replace('/art_crop/', '/normal/');
      html += `<div style="display:flex;gap:4px">
        <img class="turn-hq-card-art" style="flex:1;max-width:48%" src="${fullCardUrl1}" alt="${esc(deck.commander)}" onerror="this.style.display='none'">
        <img class="turn-hq-card-art" style="flex:1;max-width:48%" src="${fullCardUrl2}" alt="${esc(deck.commanderPartner)}" onerror="this.style.display='none'">
      </div>`;
    } else if (hasArt) {
      const fullCardUrl = artUrl.replace('/art_crop/', '/normal/');
      html += `<img class="turn-hq-card-art" src="${fullCardUrl}" alt="${deck ? esc(deck.commander) : 'Commander'}" onerror="this.style.display='none'">`;
    }

    // Commander zone + cast — primary commander
    html += `<div style="display:flex;flex-direction:column;gap:4px">`;
    if (hasPartnerCmd) html += `<div style="font-size:10px;color:var(--text-dim);letter-spacing:1px">${esc(deck.commander)}</div>`;
    html += `<div class="turn-hq-zone">
      <div class="zone-label">Zone:</div>
      <button class="zone-btn ${cmdZone === 'commandZone' ? 'active' : ''}" onclick="moveCommanderZone('${pid}', 'commandZone')">Cmd</button>
      <button class="zone-btn ${cmdZone === 'battlefield' ? 'active' : ''}" onclick="moveCommanderZone('${pid}', 'battlefield')">Field</button>
      <button class="zone-btn ${cmdZone === 'graveyard' ? 'active' : ''}" onclick="moveCommanderZone('${pid}', 'graveyard')">Grave</button>
      <button class="zone-btn ${cmdZone === 'exile' ? 'active' : ''}" onclick="moveCommanderZone('${pid}', 'exile')">Exile</button>
    </div>`;
    // Cast Commander button with mana cost symbols
    const manaCostStr = deck?.commanderManaCost || null;
    const castCountLabel = pState.commanderCasts > 0 ? `×${pState.commanderCasts}` : '';
    const taxLabel = commanderTax > 0 ? `<span class="cast-tax">+${manaImg(String(commanderTax), 18)} TAX</span>` : '';
    if (manaCostStr) {
      html += `<button class="turn-hq-cast-btn" onclick="castCommander('${pid}')">
        <span class="cast-label">⚔ Cast ${castCountLabel}</span>
        <span class="cast-cost">${renderManaCost(manaCostStr, 22)}</span>
        ${taxLabel}
      </button>`;
    } else {
      html += `<button class="turn-hq-cast-btn" onclick="castCommander('${pid}')">
        <span class="cast-label">⚔ Cast Commander ${castCountLabel}</span>
        ${manaPips(colors, 18)}
        ${taxLabel}
      </button>`;
    }
    html += `</div>`;

    // Partner commander zone + cast (separate tracking)
    if (hasPartnerCmd) {
      const partnerZone = pState.partnerZone || 'commandZone';
      const partnerCasts = pState.partnerCasts || 0;
      const partnerTax = partnerCasts > 0 ? partnerCasts * 2 : 0;
      const partnerManaCost = deck.commanderPartnerManaCost || null;
      const partnerCastLabel = partnerCasts > 0 ? `×${partnerCasts}` : '';
      const partnerTaxLabel = partnerTax > 0 ? `<span class="cast-tax">+${manaImg(String(partnerTax), 18)} TAX</span>` : '';
      html += `<div style="display:flex;flex-direction:column;gap:4px;margin-top:4px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.06)">`;
      html += `<div style="font-size:10px;color:var(--text-dim);letter-spacing:1px">${esc(deck.commanderPartner)}</div>`;
      html += `<div class="turn-hq-zone">
        <div class="zone-label">Zone:</div>
        <button class="zone-btn ${partnerZone === 'commandZone' ? 'active' : ''}" onclick="movePartnerZone('${pid}', 'commandZone')">Cmd</button>
        <button class="zone-btn ${partnerZone === 'battlefield' ? 'active' : ''}" onclick="movePartnerZone('${pid}', 'battlefield')">Field</button>
        <button class="zone-btn ${partnerZone === 'graveyard' ? 'active' : ''}" onclick="movePartnerZone('${pid}', 'graveyard')">Grave</button>
        <button class="zone-btn ${partnerZone === 'exile' ? 'active' : ''}" onclick="movePartnerZone('${pid}', 'exile')">Exile</button>
      </div>`;
      if (partnerManaCost) {
        html += `<button class="turn-hq-cast-btn" onclick="castPartner('${pid}')">
          <span class="cast-label">⚔ Cast ${partnerCastLabel}</span>
          <span class="cast-cost">${renderManaCost(partnerManaCost, 22)}</span>
          ${partnerTaxLabel}
        </button>`;
      } else {
        html += `<button class="turn-hq-cast-btn" onclick="castPartner('${pid}')">
          <span class="cast-label">⚔ Cast Partner ${partnerCastLabel}</span>
          ${partnerTaxLabel}
        </button>`;
      }
      html += `</div>`;
    }

    // Status badges
    html += `<div class="turn-hq-statuses">
      <button class="status-badge ${gameState.globals.monarchId === pid ? 'active' : ''}" onclick="setMonarch('${pid}')" title="Monarch">👑 Monarch</button>
      <button class="status-badge ${gameState.globals.initiativeId === pid ? 'active' : ''}" onclick="setInitiative('${pid}')" title="Initiative">🏰 Initiative</button>
      <button class="status-badge ${pState.hasCityBlessing ? 'active' : ''}" onclick="toggleCityBlessing('${pid}')" title="City's Blessing">🏙 Blessing</button>
    </div>`;
  }

  // Counters
  html += `<div class="turn-hq-counters">`;
  // Active counters — show full row with controls
  if (pState.poison > 0) {
    html += `<div class="counter-row poison">
      <div class="counter-label">☠ Poison</div>
      <div class="counter-controls">
        <button class="counter-btn" onclick="adjustPoison('${pid}', -1)">−</button>
        <div class="counter-num" style="color:${pState.poison >= 10 ? '#ff2222' : 'var(--text)'}">${pState.poison}</div>
        <button class="counter-btn" onclick="adjustPoison('${pid}', 1)">+</button>
        <button class="counter-clear" onclick="clearCounter('${pid}','poison')" title="Clear all poison">×</button>
      </div>
    </div>`;
  }
  if (pState.energy > 0) {
    html += `<div class="counter-row energy">
      <div class="counter-label">⚡ Energy</div>
      <div class="counter-controls">
        <button class="counter-btn" onclick="adjustEnergy('${pid}', -1)">−</button>
        <div class="counter-num">${pState.energy}</div>
        <button class="counter-btn" onclick="adjustEnergy('${pid}', 1)">+</button>
        <button class="counter-clear" onclick="clearCounter('${pid}','energy')" title="Clear all energy">×</button>
      </div>
    </div>`;
  }
  if (pState.experience > 0) {
    html += `<div class="counter-row experience">
      <div class="counter-label">✦ Experience</div>
      <div class="counter-controls">
        <button class="counter-btn" onclick="adjustExperience('${pid}', -1)">−</button>
        <div class="counter-num">${pState.experience}</div>
        <button class="counter-btn" onclick="adjustExperience('${pid}', 1)">+</button>
        <button class="counter-clear" onclick="clearCounter('${pid}','experience')" title="Clear all experience">×</button>
      </div>
    </div>`;
  }
  if (pState.rad > 0) {
    html += `<div class="counter-row rad">
      <div class="counter-label">☢ Rad</div>
      <div class="counter-controls">
        <button class="counter-btn" onclick="adjustRad('${pid}', -1)">−</button>
        <div class="counter-num">${pState.rad}</div>
        <button class="counter-btn" onclick="adjustRad('${pid}', 1)">+</button>
        <button class="counter-clear" onclick="clearCounter('${pid}','rad')" title="Clear all rad">×</button>
      </div>
    </div>`;
  }
  // Add-counter buttons — big icons with tooltips, always visible for types at 0
  const addBtns = [];
  if (pState.poison === 0) addBtns.push(`<button class="counter-add-btn poison-add" data-tooltip="Poison Counter" onclick="adjustPoison('${pid}', 1)">☠</button>`);
  if (pState.energy === 0) addBtns.push(`<button class="counter-add-btn energy-add" data-tooltip="Energy Counter" onclick="adjustEnergy('${pid}', 1)">⚡</button>`);
  if (pState.experience === 0) addBtns.push(`<button class="counter-add-btn experience-add" data-tooltip="Experience Counter" onclick="adjustExperience('${pid}', 1)">✦</button>`);
  if (pState.rad === 0) addBtns.push(`<button class="counter-add-btn rad-add" data-tooltip="Rad Counter" onclick="adjustRad('${pid}', 1)">☢</button>`);
  if (addBtns.length > 0) {
    html += `<div style="display:flex;gap:6px;padding-bottom:6px">${addBtns.join('')}</div>`;
  }
  html += `</div>`;

  // Damage stats — dealt and taken
  if (pState.damageDealt > 0 || pState.damageTaken > 0) {
    html += `<div class="turn-hq-damage-stats">
      <div class="dmg-stat dealt"><span class="dmg-label">Dealt</span><span class="dmg-val">${pState.damageDealt}</span></div>
      <div class="dmg-stat taken"><span class="dmg-label">Taken</span><span class="dmg-val">${pState.damageTaken}</span></div>
    </div>`;
  }

  // Commander damage DEALT — "my commander hit them for X"
  // Shows all opponents and how much THIS player's commander has dealt to each
  const opponents = activePod.filter(oid => oid !== pid);
  if (opponents.length > 0) {
    html += `<div class="turn-hq-cmdr-dmg">`;
    html += `<div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Commander Damage Dealt</div>`;
    opponents.forEach(oid => {
      const targetState = gameState.players[oid];
      if (!targetState) return;
      const dmg = targetState.commanderDamage[pid] || 0; // damage THIS player dealt to opponent
      const target = DATA.pod.players.find(p => p.id === oid);
      const targetColor = OWNER_COLORS[oid] || '#888';
      const fillPct = Math.min(100, (dmg / 21) * 100);
      const lethal = dmg >= 21;
      html += `<div class="cmdr-dmg-row${lethal ? ' lethal' : ''}">
        <div style="width:6px;height:6px;border-radius:50%;background:${targetColor};flex-shrink:0"></div>
        <div class="cmdr-dmg-source">→ ${target ? esc(target.name) : oid}</div>
        <div class="cmdr-dmg-bar"><div class="cmdr-dmg-fill" style="width:${fillPct}%;background:${targetColor}"></div></div>
        <button class="counter-btn" onclick="adjustCommanderDamage('${oid}', '${pid}', -1)" style="width:18px;height:18px;font-size:11px">−</button>
        <div class="cmdr-dmg-num">${dmg}</div>
        <button class="counter-btn" onclick="adjustCommanderDamage('${oid}', '${pid}', 1)" style="width:18px;height:18px;font-size:11px">+</button>
      </div>`;
    });
    html += `</div>`;
  }

  // Sticky footer — turn controls
  html += `<div class="turn-hq-footer">`;
  if (timerRunning && gamePaused) {
    html += `<button class="turn-hq-footer-btn resume" onclick="resumeGame()">▶ Resume</button>`;
  } else if (timerRunning) {
    html += `<button class="turn-hq-footer-btn next-turn" onclick="nextTurn()">${getNextTurnLabel()}</button>`;
    html += `<button class="turn-hq-footer-btn pause" onclick="pauseGame()">⏸ Pause</button>`;
  } else {
    html += `<button class="turn-hq-footer-btn next-turn" onclick="toggleTimer()" style="background:rgba(27,186,1,0.12)">⏱ Start Game</button>`;
  }
  html += `</div>`;

  html += `</div>`;
  return html;
}

// ---- GAME LOG DRAWER ----
let _logDrawerOpen = false;

function toggleLogDrawer() {
  _logDrawerOpen = !_logDrawerOpen;
  const overlay = document.getElementById('logDrawerOverlay');
  const drawer = document.getElementById('logDrawer');
  const handle = document.getElementById('logDrawerHandle');
  if (overlay) overlay.classList.toggle('open', _logDrawerOpen);
  if (drawer) drawer.classList.toggle('open', _logDrawerOpen);
  if (handle) handle.classList.toggle('active', _logDrawerOpen);
  if (_logDrawerOpen) renderLogDrawerContent();
}

function closeLogDrawer() {
  _logDrawerOpen = false;
  const overlay = document.getElementById('logDrawerOverlay');
  const drawer = document.getElementById('logDrawer');
  const handle = document.getElementById('logDrawerHandle');
  if (overlay) overlay.classList.remove('open');
  if (drawer) drawer.classList.remove('open');
  if (handle) handle.classList.remove('active');
}

function formatEventSummary(evt) {
  const pName = (id) => esc(DATA.pod.players.find(p => p.id === id)?.name || id || '?');
  switch(evt.type) {
    case 'life': return `Life → ${evt.newLife}`;
    case 'poison': return `☠ Poison → ${evt.newPoison}`;
    case 'energy': return `⚡ Energy → ${evt.newEnergy}`;
    case 'experience': return `✦ Exp → ${evt.newExp}`;
    case 'rad': return `☢ Rad → ${evt.newRad}`;
    case 'commander_cast': return `⚔ Cast commander (×${evt.casts})`;
    case 'commander_zone': return `Commander → ${evt.newZone}`;
    case 'commander_damage': return `${pName(evt.sourcePid)}'s cmdr dmg → ${evt.newTotal}`;
    case 'monarch': return `👑 Took Monarch`;
    case 'initiative': return `🏰 Took Initiative`;
    case 'city_blessing': return `🏙 City's Blessing`;
    case 'game_start': return `Game started with ${evt.players?.length || '?'} players`;
    default: return evt.type;
  }
}

function renderLogDrawerContent() {
  const body = document.getElementById('logDrawerBody');
  if (!body || !gameState) return;

  // Build combined list: flushed turns + current buffered events
  const flushedLog = gameState.log.slice().reverse();
  const buffered = gameState.currentTurnEvents;
  const activePid = (seatOrder && currentTurnIdx >= 0) ? seatOrder[currentTurnIdx] : null;

  if (flushedLog.length === 0 && buffered.length === 0) {
    body.innerHTML = `<div style="text-align:center;color:var(--text-dim);padding:20px;font-size:12px">No events yet</div>`;
    return;
  }

  let html = '';

  // Current turn (in-progress) at the top
  if (activePid && timerRunning) {
    const pName = esc(DATA.pod.players.find(p => p.id === activePid)?.name || activePid);
    const color = OWNER_COLORS[activePid] || '#888';
    html += `<div class="log-turn-block" style="border-left:3px solid ${color}">`;
    html += `<div class="log-turn-header"><span class="log-turn-label" style="color:${color}">T${turnNumber}</span> <span class="log-turn-player">${pName}</span> <span class="log-turn-dur">now</span></div>`;
    if (buffered.length > 0) {
      buffered.forEach(evt => {
        html += `<div class="log-turn-event">${formatEventSummary(evt)}</div>`;
      });
    } else {
      html += `<div class="log-turn-event" style="color:var(--text-dim);font-style:italic">—</div>`;
    }
    html += `</div>`;
  }

  // Flushed turns
  flushedLog.forEach(entry => {
    if (entry.turn === 0 && !entry.playerId) {
      // Game start entry
      const evtText = entry.events?.length ? formatEventSummary(entry.events[0]) : 'Game started';
      html += `<div class="log-turn-block" style="border-left:3px solid var(--orange)">`;
      html += `<div class="log-turn-header"><span class="log-turn-label" style="color:var(--orange)">⚔</span> <span class="log-turn-player">${evtText}</span></div>`;
      html += `</div>`;
      return;
    }
    const pName = entry.playerId ? esc(DATA.pod.players.find(p => p.id === entry.playerId)?.name || entry.playerId) : '?';
    const color = OWNER_COLORS[entry.playerId] || '#888';
    const durSec = Math.round((entry.durationMs || 0) / 1000);
    const durStr = durSec >= 60 ? Math.floor(durSec/60) + ':' + String(durSec%60).padStart(2,'0') : durSec + 's';
    html += `<div class="log-turn-block" style="border-left:3px solid ${color}">`;
    html += `<div class="log-turn-header"><span class="log-turn-label" style="color:${color}">T${entry.turn}</span> <span class="log-turn-player">${pName}</span> <span class="log-turn-dur">${durStr}</span></div>`;
    if (entry.events && entry.events.length > 0) {
      entry.events.forEach(evt => {
        html += `<div class="log-turn-event">${formatEventSummary(evt)}</div>`;
      });
    } else {
      html += `<div class="log-turn-event" style="color:var(--text-dim);font-style:italic">— no actions —</div>`;
    }
    html += `</div>`;
  });

  body.innerHTML = html;
}

function buildSeatNode(player, extras) {
  const colors = player.deck ? (player.deck.colors||[]).map(c => COLOR_MAP[c]||c).filter(Boolean) : [];
  const borderColor = extras?.borderColor || player.color;
  const highlight = extras?.highlight ? ' highlighted' : '';
  const hasArt = player.deck && player.deck.commanderArt;
  const record = player.deck ? getDeckRecord(player.deck.id) : { wins:0, losses:0, total:0 };
  const seatIdx = extras?.seatIndex != null ? `data-seat="${extras.seatIndex}"` : '';
  const pid = player.id ? `data-pid="${player.id}"` : '';
  const isFirst = firstPlayerId && player.id === firstPlayerId;
  const firstClass = isFirst ? ' first-player' : '';
  const isActiveTurn = timerRunning && isPlayersTurn(player.id);
  const turnClass = isActiveTurn ? ' active-turn' : '';
  const turnSecs = (timerRunning || currentTurnIdx >= 0) ? getPlayerTurnTime(player.id) : -1;

  // 2HG team indicator
  const is2HG = (activeVariant === '2hg') && teamData;
  const teamIdx = is2HG ? teamData.playerTeam[player.id] : -1;
  const teamBorderColor = is2HG && teamIdx >= 0 ? TEAM_COLOR_HEX[teamIdx % TEAM_COLOR_HEX.length] : null;
  const teamClass = is2HG ? ' team-member' : '';

  // Archenemy role class
  const aeRoleClass = (activeVariant === 'archenemy' && aeVillain) ? (player.id === aeVillain ? ' villain-seat' : ' hero-seat') : '';

  // Determine border color: 2HG team color takes priority for the glow
  let seatBorderColor;
  if (isActiveTurn) seatBorderColor = player.color;
  else if (is2HG && teamBorderColor) seatBorderColor = teamBorderColor + '88';
  else if (isFirst) seatBorderColor = 'var(--mtg-gold)';
  else seatBorderColor = borderColor + '55';

  const onClickAction = timerRunning ? `onclick="focusTurnHQ('${player.id}')"` : '';
  let html = `<div class="seat-node${highlight}${firstClass}${turnClass}${teamClass}${aeRoleClass}" style="border-color:${seatBorderColor};${is2HG && teamBorderColor ? `box-shadow:0 0 12px ${teamBorderColor}33;` : ''}left:${extras.x}%;top:${extras.y}%;cursor:${timerRunning ? 'pointer' : 'grab'}" ${seatIdx} ${pid} ${onClickAction}>`;
  if (isFirst) html += `<div class="first-player-badge">1st</div>`;
  // 2HG team badge
  if (is2HG && teamIdx >= 0) {
    const tc = TEAM_COLORS[teamIdx % TEAM_COLORS.length];
    html += `<div class="seat-team-badge" style="background:${tc};color:#000">T${teamIdx + 1}</div>`;
  }
  if (timerRunning && turnSecs >= 0) {
    html += `<div class="seat-turn-timer ${isActiveTurn ? 'active' : ''}">${formatTime(turnSecs)}</div>`;
  }

  // Commander art header — split view for partner commanders
  const hasPartner = player.deck && player.deck.commanderPartner && player.deck.commanderPartnerArt;
  if (hasPartner) {
    html += `<div class="seat-node-art" style="background:none;display:flex;overflow:hidden">
      <div style="flex:1;background:url('${player.deck.commanderArt}') center/cover;position:relative"></div>
      <div style="width:1px;background:rgba(0,0,0,0.6);z-index:1"></div>
      <div style="flex:1;background:url('${player.deck.commanderPartnerArt}') center/cover;position:relative"></div>
      <div class="seat-node-name" style="color:${player.color}">${esc(player.name)}</div>
    </div>`;
  } else if (hasArt) {
    html += `<div class="seat-node-art" style="background-image:url('${player.deck.commanderArt}')">
      <div class="seat-node-name" style="color:${player.color}">${esc(player.name)}</div>
    </div>`;
  } else {
    html += `<div class="seat-node-art" style="background:linear-gradient(135deg,${player.color}33,#111)">
      <div class="seat-node-name" style="color:${player.color}">${esc(player.name)}</div>
    </div>`;
  }

  html += `<div class="seat-node-body">`;
  if (player.deck) {
    const partnerName = player.deck.commanderPartner;
    if (partnerName) {
      // Show both commander names for partner decks
      html += `<div class="seat-node-deck" style="font-size:10px;line-height:1.3">${esc(player.deck.commander)}<span style="color:var(--text-dim);font-size:9px"> + </span>${esc(partnerName)}</div>`;
    } else {
      html += `<div class="seat-node-deck">${esc(player.deck.name)}</div>`;
    }
  } else {
    html += `<div class="seat-node-deck">—</div>`;
  }
  html += `<div class="seat-node-mana">${manaPips(colors, 20)}</div>`;

  // Life total display (when game is active)
  if (timerRunning && gameState && gameState.players[player.id]) {
    const pState = gameState.players[player.id];
    if (is2HG) html += `<div style="font-size:8px;color:var(--text-dim);text-align:center;margin-bottom:-2px">Team Life</div>`;
    html += `<div class="seat-life-row">
      <button class="seat-life-btn minus" onclick="adjustLife('${player.id}', -1); event.stopPropagation()">−</button>
      <div class="seat-life-num">${pState.life}</div>
      <button class="seat-life-btn plus" onclick="adjustLife('${player.id}', 1); event.stopPropagation()">+</button>
    </div>`;
    // Status badges — show all active statuses
    const badges = [];
    if (pState.poison > 0) badges.push(`<span class="seat-badge poison">☠${pState.poison}</span>`);
    if (pState.energy > 0) badges.push(`<span class="seat-badge energy">⚡${pState.energy}</span>`);
    if (pState.experience > 0) badges.push(`<span class="seat-badge experience">✦${pState.experience}</span>`);
    if (pState.rad > 0) badges.push(`<span class="seat-badge rad">☢${pState.rad}</span>`);
    if (gameState.globals.monarchId === player.id) badges.push(`<span class="seat-badge monarch">👑</span>`);
    if (gameState.globals.initiativeId === player.id) badges.push(`<span class="seat-badge initiative">🏰</span>`);
    if (pState.hasCityBlessing) badges.push(`<span class="seat-badge city">🏙</span>`);
    // Commander damage warning — show highest source if ≥ 11
    const maxCmdr = Object.entries(pState.commanderDamage).reduce((max, [oid, dmg]) => dmg > max.dmg ? {oid, dmg} : max, {oid:null, dmg:0});
    if (maxCmdr.dmg >= 11) {
      const srcColor = OWNER_COLORS[maxCmdr.oid] || '#888';
      badges.push(`<span class="seat-badge cmdr-warn" style="border-color:${srcColor}88">⚔${maxCmdr.dmg}</span>`);
    }
    if (badges.length > 0) {
      html += `<div class="seat-status-badges">${badges.join('')}</div>`;
    }
  }

  // Bracket badge
  if (player.deck?.bracket) {
    html += `<div class="seat-node-bracket" style="color:${player.color};border-color:${player.color}44">B${player.deck.bracket}</div>`;
  }

  // Plays count — always visible, large bottom-right watermark
  if (player.deck) {
    html += `<div class="seat-node-plays">${record.total}</div>`;
    // Wins count — gold, bottom-left, only if this deck has won
    if (record.wins > 0) {
      html += `<div class="seat-node-wins">${record.wins}</div>`;
    }
  }

  // Role (for star, kingdoms, etc.)
  if (extras?.role) {
    html += `<div class="seat-node-role" style="color:${extras.roleColor||'var(--text-dim)'}">${extras.role}</div>`;
  }

  html += `</div></div>`;
  return html;
}

// ---- FIRST PLAYER TRACKING ----
let firstPlayerId = null; // set by spinner animation

let _spinnerDone = false; // guards against double-fire

function spinForFirstPlayer(callback) {
  _spinnerDone = false;

  function getNodes() {
    const c = document.getElementById('seatingInner');
    return c ? Array.from(c.querySelectorAll('.seat-node[data-seat]:not(.empty-slot)')) : [];
  }

  const nodes = getNodes();
  if (nodes.length < 2) { if (callback) callback(); return; }

  // Clear any previous first-player state
  firstPlayerId = null;
  nodes.forEach(n => n.classList.remove('first-player','first-bounce','spinner-active'));
  document.querySelectorAll('.first-player-badge').forEach(b => b.remove());

  // Collect player IDs in seat order so we can re-find nodes after DOM changes
  const seatPids = nodes.map(n => n.dataset.pid);
  const winnerIdx = Math.floor(Math.random() * seatPids.length);
  const winnerPid = seatPids[winnerIdx];

  // Build highlight sequence: 3 full loops then decelerate to winner
  const totalCycles = 3;
  const seq = [];
  for (let c = 0; c < totalCycles; c++) {
    for (let i = 0; i < seatPids.length; i++) seq.push(i);
  }
  const lastInSeq = seq.length > 0 ? seq[seq.length - 1] : 0;
  let cur = (lastInSeq + 1) % seatPids.length;
  let guard = seatPids.length + 3;
  while (cur !== winnerIdx && guard-- > 0) {
    seq.push(cur);
    cur = (cur + 1) % seatPids.length;
  }
  seq.push(winnerIdx);

  let step = 0;
  const totalSteps = seq.length;

  function getDelay(s) {
    const progress = s / totalSteps;
    return 60 + Math.pow(progress, 2.5) * 260;
  }

  function finish() {
    if (_spinnerDone) return;
    _spinnerDone = true;
    // Re-query DOM for the winner node (survives re-renders)
    const fresh = getNodes();
    const winner = fresh.find(n => n.dataset.pid === winnerPid);
    fresh.forEach(n => n.classList.remove('spinner-active'));
    if (winner) {
      winner.classList.add('first-player', 'first-bounce');
      if (!winner.querySelector('.first-player-badge')) {
        const badge = document.createElement('div');
        badge.className = 'first-player-badge';
        badge.textContent = '1st';
        winner.appendChild(badge);
      }
    }
    firstPlayerId = winnerPid || null;
    setTimeout(() => { if (callback) callback(); }, 2000);
  }

  // Safety timeout — if spinner gets stuck, force-finish after 6s
  const safetyTimer = setTimeout(() => {
    if (!_spinnerDone) { console.warn('Spinner safety timeout — forcing finish'); finish(); }
  }, 6000);

  function tick() {
    // Re-query each tick so we survive DOM rebuilds
    const liveNodes = getNodes();
    liveNodes.forEach(n => n.classList.remove('spinner-active'));

    if (step >= totalSteps) {
      clearTimeout(safetyTimer);
      finish();
      return;
    }

    // Highlight current seat by pid
    const targetPid = seatPids[seq[step]];
    const targetNode = liveNodes.find(n => n.dataset.pid === targetPid);
    if (targetNode) targetNode.classList.add('spinner-active');

    step++;
    setTimeout(tick, getDelay(step));
  }

  tick();
}

// ---- SEAT ORDER (persisted, draggable) ----
let seatOrder = load('seatOrder', null); // array of player IDs in seat order (turn order)

// ---- 6-SLOT SEATING SYSTEM ----
// Slots 0-5 clockwise: TopLeft, TopRight, RightEnd, BottomRight, BottomLeft, LeftEnd
// slotAssignments[i] = playerId or null
let slotAssignments = load('slotAssignments', null); // 6-element array

const SLOT_SIDE = ['top','top','right','bottom','bottom','left'];

function getSlotPosition(slotIdx) {
  // Dynamic position based on which slots on the same side are occupied
  const side = SLOT_SIDE[slotIdx];
  const isOccupied = slotAssignments && slotAssignments[slotIdx] != null;
  const isPC = (activeVariant === 'planechase');

  // Planechase: push seats WAY out — card needs the whole table
  if (side === 'right') return {x: isPC ? 108 : 95, y:50};
  if (side === 'left') return {x: isPC ? -8 : 5, y:50};

  const topY = isPC ? -2 : 4;
  const botY = isPC ? 102 : 96;

  if (side === 'top') {
    const other = slotIdx === 0 ? 1 : 0;
    const otherOccupied = slotAssignments && slotAssignments[other] != null;
    if (otherOccupied) {
      // Both slots have something — split
      return slotIdx === 0 ? {x:35, y:topY} : {x:65, y:topY};
    }
    // Only one on this side — occupied centers, empty sits to the right of center
    if (isOccupied) return {x:50, y:topY};
    return slotIdx === 0 ? {x:72, y:topY} : {x:72, y:topY}; // empty indicator right of center
  }
  if (side === 'bottom') {
    const other = slotIdx === 3 ? 4 : 3;
    const otherOccupied = slotAssignments && slotAssignments[other] != null;
    if (otherOccupied) {
      return slotIdx === 3 ? {x:65, y:botY} : {x:35, y:botY};
    }
    if (isOccupied) return {x:50, y:botY};
    return slotIdx === 3 ? {x:72, y:botY} : {x:72, y:botY}; // empty indicator right of center
  }
  return {x:50, y:50};
}

function initSlotAssignments(players) {
  // Check if saved assignments are still valid for these players
  if (slotAssignments && slotAssignments.length === 6) {
    const assignedIds = slotAssignments.filter(id => id != null);
    const allValid = assignedIds.every(id => players.find(p => p.id === id));
    const allAssigned = players.every(p => assignedIds.includes(p.id));
    if (allValid && allAssigned) return; // still good
  }
  // Build fresh assignments
  slotAssignments = [null, null, null, null, null, null];
  // Default layout by player count:
  // 2: top-center(0), bottom-center(3)
  // 3: top-center(0), bottom-right(3), bottom-left(4)
  // 4: top-left(0), top-right(1), bottom-right(3), bottom-left(4)
  // 5: 0,1,2,3,4
  // 6: all
  const defaultSlots = {
    1: [0],
    2: [0, 3],
    3: [0, 3, 4],
    4: [0, 1, 3, 4],
    5: [0, 1, 2, 3, 4],
    6: [0, 1, 2, 3, 4, 5]
  };
  const slots = defaultSlots[players.length] || defaultSlots[Math.min(players.length, 6)];
  players.forEach((p, i) => {
    if (i < slots.length) slotAssignments[slots[i]] = p.id;
  });
  save('slotAssignments', slotAssignments);
}

function deriveSeatOrder() {
  // Clockwise turn order from slot assignments (skip nulls)
  if (!slotAssignments) return [];
  return slotAssignments.filter(id => id != null);
}

function getSeatOrder(players) {
  initSlotAssignments(players);
  seatOrder = deriveSeatOrder();
  save('seatOrder', seatOrder);
  return seatOrder.map(id => players.find(p => p.id === id)).filter(Boolean);
}

function moveToSlot(fromSlot, toSlot) {
  if (!slotAssignments || fromSlot === toSlot) return;
  const fromId = slotAssignments[fromSlot];
  const toId = slotAssignments[toSlot];
  // Swap (toId may be null = just move)
  slotAssignments[toSlot] = fromId;
  slotAssignments[fromSlot] = toId;
  save('slotAssignments', slotAssignments);
  seatOrder = deriveSeatOrder();
  save('seatOrder', seatOrder);
  // Rebuild star enemies from new seat order
  if (activeVariant === 'star') starEnemies = buildStarEnemies();
  renderAll();
}

// Legacy compat
function buildSVGLines(positions) {
  // Draw polygon edges connecting all vertices
  const n = positions.length;
  let lines = '';
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    lines += `<line x1="${positions[i].x}%" y1="${positions[i].y}%" x2="${positions[j].x}%" y2="${positions[j].y}%"/>`;
  }
  return `<svg class="seating-lines" viewBox="0 0 100 100" preserveAspectRatio="none">${lines}</svg>`;
}

function renderTableCenter(players) {
  const variant = activeVariant || 'standard';

  // ---- PLANECHASE TABLE CENTER: plane card IS the table ----
  if (variant === 'planechase') {
    return renderPlanechaseTableCenter(players);
  }

  // Aggregate colors at the table
  const allColors = {};
  players.forEach(p => {
    if (p.deck) (p.deck.colors||[]).forEach(c => {
      const l = COLOR_MAP[c]||c;
      allColors[l] = (allColors[l]||0)+1;
    });
  });
  const colorOrder = ['W','U','B','R','G','C'];

  // Bracket average
  const brackets = players.filter(p => p.deck?.bracket).map(p => p.deck.bracket);
  const avg = brackets.length ? (brackets.reduce((s,b)=>s+b,0)/brackets.length).toFixed(1) : null;

  // Mirror timer state from the top bar
  const timerEl = document.getElementById('timerDisplay');
  const timerText = timerEl ? timerEl.textContent : '0:00';
  const isRunning = timerEl?.classList.contains('running');

  let html = `<div class="table-center">`;

  // Variant badge (for non-standard variants using standard layout)
  if (activeVariant === 'star') {
    html += `<div style="font-family:Cinzel,serif;font-size:11px;color:var(--mtg-gold);letter-spacing:1px;margin-bottom:2px">⭐ STAR</div>`;
  } else if (activeVariant === '2hg') {
    html += `<div style="font-family:Cinzel,serif;font-size:11px;color:var(--blue);letter-spacing:1px;margin-bottom:2px">👥 2HG</div>`;
  }

  // Turn counter (above timer, only during game)
  if (isRunning && turnNumber > 0) {
    html += `<div class="table-turn-counter">Turn ${turnNumber}</div>`;
  }

  // Timer
  html += `<div class="table-timer ${isRunning ? 'running' : ''}" id="tableTimer">${timerText}</div>`;

  // Controls row — mirrors updateTableControls() logic
  html += `<div class="table-controls">`;
  if (isRunning && gamePaused) {
    html += `<button class="table-btn resume" onclick="resumeGame()">▶ Resume</button>`;
    html += `<button class="table-btn stop" onclick="toggleTimer()">⏹ End Game</button>`;
    html += `<button class="table-btn reset" onclick="resetGame()">🔄 Reset</button>`;
  } else if (isRunning) {
    html += `<button class="table-btn turn" onclick="nextTurn()">${getNextTurnLabel()}</button>`;
    html += `<button class="table-btn pause" onclick="pauseGame()">⏸ Pause</button>`;
    html += `<button class="table-btn stop" onclick="toggleTimer()">⏹ End</button>`;
    html += `<button class="table-btn log" onclick="openGameLogger()">🏆 Log</button>`;
  } else if (gameReady) {
    html += `<button class="table-btn ready" onclick="confirmReady()">▶ Ready!</button>`;
    html += `<button class="table-btn reset" onclick="resetGame()">🔄 Reset</button>`;
  } else {
    // Check if a game was just played (timer has elapsed or first player set)
    const gameWasPlayed = timerText !== '0:00';
    if (gameWasPlayed) {
      html += `<button class="table-btn reset" onclick="clearGame()">🧹 Clear Game</button>`;
      html += `<button class="table-btn log" onclick="openGameLogger()">🏆 Log Result</button>`;
    } else {
      html += `<button class="table-btn start" onclick="toggleTimer()">⏱ Start Game</button>`;
      if (DATA.games.games.length > 0) {
        html += `<button class="table-btn log" onclick="openGameLogger()">🏆 Log Result</button>`;
      }
    }
  }
  html += `</div>`;

  // Turn info line (during game)
  html += `<div class="table-turn-info"></div>`;

  // First player hint (pre-game only)
  if (!isRunning && !gameReady) {
    if (firstPlayerId) {
      const fp = players.find(p => p.id === firstPlayerId);
      html += `<div class="table-first-hint set">👑 ${fp ? esc(fp.name) : 'Player'} goes first</div>`;
    } else {
      html += `<div class="table-first-hint">Choose 1st Player or Start to Randomize</div>`;
    }
  }

  // Mana colors at table — sized by how many players play that color
  const hasColors = colorOrder.some(c => allColors[c]);
  if (hasColors) {
    const maxCount = Math.max(...colorOrder.map(c => allColors[c] || 0));
    const minSize = 22, maxSize = 42;
    html += `<div class="table-colors">`;
    colorOrder.forEach(c => {
      if (!allColors[c]) return;
      const count = allColors[c];
      // Scale size: 1 player = minSize, maxCount players = maxSize
      const sz = maxCount > 1
        ? Math.round(minSize + (maxSize - minSize) * ((count - 1) / (maxCount - 1)))
        : 30; // single color gets a mid size
      html += manaImg(c, sz);
    });
    html += `</div>`;
  }

  // Bracket avg
  if (avg) html += `<div class="table-bracket-avg">Avg Bracket ${avg}</div>`;

  html += `</div>`;
  return html;
}

function updateTableControls() {
  const el = document.querySelector('.table-controls');
  if (!el) return;

  if (timerRunning && gamePaused) {

    html += `<button class="table-btn resume" onclick="resumeGame()">▶ Resume</button>`;
    html += `<button class="table-btn stop" onclick="toggleTimer()">⏹ End Game</button>`;

// ---- SESSION (TONIGHT'S) RECORD ----
// Persists across games within the same browser session (sessionStorage)
function getSessionRecord() {
  try { return JSON.parse(sessionStorage.getItem('gn_sessionRecord')) || {}; } catch(e) { return {}; }
}
function updateSessionRecord(winnerId, playerIds) {
  const rec = getSessionRecord();
  playerIds.forEach(pid => {
    if (!rec[pid]) rec[pid] = { wins: 0, losses: 0 };
    if (pid === winnerId) rec[pid].wins++;
    else rec[pid].losses++;
  });
  sessionStorage.setItem('gn_sessionRecord', JSON.stringify(rec));
}

function renderSessionRecord(players) {
  const rec = getSessionRecord();
  const hasAnyGames = players.some(p => {
    const r = rec[p.id];
    return r && (r.wins + r.losses) > 0;
  });
  if (!hasAnyGames) return '';

  let html = `<div class="session-record">`;
  html += `<div class="session-record-label">Tonight's Record</div>`;
  html += `<div class="session-record-rows">`;
  players.forEach(p => {
    const r = rec[p.id] || { wins: 0, losses: 0 };
    const total = r.wins + r.losses;
    const pct = total ? Math.round(r.wins / total * 100) : 0;
    html += `<div class="session-row">
      <div class="session-name" style="color:${p.color}">${esc(p.name)}</div>
      <div class="session-bar-bg"><div class="session-bar-fill" style="width:${pct}%;background:${p.color}"></div></div>
      <div class="session-stat">${r.wins}W / ${r.losses}L</div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderSeatingStandard(players) {

    if (pid) {
      const p = players.find(x => x.id === pid);
      if (p) {
        const extras = { x: pos.x, y: pos.y, seatIndex: s };

          // Always compute enemies from current seat positions
          const liveEnemies = buildStarEnemies();

            }).join(', ');

// ---- DRAG TO SWAP/MOVE SEATS ----
function initSeatDrag() {
  const container = document.getElementById('seatingInner');
  if (!container) return;
  const allSlots = container.querySelectorAll('.seat-node[data-seat]');
  // Only occupied nodes are draggable
  const draggableNodes = container.querySelectorAll('.seat-node[data-seat]:not(.empty-slot)');
  if (!draggableNodes.length) return;

  let dragNode = null;
  let dragSeat = -1;
  let startX, startY, origLeft, origTop;
  let didDrag = false;

  draggableNodes.forEach(node => {
    node.addEventListener('mousedown', e => {
      e.preventDefault();
      dragNode = node;
      dragSeat = parseInt(node.dataset.seat);
      startX = e.clientX;
      startY = e.clientY;
      origLeft = parseFloat(node.style.left);
      origTop = parseFloat(node.style.top);
      didDrag = false;
      node.classList.add('dragging');
      document.body.style.cursor = 'grabbing';
    });
  });

  document.addEventListener('mousemove', e => {
    if (!dragNode) return;
    const dx_px = Math.abs(e.clientX - startX);
    const dy_px = Math.abs(e.clientY - startY);
    if (dx_px > 5 || dy_px > 5) didDrag = true;

    const rect = container.getBoundingClientRect();
    const dx = ((e.clientX - startX) / rect.width) * 100;
    const dy = ((e.clientY - startY) / rect.height) * 100;
    dragNode.style.left = (origLeft + dx) + '%';
    dragNode.style.top = (origTop + dy) + '%';

    // Highlight ALL slots (including empty) as drop targets
    allSlots.forEach(n => {
      if (n === dragNode) return;
      const nRect = n.getBoundingClientRect();
      const over = e.clientX >= nRect.left && e.clientX <= nRect.right &&
                   e.clientY >= nRect.top && e.clientY <= nRect.bottom;
      n.classList.toggle('drop-target', over);
    });
  });

  document.addEventListener('mouseup', e => {
    if (!dragNode) return;
    let dropSeat = -1;
    allSlots.forEach(n => {
      if (n === dragNode) return;
      if (n.classList.contains('drop-target')) {
        dropSeat = parseInt(n.dataset.seat);
      }
      n.classList.remove('drop-target');
    });
    dragNode.classList.remove('dragging');
    document.body.style.cursor = '';

    if (!didDrag) {
      dragNode.style.left = origLeft + '%';
      dragNode.style.top = origTop + '%';
      const pid = dragNode.dataset.pid;
      if (pid) toggleFirstPlayer(pid);
      dragNode = null;
      return;
    }

    if (dropSeat >= 0 && dropSeat !== dragSeat) {
      moveToSlot(dragSeat, dropSeat);
    } else {
      dragNode.style.left = origLeft + '%';
      dragNode.style.top = origTop + '%';
    }
    dragNode = null;
  });
}

function renderSeatingKingdoms(players) {
  const s = seededShuffle(players);
  const roles = ['👑 King','🛡 Knight','🗡 Bandit','🗡 Bandit'];
  if (s.length >= 5) roles.push('🎭 Usurper');
  if (s.length >= 6) roles.push('🗡 Bandit');
  if (s.length >= 7) roles.push('🛡 Knight');
  const roleColors = {'King':'var(--mtg-gold)','Knight':'var(--blue)','Bandit':'#D3202A','Usurper':'#9B59B6'};

  const n = Math.min(s.length, roles.length);
  const positions = getVertexPositions(n, 50, 50, 35);
  const pcts = positions.map(p => ({x: p.x, y: p.y}));

  let html = `<div class="seating-chart"><div class="seating-inner">`;
  html += buildSVGLines(pcts);
  html += `<div class="seating-center"><div class="seating-center-icon">👑</div><div class="seating-center-label">Kingdoms</div><div style="font-size:9px;color:var(--text-dim);margin-top:2px">Only the King is revealed!</div></div>`;

  s.slice(0, n).forEach((p, i) => {
    const roleName = roles[i].split(' ')[1];
    const roleIcon = roles[i].split(' ')[0];
    html += buildSeatNode(p, {
      x: pcts[i].x,
      y: pcts[i].y,
      role: `${roleIcon} ${roleName}`,
      roleColor: roleColors[roleName] || 'var(--text-dim)',
      highlight: roleName === 'King'
    });
  });
  html += `</div></div>`;
  return html;
}

function renderSeatingArchenemy(players) {
  let villain, heroes;
  if (aeVillain && players.find(p => p.id === aeVillain)) {
    villain = players.find(p => p.id === aeVillain);
    heroes = players.filter(p => p.id !== aeVillain);
  } else {
    const s = seededShuffle(players);
    villain = s[0];
    heroes = s.slice(1);
  }

  // Villain at top center, heroes in an arc below
  let html = `<div class="seating-chart"><div class="seating-inner">`;
  // Villain node at top
  html += buildSeatNode(villain, {
    x: 50, y: 15,
    role: '😈 Archenemy',
    roleColor: '#E88',
    highlight: true,
    borderColor: '#D3202A'
  });

  // VS label
  html += `<div class="seating-center" style="top:40%"><div style="font-size:14px;color:var(--text-dim);font-family:Cinzel,serif">VS</div></div>`;

  // Heroes in arc at bottom
  const heroN = heroes.length;
  const heroSpread = Math.min(70, heroN * 20); // spread in %
  const heroY = 75; // vertical position
  heroes.forEach((p, i) => {
    const t = heroN === 1 ? 0.5 : i / (heroN - 1);
    const heroX = 50 - heroSpread/2 + t * heroSpread;
    html += buildSeatNode(p, {
      x: heroX,
      y: heroY,
      role: '🛡 Hero',
      roleColor: 'var(--blue)'
    });
  });

  // Draw lines from villain to each hero
  let lines = '';
  heroes.forEach((p, i) => {
    const t = heroN === 1 ? 0.5 : i / (heroN - 1);
    const heroX = 50 - heroSpread/2 + t * heroSpread;
    lines += `<line x1="50%" y1="15%" x2="${heroX}%" y2="${heroY}%" style="stroke:rgba(211,32,42,0.15);stroke-width:0.5;stroke-dasharray:2,2"/>`;
  });
  html += `<svg class="seating-lines" viewBox="0 0 100 100" preserveAspectRatio="none">${lines}</svg>`;

  html += `</div></div>`;
  return html;
}

  if (variant === 'horde') {
    let html = backBtn + bgBtn;
    html += `<div class="horde-screen">`;
    html += renderHordeScreen();
    html += renderHordeGameBar();
    html += renderHordePlayerStrip();
    html += `</div>`;
    return html;
  }

  // Convert to 2HG button — only show for standard variant during a game
  const convertBtn = (variant === 'standard' && timerRunning) ?
    `<div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:10"><button class="back-nav-btn" onclick="openConvert2HG()" style="background:rgba(0,126,255,0.15);border-color:rgba(0,126,255,0.4);color:var(--blue)">👥 Convert to 2HG</button></div>` : '';

  // For standard, 2hg, star, kingdoms: seating IS the main view
  return backBtn + bgBtn + convertBtn + renderSeatingChart(variant);
}

// ---- CONVERT TO 2HG MID-GAME ----
function openConvert2HG() {
  // Pause the game first
  if (timerRunning && !gamePaused) pauseGame();

  const players = activePod.map(id => DATA.pod.players.find(p => p.id === id)).filter(Boolean);
  const n = players.length;
  if (n < 4 || n % 2 !== 0) {
    toast('Need 4 or 6 players (even count) for 2HG');
    return;
  }
  const maxTeams = Math.floor(n / 2);

  // Auto-assign initial teams if not set
  if (!Object.keys(manualTeamAssignments).length) {
    players.forEach((p, i) => { manualTeamAssignments[p.id] = Math.floor(i / 2); });
  }

  // Build overlay
  const overlay = document.createElement('div');
  overlay.id = 'convert2hgOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)';

  // Override assign2HGTeam to re-render the overlay instead of calling renderAll()
  const origAssign = window.assign2HGTeam;
  const origRandomize = window.randomize2HGTeams;

  function renderOverlayContent() {
    const result = renderTeamPicker(players, maxTeams, { showDecks: true });
    let html = `<div style="background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:24px 32px;max-width:500px;width:90%">`;
    html += `<div style="text-align:center;font-family:Cinzel,serif;font-size:18px;color:var(--blue);margin-bottom:4px">👥 Convert to Two-Headed Giant</div>`;
    html += `<div style="text-align:center;font-size:12px;color:var(--text-dim);margin-bottom:16px">Assign teams below. 60 shared life per team.</div>`;
    html += result.html;
    html += `<div style="display:flex;gap:10px;justify-content:center;margin-top:16px">`;
    html += `<button onclick="cancelConvert2HG()" style="padding:10px 20px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-family:inherit;font-size:14px">Cancel</button>`;
    html += `<button onclick="confirmConvert2HG()" ${result.valid ? '' : 'disabled'} style="padding:10px 24px;border-radius:8px;background:${result.valid ? 'rgba(0,126,255,0.2)' : 'var(--surface)'};border:1px solid ${result.valid ? 'rgba(0,126,255,0.5)' : 'var(--border)'};color:${result.valid ? 'var(--blue)' : 'var(--text-dim)'};cursor:${result.valid ? 'pointer' : 'not-allowed'};font-family:inherit;font-size:14px;font-weight:600">👥 Convert to 2HG →</button>`;
    html += `</div></div>`;
    return html;
  }

  // Temporarily override assign/randomize to re-render overlay instead of full renderAll
  window.assign2HGTeam = function(pid, teamIdx) {
    manualTeamAssignments[pid] = teamIdx;
    overlay.innerHTML = renderOverlayContent();
  };
  window.randomize2HGTeams = function() {
    const pids = players.map(p => p.id);
    for (let i = pids.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pids[i], pids[j]] = [pids[j], pids[i]];
    }
    pids.forEach((pid, i) => { manualTeamAssignments[pid] = Math.floor(i / 2); });
    overlay.innerHTML = renderOverlayContent();
  };

  // Store originals for restore on close
  overlay._restoreFns = () => {
    window.assign2HGTeam = origAssign;
    window.randomize2HGTeams = origRandomize;
  };

  overlay.innerHTML = renderOverlayContent();
  document.body.appendChild(overlay);
}

function cancelConvert2HG() {
  const overlay = document.getElementById('convert2hgOverlay');
  if (overlay) {
    if (overlay._restoreFns) overlay._restoreFns();
    overlay.remove();
  }
  // Resume if was paused by convert
  if (timerRunning && gamePaused) resumeGame();
}

function confirmConvert2HG() {
  const overlay = document.getElementById('convert2hgOverlay');
  if (overlay) {
    if (overlay._restoreFns) overlay._restoreFns();
    overlay.remove();
  }

  // Switch variant
  activeVariant = '2hg';
  save('activeVariant', activeVariant);

  // Build team data from manual assignments
  teamData = build2HGTeams();

  // Set all players to 60 shared life per team
  if (gameState) {
    teamData.teams.forEach(team => {
      team.life = 60;
      team.members.forEach(mid => {
        if (gameState.players[mid]) {
          gameState.players[mid].life = 60;
        }
      });
    });
  }

  // Re-render everything with 2HG layout
  renderAll();

  // Resume game
  if (timerRunning && gamePaused) resumeGame();

  toast('Converted to 2HG! 60 shared life per team.');
}

function renderLobbyModes() {
  const podCount = activePod.length;
  const modeTags = {
    standard: { tag: 'Classic', cls: 'classic' },
    '2hg': { tag: 'Team', cls: 'team' },
    star: { tag: 'Classic', cls: 'classic' },
    kingdoms: { tag: 'Chaos', cls: 'chaos' },
    planechase: { tag: 'Chaos', cls: 'chaos' },
    archenemy: { tag: 'Team', cls: 'team' },
    horde: { tag: 'Co-op', cls: 'coop' }
  };
  const modePlayers = {
    standard: '2–8',
    '2hg': '4+',
    star: '5+',
    kingdoms: '5–7',
    planechase: '2–8',
    archenemy: '3+',
    horde: '1–6'
  };
  // Eligibility check based on pod size
  function isEligible(k) {
    if (podCount < 2) return false;
    switch(k) {
      case 'standard': return podCount >= 2 && podCount <= 8;
      case '2hg': return podCount >= 4 && podCount % 2 === 0;
      case 'star': return podCount >= 5;
      case 'kingdoms': return podCount >= 5 && podCount <= 7;
      case 'planechase': return podCount >= 2 && podCount <= 8;
      case 'archenemy': return podCount >= 3;
      case 'horde': return podCount >= 1 && podCount <= 6;
      default: return true;
    }
  }

  let html = `<div class="mode-showcase">
    <div class="mode-showcase-header">
      <div class="mode-showcase-icon">⚔</div>
      <div class="mode-showcase-title">Game Night</div>
      <div class="mode-showcase-sub">Pick your players, choose your mode, shuffle up.</div>
    </div>
    <div class="mode-grid">`;

  Object.entries(RULES_VARIANTS).filter(([k]) => !HIDDEN_VARIANTS.includes(k)).forEach(([k, v]) => {
    const sel = activeVariant === k;
    const info = modeTags[k] || {};
    const players = modePlayers[k] || '';
    const eligible = isEligible(k);
    const cls = sel ? 'selected' : (eligible ? 'eligible' : 'ineligible');
    html += `<div class="mode-tile ${cls}" onclick="${eligible ? `toggleVariant('${k}')` : ''}">
      ${info.tag ? `<div class="mode-tile-tag ${info.cls}">${info.tag}</div>` : ''}
      <div class="mode-tile-icon">${v.icon}</div>
      <div class="mode-tile-name">${v.name}</div>
      <div class="mode-tile-desc">${v.desc}</div>
      <div class="mode-tile-players">${players}</div>
    </div>`;
  });

  html += `</div>`;

  // 2HG Team assignment — shown when 2HG is selected and enough players
  if (activeVariant === '2hg' && podCount >= 4 && podCount % 2 === 0) {
    const players = activePod.map(id => DATA.pod.players.find(p => p.id === id)).filter(Boolean);
    const maxTeams = Math.floor(podCount / 2);
    const picker = renderTeamPicker(players, maxTeams);

    html += `<div style="margin-top:16px;padding:16px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border)">`;
    html += `<div style="font-family:Cinzel,serif;font-size:13px;color:var(--text-dim);letter-spacing:1px;text-align:center;margin-bottom:12px">👥 TEAM ASSIGNMENT</div>`;
    html += picker.html;
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

// ---- ADD NEW PLAYER ----
function openAddPlayer() {
  const name = prompt('New player name:');
  if (!name || !name.trim()) return;
  const id = name.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
  if (DATA.pod.players.find(p => p.id === id)) { toast('Player already exists'); return; }
  // Pick a color not yet used
  const usedColors = Object.values(OWNER_COLORS);
  const palette = ['#E67201','#007EFF','#1BBA01','#C9A849','#D3202A','#9B59B6','#00CED1','#FF69B4','#FFD700','#FF6347'];
  const newColor = palette.find(c => !usedColors.includes(c)) || '#' + Math.floor(Math.random()*16777215).toString(16);

  const newPlayer = {
    id: id,
    name: name.trim(),
    nickname: name.trim(),
    archidekt: null,
    archidektUrl: null,
    avatar: null,
    elo: 1200,
    joinedDate: new Date().toISOString().split('T')[0],
    deckCount: 0,
    stats: { totalGames: 0, totalWins: 0, winRate: 0, currentStreak: 0, bestStreak: 0, uniqueDeckWins: 0, avgSaltGiven: 0, avgSaltReceived: 0 }
  };

  DATA.pod.players.push(newPlayer);
  OWNER_COLORS[id] = newColor;
  // Add to pod automatically
  activePod.push(id);
  save('activePod', activePod);
  toast('Added ' + name.trim() + '!');
  renderAll();
}

// ---- SCRYFALL SEARCH ----
let _scryfallTimeout = null;

function openNewDeckSearch(pid) {
  const el = document.getElementById('scryfallSearch_' + pid);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  if (el.style.display === 'block') {
    const input = el.querySelector('.scryfall-input');
    if (input) { input.value = ''; input.focus(); }
  }
}

function scryfallAutocomplete(pid, query) {
  clearTimeout(_scryfallTimeout);
  const resultsEl = document.getElementById('scryfallResults_' + pid);
  if (!resultsEl) return;
  if (query.length < 2) { resultsEl.innerHTML = ''; return; }

  _scryfallTimeout = setTimeout(() => {
    fetch('https://api.scryfall.com/cards/autocomplete?q=' + encodeURIComponent(query))
      .then(r => r.json())
      .then(data => {
        if (!data.data || !data.data.length) {
          resultsEl.innerHTML = '<div style="padding:8px 12px;color:var(--text-dim);font-size:12px">No results</div>';
          return;
        }
        resultsEl.innerHTML = data.data.slice(0, 8).map(name =>
          `<div class="scryfall-result" onclick="selectScryfallCard('${pid}', '${esc(name).replace(/'/g, "\\'")}')">${esc(name)}</div>`
        ).join('');
      })
      .catch(() => {
        resultsEl.innerHTML = '<div style="padding:8px 12px;color:var(--text-dim);font-size:12px">Search error</div>';
      });
  }, 300);
}

function selectScryfallCard(pid, cardName) {
  // Fetch full card data from Scryfall
  fetch('https://api.scryfall.com/cards/named?fuzzy=' + encodeURIComponent(cardName))
    .then(r => r.json())
    .then(card => {
      if (card.object === 'error') { toast('Card not found'); return; }

      const artUrl = card.image_uris ? card.image_uris.art_crop :
                     (card.card_faces && card.card_faces[0].image_uris ? card.card_faces[0].image_uris.art_crop : null);
      const scryfallId = card.id;
      const colors = (card.color_identity || []).map(c => ({W:'White',U:'Blue',B:'Black',R:'Red',G:'Green'}[c] || c));

      // Create new deck entry
      const deckId = pid + '-' + cardName.toLowerCase().replace(/[^a-z0-9]/g, '-').substring(0, 30);
      const newDeck = {
        id: deckId,
        archidektId: null,
        owner: pid,
        name: cardName,
        commander: cardName,
        commanderPartner: null,
        commanderArt: artUrl,
        commanderScryfallId: scryfallId,
        colors: colors,
        bracket: null,
        cardCount: 100,
        estimatedValue: null,
        tags: [],
        retired: false,
        photoPath: null,
        lastPlayed: null,
        archidektUrl: null,
        stats: { gamesPlayed: 0, wins: 0, winRate: 0 }
      };

      DATA.decks.decks.push(newDeck);
      matchupSelections[pid] = deckId;
      save('matchupSelections', matchupSelections);
      toast('Created deck: ' + cardName);
      renderAll();
    })
    .catch(() => { toast('Error fetching card'); });
}

  matchupSelections = {};
  suggestMatchup();
  save('matchupSelections', matchupSelections);
  renderAll();
}

// ---- AUTO-FILL EMPTY SLOTS ----
function autoFillEmpty() {
  activePod.forEach(pid => {
    if (matchupSelections[pid]) return; // already has a deck
    const playerDecks = DATA.decks.decks.filter(d => d.owner === pid && !d.retired);
    if (playerDecks.length === 0) return;
    // Pick random deck not already in use
    const inUse = Object.values(matchupSelections);
    const available = playerDecks.filter(d => !inUse.includes(d.id));
    if (available.length > 0) {
      matchupSelections[pid] = available[Math.floor(Math.random() * available.length)].id;
    } else {
      matchupSelections[pid] = playerDecks[Math.floor(Math.random() * playerDecks.length)].id;
    }
  });
  save('matchupSelections', matchupSelections);
  toast('⚡ Auto-filled empty slots');
  renderAll();
}

// ---- VIDEO BACKGROUND SYSTEM ----
const BG_VIDEOS = [
  'assets/bg-1.mov',
  'assets/bg-2.mov',
  'assets/bg-3.mov',
  'assets/bg-4.mp4'
];
let _lastBgIdx = -1;

function pickRandomBg() {
  let idx;
  do { idx = Math.floor(Math.random() * BG_VIDEOS.length); } while (idx === _lastBgIdx && BG_VIDEOS.length > 1);
  _lastBgIdx = idx;
  return BG_VIDEOS[idx];
}

function cycleBgVideo() {
  // Advance to next video (sequential, not random)
  _lastBgIdx = (_lastBgIdx + 1) % BG_VIDEOS.length;
  const vid = document.getElementById('bgVideo');
  if (!vid) return;
  vid.classList.remove('active');
  vid.src = BG_VIDEOS[_lastBgIdx];
  vid.load();
  vid.play().then(() => vid.classList.add('active'))
    .catch(() => { vid.onloadeddata = () => vid.classList.add('active'); });
}

function showBgVideo() {
  const vid = document.getElementById('bgVideo');
  if (!vid) return;
  const src = pickRandomBg();
  vid.classList.remove('active');
  vid.src = src;
  vid.load();
  vid.play().then(() => {
    vid.classList.add('active');
  }).catch(() => {
    // Autoplay blocked — fade in anyway once metadata loads
    vid.onloadeddata = () => vid.classList.add('active');
  });
}

// Show a random background on page load for ambiance
showBgVideo();

/* Blind Eternities canvas removed — using video backgrounds */

// ---- INIT ----
renderAll();
</script>
