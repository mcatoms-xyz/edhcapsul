// File System Access API → writes localStorage games back to data/games.js.
// Handle is persisted in IndexedDB across reloads; permission may need to
// be re-granted on page reload (one click, no re-pick required).
const SG = { btn: null, label: null, statusEl: null, handle: null, lastSyncedAt: null, tickTimer: null, filename: null };

function _sgOpenIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('edhcapsul', 1);
    req.onupgradeneeded = (e) => { e.target.result.createObjectStore('handles'); };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}
async function _sgSaveHandle(h) {
  const db = await _sgOpenIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(h, 'games-file');
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}
async function _sgLoadHandle() {
  const db = await _sgOpenIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readonly');
    const req = tx.objectStore('handles').get('games-file');
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

// Read the target file and parse out the entire MTG_GAMES object. Returns
// {} if the file can't be read or parsed. Preserving the whole object lets
// us keep top-level keys like `lastUpdated` instead of just the games array.
async function _sgReadExisting() {
  if (!SG.handle) return {};
  try {
    const file = await SG.handle.getFile();
    const text = await file.text();
    if (!text || !text.trim()) return {};
    const match = text.match(/var\s+MTG_GAMES\s*=\s*(\{[\s\S]*\})\s*;?\s*$/);
    if (!match) {
      console.warn('[SG] existing file did not match MTG_GAMES pattern; treating as empty');
      return {};
    }
    const parsed = JSON.parse(match[1]);
    return parsed && typeof parsed === 'object' ? parsed : {};
  } catch (e) {
    console.warn('[SG] could not read existing file:', e);
    return {};
  }
}

// Safe merge: localStorage wins on duplicate IDs (it reflects the latest
// in-browser state — any edits to notes/outcomes are there). File-only
// games are preserved — they don't vanish because someone's localStorage
// happened to be stale or empty. Top-level non-`games` keys (lastUpdated,
// etc.) are preserved on the way through.
async function _sgBuildFileContent() {
  const localGames = JSON.parse(localStorage.getItem('mtg_games') || '[]');
  const existingObj = await _sgReadExisting();
  const existingGames = Array.isArray(existingObj.games) ? existingObj.games : [];

  const byId = new Map();
  for (const g of existingGames) {
    if (g && g.id) byId.set(g.id, g);
  }
  for (const g of localGames) {
    if (g && g.id) byId.set(g.id, g);
  }
  const merged = Array.from(byId.values());
  merged.sort((a, b) => (a.date || a.id || '').localeCompare(b.date || b.id || ''));

  // Preserve any other top-level keys the file had (lastUpdated, schemaVersion,
  // whatever future metadata gets added) — only `games` and `lastUpdated` are
  // actively managed by this code.
  const out = Object.assign({}, existingObj, {
    games: merged,
    lastUpdated: new Date().toISOString()
  });

  const stats = {
    existingCount: existingGames.length,
    localCount: localGames.length,
    mergedCount: merged.length,
    addedFromLocal: merged.length - existingGames.length
  };

  return {
    content: 'var MTG_GAMES = ' + JSON.stringify(out, null, 2) + ';\n',
    merged,
    stats
  };
}

function _sgRelativeTime(iso) {
  if (!iso) return 'never synced';
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60_000) return 'synced just now';
  if (diff < 3_600_000) return 'synced ' + Math.floor(diff / 60_000) + 'm ago';
  if (diff < 86_400_000) return 'synced ' + Math.floor(diff / 3_600_000) + 'h ago';
  return 'synced ' + Math.floor(diff / 86_400_000) + 'd ago';
}

function _sgSetState(state, overrideStatus) {
  const { btn, label, statusEl, lastSyncedAt, filename } = SG;
  if (!btn || !label || !statusEl) return;
  ['not-set','ready','saving','saved'].forEach(s => {
    btn.classList.remove(s);
    statusEl.classList.remove(s);
  });
  btn.classList.add(state);
  statusEl.classList.add(state);
  if (overrideStatus) { statusEl.textContent = overrideStatus; return; }
  switch (state) {
    case 'not-set':
      label.textContent = '⚠ SAVE NOT SET';
      statusEl.textContent = 'click to link file';
      break;
    case 'ready':
      label.textContent = '💾 Save Games';
      statusEl.textContent = (filename ? filename + ' · ' : '') + _sgRelativeTime(lastSyncedAt);
      break;
    case 'saving':
      label.textContent = '⏳ Saving...';
      statusEl.textContent = 'writing to file';
      break;
    case 'saved':
      label.textContent = '✓ Saved';
      statusEl.textContent = 'just now';
      setTimeout(() => _sgSetState('ready'), 1800);
      break;
  }
}

async function _sgInit() {
  SG.btn = document.getElementById('saveGamesBtn');
  SG.label = document.getElementById('sgLabel');
  SG.statusEl = document.getElementById('sgStatus');
  if (!SG.btn || !SG.label || !SG.statusEl) return;

  if (!window.showSaveFilePicker) {
    SG.btn.disabled = true;
    _sgSetState('not-set', 'use Chrome or Edge');
    return;
  }

  SG.lastSyncedAt = localStorage.getItem('mtg_gamesSaveLastAt') || null;

  try {
    const handle = await _sgLoadHandle();
    if (handle) {
      SG.handle = handle;
      SG.filename = handle.name || null;
      const perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        _sgSetState('ready');
      } else {
        _sgSetState('not-set', 'click to reconnect ' + (handle.name || 'file'));
      }
    } else {
      _sgSetState('not-set');
    }
  } catch (e) {
    console.warn('[SG] init failed:', e);
    _sgSetState('not-set');
  }

  // Tick the relative time every 30s while linked
  if (SG.tickTimer) clearInterval(SG.tickTimer);
  SG.tickTimer = setInterval(() => {
    if (SG.btn && SG.btn.classList.contains('ready')) {
      SG.statusEl.textContent = (SG.filename ? SG.filename + ' · ' : '') + _sgRelativeTime(SG.lastSyncedAt);
    }
  }, 30_000);
}

async function saveGamesClick() {
  if (!SG.btn) return;
  try {
    // Need a handle — either pick one or re-grant permission on existing
    if (!SG.handle) {
      SG.handle = await window.showSaveFilePicker({
        suggestedName: 'games.js',
        types: [{ description: 'JavaScript', accept: { 'application/javascript': ['.js'] } }]
      });
      await _sgSaveHandle(SG.handle);
      SG.filename = SG.handle.name || 'games.js';
    } else {
      const perm = await SG.handle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') {
        const req = await SG.handle.requestPermission({ mode: 'readwrite' });
        if (req !== 'granted') {
          _sgSetState('not-set', 'permission denied');
          return;
        }
      }
    }

    _sgSetState('saving');
    const { content, merged, stats } = await _sgBuildFileContent();

    // Defensive: if merge would reduce game count and localStorage looks
    // empty, something is off — abort rather than silently destroy data.
    if (stats.mergedCount < stats.existingCount) {
      _sgSetState('not-set', 'aborted: would lose ' + (stats.existingCount - stats.mergedCount) + ' games');
      console.error('[SG] aborted save — merge count < existing count', stats);
      return;
    }

    const w = await SG.handle.createWritable();
    await w.write(content);
    await w.close();

    // Sync localStorage to the merged result — next page load sees the
    // full game list (important if file had games localStorage didn't).
    localStorage.setItem('mtg_games', JSON.stringify(merged));

    SG.lastSyncedAt = new Date().toISOString();
    localStorage.setItem('mtg_gamesSaveLastAt', SG.lastSyncedAt);
    _sgSetState('saved');
    const added = stats.mergedCount - stats.existingCount;
    if (added > 0) {
      setTimeout(() => { if (SG.statusEl) SG.statusEl.textContent = '+' + added + ' new · just now'; }, 50);
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      // user cancelled picker
      _sgSetState(SG.handle ? 'ready' : 'not-set');
      return;
    }
    console.error('[SG] save failed:', e);
    _sgSetState('not-set', 'error: ' + (e.message || 'unknown').slice(0, 28));
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  // Returns array of player IDs whose turn it currently is

  if (!seatOrder || currentTurnIdx < 0) return [];

function build2HGTeams() {
  // Build teams from manual assignments if available, else auto-pair
  const players = activePod.map(id => DATA.pod.players.find(p => p.id === id)).filter(Boolean);
  const teams = [];
  const playerTeam = {};

  // Check if we have manual assignments for all active players
  const hasManual = players.every(p => manualTeamAssignments[p.id] !== undefined);

  if (hasManual) {
    // Group by assigned team index
    const grouped = {};
    players.forEach(p => {
      const ti = manualTeamAssignments[p.id];
      if (!grouped[ti]) grouped[ti] = [];
      grouped[ti].push(p.id);
    });
    // Build teams in order
    Object.keys(grouped).sort((a,b) => a - b).forEach((ti, idx) => {
      teams.push({ id: 'team' + (idx + 1), members: grouped[ti], life: 60 });
    });
  } else {
    // Auto-pair fallback (legacy behavior)
    const s = seededShuffle(players);
    for (let i = 0; i < s.length; i += 2) {
      const members = [s[i].id];
      if (s[i + 1]) members.push(s[i + 1].id);
      teams.push({ id: 'team' + (teams.length + 1), members, life: 60 });
    }
  }

  teams.forEach((t, ti) => t.members.forEach(pid => { playerTeam[pid] = ti; }));
  return { teams, playerTeam };
}

// 2HG team colors for visual indicators
const TEAM_COLORS = ['var(--blue)', 'var(--orange)', 'var(--green)', 'var(--mtg-gold)'];
const TEAM_COLOR_HEX = ['#007EFF', '#E67201', '#1BBA01', '#C9A849'];
const TEAM_BG = ['rgba(0,126,255,0.12)', 'rgba(230,114,1,0.12)', 'rgba(27,186,1,0.12)', 'rgba(201,168,73,0.12)'];
const TEAM_BORDER = ['rgba(0,126,255,0.35)', 'rgba(230,114,1,0.35)', 'rgba(27,186,1,0.35)', 'rgba(201,168,73,0.35)'];

// Star enemy assignments — built during initGameState when variant is 'star'
// Uses actual seat order (slotAssignments) so dragging seats updates enemies
let starEnemies = null; // { pid: [enemyPid1, enemyPid2] }

function buildStarEnemies() {
  // Use actual clockwise seat order from the table layout
  const seated = deriveSeatOrder(); // pids in clockwise slot order
  const n = seated.length;
  if (n < 3) return {};
  const enemyOffset1 = Math.floor(n / 2);
  const enemyOffset2 = Math.ceil(n / 2);
  const enemies = {};
  seated.forEach((pid, i) => {
    const e1 = seated[(i + enemyOffset1) % n];
    const e2 = seated[(i + enemyOffset2) % n];
    enemies[pid] = e1 === e2 ? [e1] : [e1, e2];
  });
  return enemies;
}

// Kingdoms role assignments
let kingdomsRoles = null; // { pid: 'King'|'Knight'|'Bandit'|'Usurper' }

function buildKingdomsRoles() {
  const players = activePod.map(id => DATA.pod.players.find(p => p.id === id)).filter(Boolean);
  const s = seededShuffle(players);
  const roleList = ['King','Knight','Bandit','Bandit'];
  if (s.length >= 5) roleList.push('Usurper');
  if (s.length >= 6) roleList.push('Bandit');
  if (s.length >= 7) roleList.push('Knight');
  const roles = {};
  s.forEach((p, i) => { if (i < roleList.length) roles[p.id] = roleList[i]; });
  return roles;
}

// Archenemy hard mode toggle
let aeHardMode = load('aeHardMode', false);

function initGameState() {
  const variant = activeVariant || 'standard';

  // Build variant-specific data structures
  if (variant === '2hg') teamData = build2HGTeams();
  else teamData = null;
  if (variant === 'star') starEnemies = buildStarEnemies();
  else starEnemies = null;
  if (variant === 'kingdoms') kingdomsRoles = buildKingdomsRoles();
  else kingdomsRoles = null;

  const state = {
    variant,
    startingLife: 40, // default — overridden per-player below
    players: {},
    globals: {
      monarchId: null,
      initiativeId: null,
      dayNight: null
    },
    log: [],
    currentTurnEvents: []
  };

  activePod.forEach(pid => {
    // Determine role for variant-specific life
    let role = null;
    if (variant === 'kingdoms' && kingdomsRoles) role = kingdomsRoles[pid];
    if (variant === 'archenemy' && aeVillain === pid) role = 'archenemy';
    const life = getStartingLife(variant, role);

    state.players[pid] = {
      life,
      poison: 0,
      energy: 0,
      experience: 0,
      rad: 0,
      commanderCasts: 0,
      commanderZone: 'commandZone',
      partnerCasts: 0,
      partnerZone: 'commandZone',
      hasCityBlessing: false,
      commanderDamage: {},
      damageDealt: 0,
      damageTaken: 0,
      isDead: false,
      deathCause: null,  // 'life' | 'poison' | 'commander' | null
      deathTurn: null
    };
    activePod.forEach(oid => {
      if (oid !== pid) state.players[pid].commanderDamage[oid] = 0;
    });
  });
  return state;
}

function logGameEvent(type, data) {
  if (!gameState) return;
  gameState.currentTurnEvents.push({
    ts: Date.now(),
    type: type,
    ...data
  });
  // Live-update drawer if open (shows buffered events under current turn)
  if (_logDrawerOpen) renderLogDrawerContent();
}

function flushTurnLog(pid, turnNum, turnDurationMs) {
  if (!gameState) return;
  const events = gameState.currentTurnEvents.slice();
  gameState.currentTurnEvents = [];
  // Always log a turn entry even if no events (shows the turn happened)
  gameState.log.push({
    ts: Date.now(),
    turn: turnNum,
    playerId: pid,
    durationMs: turnDurationMs || 0,
    events: events
  });
  // Update drawer + handle
  if (_logDrawerOpen) renderLogDrawerContent();
  const handle = document.getElementById('logDrawerHandle');
  if (handle) {
    const ct = gameState.log.length;
    handle.textContent = '📜 LOG' + (ct > 0 ? ' (' + ct + ')' : '');
  }
}

function updateTurnHQDisplay() {
  const left = document.getElementById('leftPanel');
  if (!left) return;
  // Preserve scroll position across innerHTML rebuild (fixes scroll drift on timer tick)
  const scrollTop = left.scrollTop;
  left.innerHTML = renderTurnHQ();
  left.scrollTop = scrollTop;
}

// ---- GENERIC COUNTER ADJUSTMENT ----
const COUNTER_LOG_KEYS = { life:'newLife', poison:'newPoison', energy:'newEnergy', experience:'newExp', rad:'newRad' };
const COUNTER_SEAT_UPDATE = { life:true, poison:true }; // counters that also update seat display

function adjustCounter(pid, type, amount) {
  if (!gameState || !gameState.players[pid]) return;
  const p = gameState.players[pid];
  const oldVal = p[type] || 0;
  p[type] = Math.max(0, oldVal + amount);
  const actualDelta = p[type] - oldVal;
  // Track damage for life loss and poison gain (attributed to active turn player)
  if ((type === 'life' && actualDelta < 0) || (type === 'poison' && actualDelta > 0)) {
    const dmgAmount = type === 'life' ? Math.abs(actualDelta) : actualDelta;
    p.damageTaken += dmgAmount;
    // Attribute to active turn player if it's someone else
    const activePid = (seatOrder && seatOrder[currentTurnIdx]) || null;
    if (activePid && activePid !== pid && gameState.players[activePid]) {
      gameState.players[activePid].damageDealt += dmgAmount;
    }
  }
  logGameEvent(type, { playerId: pid, amount, [COUNTER_LOG_KEYS[type]]: p[type] });

  // 2HG: sync life across teammates (shared life pool)
  if (type === 'life' && (activeVariant === '2hg') && teamData) {
    const ti = teamData.playerTeam[pid];
    if (ti !== undefined) {
      teamData.teams[ti].life = p.life; // keep team life in sync
      teamData.teams[ti].members.forEach(mid => {
        if (mid !== pid && gameState.players[mid]) {
          gameState.players[mid].life = p.life;
          updateSeatLifeDisplay(mid);
        }
      });
    }
  }

  if (COUNTER_SEAT_UPDATE[type]) updateSeatLifeDisplay(pid);
  if (turnHQFocus === pid) updateTurnHQDisplay();
  // Check for death conditions
  if (type === 'life' && p.life <= 0) {
    if ((activeVariant === '2hg') && teamData) {
      // In 2HG, both teammates die when team life hits 0
      const ti = teamData.playerTeam[pid];
      if (ti !== undefined) teamData.teams[ti].members.forEach(mid => checkDeath(mid));
    } else {
      checkDeath(pid);
    }
  }
  if (type === 'poison' && p.poison >= 10) checkDeath(pid);
}

// Named wrappers — called from inline onclick handlers
function adjustLife(pid, amount) { adjustCounter(pid, 'life', amount); }
function adjustPoison(pid, amount) { adjustCounter(pid, 'poison', amount); }
function adjustEnergy(pid, amount) { adjustCounter(pid, 'energy', amount); }
function adjustExperience(pid, amount) { adjustCounter(pid, 'experience', amount); }
function adjustRad(pid, amount) { adjustCounter(pid, 'rad', amount); }

function clearCounter(pid, type) {
  if (!gameState || !gameState.players[pid]) return;
  const p = gameState.players[pid];
  const oldVal = p[type] || 0;
  if (oldVal === 0) return;
  p[type] = 0;
  logGameEvent(type, { playerId: pid, amount: -oldVal, [COUNTER_LOG_KEYS[type]]: 0 });
  if (COUNTER_SEAT_UPDATE[type]) updateSeatLifeDisplay(pid);
  updateTurnHQDisplay();
}

function adjustCommanderDamage(targetPid, sourcePid, amount) {
  if (!gameState || !gameState.players[targetPid] || !gameState.players[sourcePid]) return;
  const current = gameState.players[targetPid].commanderDamage[sourcePid] || 0;
  const newVal = Math.max(0, current + amount);
  const actualDelta = newVal - current;
  gameState.players[targetPid].commanderDamage[sourcePid] = newVal;
  // Commander damage also reduces life (it's combat damage)
  if (actualDelta !== 0) {
    const target = gameState.players[targetPid];
    target.life = Math.max(0, target.life - actualDelta);
    logGameEvent('life', { playerId: targetPid, amount: -actualDelta, newLife: target.life });
  }
  // Track damage dealt/taken (only positive damage — corrections via minus don't count)
  if (actualDelta > 0) {
    gameState.players[sourcePid].damageDealt += actualDelta;
    gameState.players[targetPid].damageTaken += actualDelta;
  }
  logGameEvent('commander_damage', { targetPid, sourcePid, amount, newTotal: newVal });
  updateSeatLifeDisplay(targetPid);
  if (turnHQFocus === targetPid || turnHQFocus === sourcePid) updateTurnHQDisplay();
  // Check for death (life or commander lethal)
  if (gameState.players[targetPid].life <= 0 || newVal >= 21) checkDeath(targetPid);
}

// ---- PLAYER DEATH SYSTEM ----
function checkDeath(pid) {
  if (!gameState || !gameState.players[pid]) return;
  const p = gameState.players[pid];
  if (p.isDead) return; // already dead

  let cause = null;
  let killerPid = null;
  if (p.life <= 0) cause = 'life';
  if (p.poison >= 10) cause = 'poison';
  // Check commander damage from any source
  for (const [oid, dmg] of Object.entries(p.commanderDamage)) {
    if (dmg >= 21) { cause = 'commander'; killerPid = oid; break; }
  }

  if (!cause) return;
  showDeathModal(pid, cause, killerPid);
}

    poison: { icon: '☠', text: `${pState.poison} poison counters` },

  };
  const causeInfo = causeMap[cause] || { icon: '💀', text: 'Eliminated' };

  // Flavor quotes
  const quotes = [
    "The battlefield claims another.",
    "Their spark has faded.",
    "Gone, but not forgotten... until next game.",
    "The graveyard grows.",
    "Another planeswalker falls.",
    "To the command zone... permanently.",
    "Shuffled into the great library.",
    "Their mana pool has run dry.",
    "Exiled from existence.",
    "The stack has resolved... fatally."

      ${deck && deck.commanderPartner && deck.commanderPartnerArt
        ? `<div class="death-modal-art" style="background:none;display:flex;overflow:hidden">
            <div style="flex:1;background:url('${deck.commanderArt}') center/cover"></div>
            <div style="width:1px;background:rgba(0,0,0,0.6)"></div>
            <div style="flex:1;background:url('${deck.commanderPartnerArt}') center/cover"></div>
          </div>`
        : deck && deck.commanderArt ? `<div class="death-modal-art" style="background-image:url('${deck.commanderArt}')"></div>` : ''}
      <div class="death-modal-body">
        <div class="death-modal-icon">${causeInfo.icon}</div>
        <div class="death-modal-name" style="color:${color}">${esc(player?.name || pid)}</div>
        <div class="death-modal-deck">${deck ? esc(deck.name) : ''}</div>
        <div class="death-modal-cause">${causeInfo.text}</div>
        <div class="death-modal-quote">"${quote}"</div>
        <div class="death-modal-stats">
          <div class="death-stat"><span>Damage Dealt</span><span class="death-stat-val">${pState.damageDealt}</span></div>
          <div class="death-stat"><span>Damage Taken</span><span class="death-stat-val">${pState.damageTaken}</span></div>
          <div class="death-stat"><span>Cmdr Damage</span><span class="death-stat-val">${totalCmdrDmg}</span></div>
          <div class="death-stat"><span>Turn Time</span><span class="death-stat-val">${turnTime}</span></div>
        </div>
        <div class="death-modal-btns">
          <button class="death-btn cancel" onclick="dismissDeathModal()">Not Dead Yet</button>

function dismissDeathModal() {
  const modal = document.getElementById('deathModal');
  if (modal) modal.style.display = 'none';
}

function confirmDeath(pid, cause) {
  if (!gameState || !gameState.players[pid]) return;
  const p = gameState.players[pid];
  p.isDead = true;
  p.deathCause = cause;
  p.deathTurn = turnNumber;
  logGameEvent('death', { playerId: pid, cause, turn: turnNumber });
  dismissDeathModal();

  // Gray out the seat card
  const seatNode = document.querySelector(`.seat-node[data-pid="${pid}"]`);
  if (seatNode) seatNode.classList.add('dead');

  // If it's this player's turn, auto-advance
  if (seatOrder && seatOrder[currentTurnIdx] === pid) {
    nextTurn();
  }

  // Update Turn HQ if focused on dead player
  if (turnHQFocus === pid) {
    turnHQFocus = null;
    updateTurnHQDisplay();
  }

  // Mode-specific win condition checks
  const variant = activeVariant || 'standard';
  const alive = activePod.filter(id => !gameState.players[id]?.isDead);

  // Star: check if any player's enemies are both dead
  if (variant === 'star' && starEnemies) {
    for (const checkPid of alive) {
      const enemies = starEnemies[checkPid] || [];
      const allEnemiesDead = enemies.length > 0 && enemies.every(eid => gameState.players[eid]?.isDead);
      if (allEnemiesDead) {
        const winner = DATA.pod.players.find(p => p.id === checkPid);
        toast(`⭐ ${winner?.name || checkPid} wins! Both enemies eliminated!`);
        pauseGame();
        return;
      }
    }
  }

  // Kingdoms: check win conditions by role
  if (variant === 'kingdoms' && kingdomsRoles) {
    const kingPid = Object.entries(kingdomsRoles).find(([id, role]) => role === 'King')?.[0];
    if (kingPid && gameState.players[kingPid]?.isDead) {
      // King is dead — Bandits win (or Usurper if they dealt the kill)
      toast('👑 The King has fallen! Bandits win!');
      pauseGame();
      return;
    }
    // Check if all bandits + usurper are dead → King + Knight win
    const threats = Object.entries(kingdomsRoles)
      .filter(([id, role]) => role === 'Bandit' || role === 'Usurper')
      .map(([id]) => id);
    if (threats.length > 0 && threats.every(id => gameState.players[id]?.isDead)) {
      toast('👑 All threats eliminated! The King and Knight win!');
      pauseGame();
      return;
    }
  }

  // 2HG: check if all members of a team are dead → other team wins
  if (variant === '2hg' && teamData) {
    teamData.teams.forEach((team, ti) => {
      const teamAlive = team.members.filter(id => !gameState.players[id]?.isDead);
      if (teamAlive.length === 0) {
        // This team is eliminated — find surviving teams
        const survivingTeams = teamData.teams.filter((t, i) => i !== ti && t.members.some(id => !gameState.players[id]?.isDead));
        if (survivingTeams.length === 1) {
          const names = survivingTeams[0].members.map(id => DATA.pod.players.find(p => p.id === id)?.name || id).join(' & ');
          toast(`👥 Team ${names} wins!`);
          pauseGame();
          return;
        }
      }
    });
    return; // don't fall through to standard check for 2HG
  }

  // Standard / Archenemy: last player standing
  if (alive.length === 1) {
    toast(`🏆 ${DATA.pod.players.find(p => p.id === alive[0])?.name || alive[0]} is the last one standing!`);
    pauseGame();
  } else if (alive.length === 0) {
    toast('Everyone is dead. That escalated quickly.');
    pauseGame();
  }
}

function setMonarch(pid) {
  if (!gameState) return;
  if (gameState.globals.monarchId === pid) return;
  const oldMonarch = gameState.globals.monarchId;
  gameState.globals.monarchId = pid;
  logGameEvent('monarch', { playerId: pid, oldMonarch: oldMonarch });
  // Update seat badges for old and new monarch
  if (oldMonarch) updateSeatLifeDisplay(oldMonarch);
  updateSeatLifeDisplay(pid);
  if (turnHQFocus) updateTurnHQDisplay();
}

function setInitiative(pid) {
  if (!gameState) return;
  if (gameState.globals.initiativeId === pid) return;
  const oldInit = gameState.globals.initiativeId;
  gameState.globals.initiativeId = pid;
  logGameEvent('initiative', { playerId: pid, oldInit: oldInit });
  // Update seat badges for old and new initiative holder
  if (oldInit) updateSeatLifeDisplay(oldInit);
  updateSeatLifeDisplay(pid);
  if (turnHQFocus) updateTurnHQDisplay();
}

function toggleCityBlessing(pid) {
  if (!gameState || !gameState.players[pid]) return;
  gameState.players[pid].hasCityBlessing = !gameState.players[pid].hasCityBlessing;
  logGameEvent('city_blessing', { playerId: pid, active: gameState.players[pid].hasCityBlessing });
  updateSeatLifeDisplay(pid);
  if (turnHQFocus === pid) updateTurnHQDisplay();
}

function castCommander(pid) {
  if (!gameState || !gameState.players[pid]) return;
  gameState.players[pid].commanderCasts++;
  gameState.players[pid].commanderZone = 'battlefield';
  const tax = gameState.players[pid].commanderCasts > 0 ? gameState.players[pid].commanderCasts * 2 : 0;
  logGameEvent('commander_cast', { playerId: pid, casts: gameState.players[pid].commanderCasts, tax: tax });
  if (turnHQFocus === pid) updateTurnHQDisplay();
}

function moveCommanderZone(pid, zone) {
  if (!gameState || !gameState.players[pid]) return;
  const oldZone = gameState.players[pid].commanderZone;
  gameState.players[pid].commanderZone = zone;
  logGameEvent('commander_zone', { playerId: pid, oldZone: oldZone, newZone: zone });
  if (turnHQFocus === pid) updateTurnHQDisplay();
}

function castPartner(pid) {
  if (!gameState || !gameState.players[pid]) return;
  if (!gameState.players[pid].partnerCasts) gameState.players[pid].partnerCasts = 0;
  gameState.players[pid].partnerCasts++;
  gameState.players[pid].partnerZone = 'battlefield';
  const tax = gameState.players[pid].partnerCasts * 2;
  logGameEvent('partner_cast', { playerId: pid, casts: gameState.players[pid].partnerCasts, tax: tax });
  if (turnHQFocus === pid) updateTurnHQDisplay();
}

function movePartnerZone(pid, zone) {
  if (!gameState || !gameState.players[pid]) return;
  const oldZone = gameState.players[pid].partnerZone || 'commandZone';
  gameState.players[pid].partnerZone = zone;
  logGameEvent('partner_zone', { playerId: pid, oldZone: oldZone, newZone: zone });
  if (turnHQFocus === pid) updateTurnHQDisplay();
}

function focusTurnHQ(pid) {
  turnHQFocus = pid;
  updateTurnHQDisplay();
}

function defocusTurnHQ() {
  turnHQFocus = null;
  updateTurnHQDisplay();
}

function getHQPlayer() {
  if (turnHQFocus) return turnHQFocus;
  if (timerRunning && seatOrder && currentTurnIdx >= 0) return seatOrder[currentTurnIdx];
  if (activePod.length > 0) return activePod[0];
  return null;
}

function updateSeatLifeDisplay(pid) {
  if (!gameState || !gameState.players[pid]) return;
  const seatNode = document.querySelector(`.seat-node[data-pid="${pid}"]`);
  if (!seatNode) return;
  const pState = gameState.players[pid];
  const lifeRow = seatNode.querySelector('.seat-life-row');
  if (lifeRow) {
    lifeRow.innerHTML = `
      <button class="seat-life-btn minus" onclick="adjustLife('${pid}', -1); event.stopPropagation()">−</button>
      <div class="seat-life-num">${pState.life}</div>
      <button class="seat-life-btn plus" onclick="adjustLife('${pid}', 1); event.stopPropagation()">+</button>
    `;
  }
  // Rebuild status badges
  const badges = [];
  if (pState.poison > 0) badges.push(`<span class="seat-badge poison">☠${pState.poison}</span>`);
  if (pState.energy > 0) badges.push(`<span class="seat-badge energy">⚡${pState.energy}</span>`);
  if (pState.experience > 0) badges.push(`<span class="seat-badge experience">✦${pState.experience}</span>`);
  if (pState.rad > 0) badges.push(`<span class="seat-badge rad">☢${pState.rad}</span>`);
  if (gameState.globals.monarchId === pid) badges.push(`<span class="seat-badge monarch">👑</span>`);
  if (gameState.globals.initiativeId === pid) badges.push(`<span class="seat-badge initiative">🏰</span>`);
  if (pState.hasCityBlessing) badges.push(`<span class="seat-badge city">🏙</span>`);
  const maxCmdr = Object.entries(pState.commanderDamage).reduce((max, [oid, dmg]) => dmg > max.dmg ? {oid, dmg} : max, {oid:null, dmg:0});
  if (maxCmdr.dmg >= 11) {
    const srcColor = OWNER_COLORS[maxCmdr.oid] || '#888';
    badges.push(`<span class="seat-badge cmdr-warn" style="border-color:${srcColor}88">⚔${maxCmdr.dmg}</span>`);
  }
  // Update or create badge container
  let badgeEl = seatNode.querySelector('.seat-status-badges');
  if (badges.length > 0) {
    if (!badgeEl) {
      badgeEl = document.createElement('div');
      badgeEl.className = 'seat-status-badges';
      const body = seatNode.querySelector('.seat-node-body');
      if (body && lifeRow) body.insertBefore(badgeEl, lifeRow.nextSibling);
    }
    if (badgeEl) badgeEl.innerHTML = badges.join('');
  } else if (badgeEl) {
    badgeEl.remove();
  }
}

function startTurnTracking() {
  // Begin turns — starts with firstPlayer if set, else seat 0
  turnTimes = {};
  activePod.forEach(id => { turnTimes[id] = 0; });
  if (firstPlayerId && seatOrder) {
    currentTurnIdx = seatOrder.indexOf(firstPlayerId);
    if (currentTurnIdx < 0) currentTurnIdx = 0;
  } else {
    currentTurnIdx = 0;
  }
  turnNumber = 1;
  turnStartTime = Date.now();
  turnPausedElapsed = 0;
  updateTurnIndicators();
}

function nextTurn() {
  if (!timerRunning || gamePaused || !seatOrder || seatOrder.length === 0) return;
  const variant = activeVariant || 'standard';
  // Bank current player's turn time
  const currentPid = seatOrder[currentTurnIdx];
  const turnMs = (currentPid && turnStartTime) ? (Date.now() - turnStartTime) + turnPausedElapsed : 0;
  if (currentPid && turnStartTime) {
    turnTimes[currentPid] = (turnTimes[currentPid] || 0) + turnMs;
  }
  // Flush turn log for outgoing player
  flushTurnLog(currentPid, turnNumber, turnMs);

  const firstIdx = firstPlayerId ? seatOrder.indexOf(firstPlayerId) : 0;

  // For 2HG: skip past all teammates of current player
  if (variant === '2hg' && teamData) {
    const curTeam = teamData.playerTeam[currentPid];
    let safety = 0;
    // Advance past all members of current team
    do {
      currentTurnIdx = (currentTurnIdx + 1) % seatOrder.length;
      if (currentTurnIdx === (firstIdx >= 0 ? firstIdx : 0)) turnNumber++;
      safety++;
    } while (
      teamData.playerTeam[seatOrder[currentTurnIdx]] === curTeam &&
      safety < seatOrder.length
    );
    // Now skip dead players / dead teams
    safety = 0;
    while (gameState?.players[seatOrder[currentTurnIdx]]?.isDead && safety < seatOrder.length) {
      currentTurnIdx = (currentTurnIdx + 1) % seatOrder.length;
      if (currentTurnIdx === (firstIdx >= 0 ? firstIdx : 0)) turnNumber++;
      safety++;
    }
    if (safety >= seatOrder.length) { pauseGame(); return; }
  }
  // For Archenemy: alternate villain ↔ first living hero
  else if (variant === 'archenemy' && aeVillain) {
    if (currentPid === aeVillain) {
      // Villain just went → find first living hero
      const heroIdx = seatOrder.findIndex(id => id !== aeVillain && !(gameState?.players[id]?.isDead));
      if (heroIdx < 0) { pauseGame(); return; } // all heroes dead
      currentTurnIdx = heroIdx;
    } else {
      // Heroes just went → villain's turn
      const villIdx = seatOrder.indexOf(aeVillain);
      if (villIdx < 0 || gameState?.players[aeVillain]?.isDead) { pauseGame(); return; }
      currentTurnIdx = villIdx;
      turnNumber++;
    }
  }
  // Standard / Star / Kingdoms / Planechase: advance one seat, skip dead
  else {
    let safety = 0;
    do {
      currentTurnIdx = (currentTurnIdx + 1) % seatOrder.length;
      if (currentTurnIdx === (firstIdx >= 0 ? firstIdx : 0)) turnNumber++;
      safety++;
    } while (
      gameState && gameState.players[seatOrder[currentTurnIdx]]?.isDead &&
      safety < seatOrder.length
    );
    if (safety >= seatOrder.length) { pauseGame(); return; }
  }

  turnStartTime = Date.now();
  turnPausedElapsed = 0;
  turnHQFocus = null; // snap back to active player
  pcRollCount = 0; // reset planar die cost for new turn
  const costLabel = document.getElementById('pcRollCost');
  if (costLabel) costLabel.innerHTML = '<span style="font-size:13px;color:var(--green);font-weight:600">Free</span>';

  // Auto-draw scheme on Archenemy's turn
  if (variant === 'archenemy' && aeActive && seatOrder[currentTurnIdx] === aeVillain) {
    aeDraw();
  }

  updateTurnIndicators();
}

function getNextTurnLabel() {
  // Contextual label for the Next Turn button
  if (activeVariant === 'archenemy' && aeVillain && seatOrder && currentTurnIdx >= 0) {
    const pid = seatOrder[currentTurnIdx];
    if (pid === aeVillain) return '⏭ Heroes\' Turn';
    return '⏭ Villain\'s Turn';
  }
  return '⏭ Next Turn';
}

function pauseGame() {
  if (!timerRunning || gamePaused) return;
  gamePaused = true;
  pauseStart = Date.now();
  // Freeze current turn elapsed
  if (turnStartTime) {
    turnPausedElapsed += (Date.now() - turnStartTime);
    turnStartTime = null;
  }
  clearInterval(timerInterval);
  updateTableControls();
  updateTurnIndicators();
  toast('⏸ Game paused');
}

function resumeGame() {
  if (!gamePaused) return;
  gamePaused = false;
  // Add pause duration to total pause offset
  if (pauseStart) totalPauseMs += (Date.now() - pauseStart);
  pauseStart = null;
  // Restart turn clock
  turnStartTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
  updateTimer();
  updateTableControls();
  updateTurnIndicators();
  toast('▶ Game resumed');
}

function getPlayerTurnTime(playerId) {
  // Returns current total turn time in seconds for a player
  let ms = turnTimes[playerId] || 0;
  // If it's this player's active turn, add live elapsed (shared-turn aware)
  if (isPlayersTurn(playerId) && turnStartTime && !gamePaused) {
    ms += (Date.now() - turnStartTime);
  } else if (isPlayersTurn(playerId) && gamePaused) {
    ms += turnPausedElapsed;
  }
  return Math.floor(ms / 1000);
}

function updateTurnIndicators() {
  // Update turn highlight + per-player turn timers on seat nodes (no full re-render)
  const activePids = getActivePlayerIds(); // supports shared turns (2HG, Archenemy)
  const nodes = document.querySelectorAll('.seat-node[data-pid]');
  nodes.forEach(n => {
    const pid = n.dataset.pid;
    const isActive = timerRunning && activePids.includes(pid);
    n.classList.toggle('active-turn', isActive);
    // Update turn timer display
    const timerEl = n.querySelector('.seat-turn-timer');
    if (timerEl) {
      timerEl.textContent = formatTime(getPlayerTurnTime(pid));
      timerEl.classList.toggle('active', isActive);
    }
  });
  // Update table turn info
  const turnInfo = document.querySelector('.table-turn-info');
  if (turnInfo && activePids.length > 0) {
    if (gamePaused) {
      turnInfo.innerHTML = '⏸ Paused';
    } else if (activePids.length === 1) {
      const p = DATA.pod.players.find(pl => pl.id === activePids[0]);
      turnInfo.innerHTML = p ? `${esc(p.name)}'s turn` : '';
    } else {
      // Shared turn — show team or "Heroes' turn"
      const variant = activeVariant || 'standard';
      if (variant === '2hg' && teamData) {
        const ti = teamData.playerTeam[activePids[0]];
        turnInfo.innerHTML = ti !== undefined ? `Team ${ti + 1}'s turn` : '';
      } else if (variant === 'archenemy') {
        turnInfo.innerHTML = '🛡 Heroes\' turn';
      } else {
        const names = activePids.map(id => DATA.pod.players.find(p => p.id === id)?.name || id).join(' & ');
        turnInfo.innerHTML = `${names}'s turn`;
      }
    }
  }
  // Update turn counter
  const turnCounter = document.querySelector('.table-turn-counter');
  if (turnCounter) turnCounter.textContent = 'Turn ' + turnNumber;
  // Update Turn HQ if focused on current player or if auto-following
  if (!turnHQFocus || activePids.includes(turnHQFocus)) updateTurnHQDisplay();
}

function startTimer() {
  if (firstPlayerId) {
    // First player was pre-selected — skip spinner, go straight to timer
    actuallyStartTimer();
    const winner = DATA.pod.players.find(p => p.id === firstPlayerId);
    toast('⏱ Game started! ' + (winner ? winner.name : 'Player') + ' goes first.');
  } else {
    // No first player set — run the spinner, then show Ready button
    const tableStartBtn = document.querySelector('.table-btn.start');
    if (tableStartBtn) { tableStartBtn.disabled = true; tableStartBtn.textContent = '🎲 Rolling...'; }

    spinForFirstPlayer(() => {
      // Spinner landed — don't auto-start, show Ready button
      gameReady = true;
      const winner = firstPlayerId ? DATA.pod.players.find(p => p.id === firstPlayerId) : null;
      const name = winner ? winner.name : 'Someone';
      toast('🎲 ' + name + ' goes first!');
      updateTableControls();
    });
  }
}

function confirmReady() {
  // Called when user clicks Ready after spinner
  gameReady = false;
  actuallyStartTimer();
}

function actuallyStartTimer() {
  // Fresh random background for each game
  showBgVideo();
  timerStart = Date.now();
  timerRunning = true;
  gamePaused = false;
  totalPauseMs = 0;
  gameState = initGameState();
  turnHQFocus = null;
  timerInterval = setInterval(updateTimer, 1000);
  const timerBtn = document.getElementById('timerBtn');
  if (timerBtn) { timerBtn.textContent = 'End Game'; timerBtn.className = 'timer-btn stop'; }
  document.getElementById('timerDisplay').classList.add('running');
  startTurnTracking();
  // Log game start
  gameState.log.push({
    ts: Date.now(), turn: 0, playerId: null, durationMs: 0,
    events: [{type: 'game_start', ts: Date.now(), players: activePod.slice()}]
  });
  // Full re-render so seat nodes get turn timer elements
  renderAll();
}

function resetGame() {
  // Full reset — stop timer, clear all state, re-render
  timerRunning = false;
  gameReady = false;
  gamePaused = false;
  totalPauseMs = 0;
  pauseStart = null;
  clearInterval(timerInterval);
  timerElapsed = 0;
  timerStart = 0;
  firstPlayerId = null;
  currentTurnIdx = -1;
  turnStartTime = null;
  turnTimes = {};
  turnPausedElapsed = 0;
  turnNumber = 0;
  gameState = null;
  turnHQFocus = null;
  document.getElementById('timerDisplay').textContent = '0:00';
  document.getElementById('timerDisplay').classList.remove('running');
  const timerBtn = document.getElementById('timerBtn');
  if (timerBtn) { timerBtn.textContent = 'Start Game'; timerBtn.className = 'timer-btn start'; }
  // Clear spinner + turn classes from seat nodes
  const nodes = document.querySelectorAll('.seat-node');
  nodes.forEach(n => n.classList.remove('spinner-active','first-player','first-bounce','active-turn'));
  const badges = document.querySelectorAll('.first-player-badge');
  badges.forEach(b => b.remove());
  updateTableControls();
  const tt = document.getElementById('tableTimer');
  if (tt) { tt.textContent = '0:00'; tt.classList.remove('running'); }
  toast('🔄 Game reset');
}

function clearGame() {
  // Clear the last game state and return table to initial "Start Game" position
  closeLogDrawer(); // close drawer if open
  resetGame(); // resets timer, first player, turns, etc.
  // Also re-render the full table center to swap buttons back to "Start Game"
  renderAll();
  toast('🧹 Table cleared — ready for next game');
}

function stopTimer() {
  // Flush final turn before stopping
  if (seatOrder && currentTurnIdx >= 0 && seatOrder[currentTurnIdx] && turnStartTime) {
    const pid = seatOrder[currentTurnIdx];
    const turnMs = (Date.now() - turnStartTime) + turnPausedElapsed;
    turnTimes[pid] = (turnTimes[pid] || 0) + turnMs;
    flushTurnLog(pid, turnNumber, turnMs);
  }
  timerRunning = false;
  gamePaused = false;
  clearInterval(timerInterval);
  timerElapsed = Math.floor((Date.now() - timerStart - totalPauseMs) / 1000);
  currentTurnIdx = -1;
  turnStartTime = null;
  turnPausedElapsed = 0;
  firstPlayerId = null;
  document.getElementById('timerBtn').textContent = 'Start Game';
  document.getElementById('timerBtn').className = 'timer-btn start';
  document.getElementById('timerDisplay').classList.remove('running');
  document.querySelectorAll('.seat-node').forEach(n => n.classList.remove('active-turn'));
  const tt = document.getElementById('tableTimer');
  if (tt) tt.classList.remove('running');
  updateTableControls();
  // Open game logger with duration pre-filled
  openGameLogger(timerElapsed);
  toast('⏱ Game ended — ' + formatTime(timerElapsed));
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - timerStart - totalPauseMs) / 1000);
  const txt = formatTime(elapsed);
  document.getElementById('timerDisplay').textContent = txt;
  // Sync table center timer if present
  const tt = document.getElementById('tableTimer');
  if (tt) tt.textContent = txt;
  // Sync variant game bar timers if present
  const aeBar = document.getElementById('aeBarTimer');
  if (aeBar) aeBar.textContent = txt;
  const hordeBar = document.getElementById('hordeBarTimer');
  if (hordeBar) hordeBar.textContent = txt;
  // Update per-player turn timers
  if (currentTurnIdx >= 0) updateTurnIndicators();
}

function formatTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return m + ':' + String(s).padStart(2,'0');
}

// ---- CARD SOURCE ----
function getCardSource(deckIdOrArchId) {
  const aid = String(deckIdOrArchId);
  if (adamCards && adamCards.decks[aid]) return adamCards.decks[aid];
  if (friendsCards && friendsCards.decks[aid]) return friendsCards.decks[aid];
  const deck = DATA.decks.decks.find(d => String(d.archidektId) === aid || d.id === aid);
  if (deck) {
    if (deck.id && friendsCards && friendsCards.decks[deck.id]) return friendsCards.decks[deck.id];
    if (deck.archidektId && adamCards && adamCards.decks[String(deck.archidektId)]) return adamCards.decks[String(deck.archidektId)];
  }
  return null;
}

// ---- POD PICKER ----
function renderPodChips() {
  let html = DATA.pod.players.map(p => {
    const c = OWNER_COLORS[p.id] || '#888';
    const on = activePod.includes(p.id);
    return `<div class="pod-chip ${on?'active':''}" style="border-color:${on?c:'var(--border)'}" onclick="togglePod('${p.id}')" oncontextmenu="event.preventDefault();openPlayerProfile('${p.id}')">
      <div class="pip" style="background:${c}" onclick="event.stopPropagation();openPlayerProfile('${p.id}')" title="View profile"></div><span>${esc(p.name)}</span>
    </div>`;
  }).join('');
  // Pod action buttons
  if (activePod.length > 0) {
    html += `<div class="pod-action" onclick="clearPod()" title="Clear all">✕</div>`;
  } else {
    html += `<div class="pod-action all" onclick="addAllPlayers()" title="Add all">All</div>`;
  }
  const el = document.getElementById('podChips');
  if (el) el.innerHTML = html;
}

function togglePod(id) {
  const idx = activePod.indexOf(id);
  if (idx >= 0) {
    activePod.splice(idx, 1);
    delete matchupSelections[id];
  } else {
    activePod.push(id);
  }
  // Reset variant if fewer than 2 players
  if (activePod.length < 2 && activeVariant) {
    activeVariant = null;
    save('activeVariant', activeVariant);
    pcActive = false; aeActive = false; hordeActive = false;
  }
  save('activePod', activePod);
  save('matchupSelections', matchupSelections);
  renderAll();
}

function clearPod() {
  activePod = [];
  matchupSelections = {};
  activeVariant = null;
  seatOrder = null;
  slotAssignments = null;
  pcActive = false; aeActive = false; hordeActive = false;
  save('activePod', activePod);
  save('matchupSelections', matchupSelections);
  save('activeVariant', activeVariant);
  save('seatOrder', null);
  save('slotAssignments', null);
  renderAll();
}

function addAllPlayers() {
  activePod = DATA.pod.players.map(p => p.id);
  save('activePod', activePod);
  renderAll();
}

const PC_CHAOS_SVG_SM = pcSvgIcon('chaos', 14, 'var(--mtg-gold)');

function pcGetActivePlayerName() {
  if (!seatOrder || currentTurnIdx < 0) return null;
  const pid = seatOrder[currentTurnIdx];
  const player = DATA?.pod?.players?.find(p => p.id === pid);
  return player?.name || pid || null;
}

function pcLogTravel(plane, cause) {
  if (!plane) return;
  const isPhen = (plane.typeLine||'').toLowerCase().includes('phenomenon');
  pcTravelLog.push({
    plane: plane.name,
    type: isPhen ? 'Phenomenon' : 'Plane',
    walker: pcGetActivePlayerName() || '?',
    turn: turnNumber || 0,
    cause: cause || 'walk',
    time: new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})
  });
}

function pcStart() {
  if (!MTG_PLANECHASE?.planes) { toast('Planechase data not loaded'); return; }
  pcDeck = shuffle(MTG_PLANECHASE.planes);
  pcDiscard = [];
  pcPrevious = null;
  pcTravelLog = [];
  pcActive = true;
  pcCurrent = pcDeck.pop();
  pcLogTravel(pcCurrent, 'start');
  renderAll();
  toast('🌀 Planar deck shuffled — ' + MTG_PLANECHASE.planes.length + ' planes!');
}

function pcPlaneswalk() {
  if (!pcActive) return;
  if (pcDeck.length === 0) { pcDeck = shuffle(pcDiscard); pcDiscard = []; toast('Reshuffled!'); }
  pcPrevious = pcCurrent;
  if (pcCurrent) pcDiscard.push(pcCurrent);
  pcCurrent = pcDeck.pop();
  pcLogTravel(pcCurrent, 'walk');
  renderAll();
  if ((pcCurrent?.typeLine||'').toLowerCase().includes('phenomenon')) {
    pcShowPhenomenon();
  }
}

function pcShowPhenomenon() {
  if (!pcCurrent) return;
  // Remove existing dialog if any
  let overlay = document.getElementById('pcPhenomOverlay');
  if (overlay) overlay.remove();

  const oText = pcCurrent.oracleText || '';
  overlay = document.createElement('div');
  overlay.id = 'pcPhenomOverlay';
  overlay.className = 'pc-phenom-overlay open';
  overlay.innerHTML = `
    <div class="pc-phenom-dialog">
      <div class="pc-phenom-icon">⚡</div>
      <div class="pc-phenom-title">${esc(pcCurrent.name)}</div>
      <div class="pc-phenom-type">${esc(pcCurrent.typeLine || 'Phenomenon')}</div>
      <div class="pc-phenom-sep"></div>
      <div class="pc-phenom-text">${esc(oText)}</div>
      <div class="pc-phenom-hint">Resolve this effect, then planeswalk to the next plane.</div>
      <div class="pc-phenom-btns">
        <button class="pc-phenom-undo" onclick="pcPhenomUndo()">Undo</button>
        <button class="pc-phenom-resolve" onclick="pcPhenomResolve()">Resolve & Walk ⚡</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function pcPhenomResolve() {
  // Close dialog, then planeswalk to next plane (may chain if next is also a phenomenon)
  const overlay = document.getElementById('pcPhenomOverlay');
  if (overlay) overlay.remove();
  pcPlaneswalk();
}

function pcPhenomUndo() {
  // Close dialog and undo back to previous plane
  const overlay = document.getElementById('pcPhenomOverlay');
  if (overlay) overlay.remove();
  pcUndo();
}

function pcChaos() {
  if (!pcActive || !pcCurrent) return;
  toast('🌪 CHAOS on ' + pcCurrent.name + '!');
  const frame = document.getElementById('pcFrame');
  if (frame) { frame.style.boxShadow = '0 0 60px rgba(201,168,73,0.4)'; setTimeout(() => frame.style.boxShadow = '', 1500); }
}

function pcUndo() {
  if (!pcPrevious) { toast('Nothing to undo'); return; }
  if (pcCurrent) pcDeck.push(pcCurrent);
  const idx = pcDiscard.indexOf(pcPrevious);
  if (idx >= 0) pcDiscard.splice(idx, 1);
  pcCurrent = pcPrevious;
  pcPrevious = null;
  renderAll();
}

function pcReset() {
  // Return to pre-start state — no plane showing, just the shuffle button
  pcActive = false;
  pcDeck = [];
  pcDiscard = [];
  pcCurrent = null;
  pcPrevious = null;
  pcRollCount = 0;
  pcTravelLog = [];
  renderAll();
  toast('🌀 Planechase reset — shuffle to start again');
}

function pcRollDie() {
  if (!pcActive) return;
  const die = document.getElementById('pcDie');
  const result = document.getElementById('pcDieResult');
  if (!die) return;
  die.classList.add('rolling');

  const faces = [PC_BLANK_SVG, PC_WALK_SVG, PC_BLANK_SVG, PC_CHAOS_SVG, PC_BLANK_SVG, PC_WALK_SVG];
  let i = 0;
  const spin = setInterval(() => { die.innerHTML = faces[i % faces.length]; i++; }, 80);

  setTimeout(() => {
    clearInterval(spin);
    die.classList.remove('rolling');
    const roll = Math.floor(Math.random() * 6);
    if (roll === 4) {
      die.innerHTML = PC_WALK_SVG;
      if (result) { result.innerHTML = PC_WALK_SVG + ' PLANESWALK!'; result.className = 'pc-die-result planeswalk'; }
      setTimeout(() => pcPlaneswalk(), 1200);
    } else if (roll === 5) {
      die.innerHTML = PC_CHAOS_SVG;
      if (result) { result.innerHTML = PC_CHAOS_SVG + ' CHAOS!'; result.className = 'pc-die-result chaos'; }
      pcChaos();
    } else {
      die.innerHTML = PC_BLANK_SVG;
      if (result) { result.textContent = 'Blank'; result.className = 'pc-die-result blank'; }
    }
    // Update roll cost for next roll
    pcRollCount++;
    const costLabel = document.getElementById('pcRollCost');
    if (costLabel) costLabel.innerHTML = pcRollCount === 0
      ? '<span style="font-size:13px;color:var(--green);font-weight:600">Free</span>'
      : manaImg(String(pcRollCount), 28) + ' <span style="font-size:11px;color:var(--text-dim)">to roll</span>';
  }, 600);
}

function aeStart() {

  aeDeck = shuffle(MTG_ARCHENEMY.schemes);
  aeUsed = [];
  aeOngoing = [];
  aePrevious = null;
  aeActive = true;
  aeCurrent = null;
  // Villain always goes first in Archenemy — skip the spinner
  if (!timerRunning) {
    firstPlayerId = aeVillain;
    startTimer();
  }
  renderAll();
  toast('😈 Scheme deck shuffled — ' + MTG_ARCHENEMY.schemes.length + ' schemes!');
}

function aeReset() {
  aeActive = false;
  aeDeck = [];
  aeUsed = [];
  aeOngoing = [];
  aeCurrent = null;
  aePrevious = null;
  renderAll();
  toast('😈 Archenemy reset — shuffle to start again');
}

function aeDraw() {
  if (!aeActive) return;
  if (aeDeck.length === 0) { aeDeck = shuffle(aeUsed); aeUsed = []; toast('Reshuffled!'); }
  if (aeCurrent) {
    if ((aeCurrent.typeLine||'').toLowerCase().includes('ongoing')) {
      aeOngoing.push(aeCurrent);
    } else {
      aeUsed.push(aeCurrent);
    }
  }
  aePrevious = aeCurrent;
  aeCurrent = aeDeck.pop();
  renderAll();
  const isOngoing = (aeCurrent.typeLine||'').toLowerCase().includes('ongoing');
  toast(isOngoing ? '😈 ONGOING: '+aeCurrent.name : '😈 '+aeCurrent.name);
}

function aeUndoScheme() {
  if (!aePrevious) { toast('Nothing to undo'); return; }
  if (aeCurrent) aeDeck.push(aeCurrent);
  const oi = aeOngoing.indexOf(aePrevious);
  if (oi >= 0) aeOngoing.splice(oi, 1);
  const ui = aeUsed.indexOf(aePrevious);
  if (ui >= 0) aeUsed.splice(ui, 1);
  aeCurrent = aePrevious;
  aePrevious = null;
  renderAll();
}

function aeAbandon(idx) {
  const s = aeOngoing.splice(idx, 1)[0];
  if (s) { aeUsed.push(s); renderAll(); toast('Abandoned: '+s.name); }
}

// ---- HORDE ENGINE ----
let hordeDeck = [];        // shuffled horde deck (cards remaining)
let hordeGraveyard = [];   // destroyed/used cards
let hordeField = [];       // creatures currently on battlefield
let hordeDamagePool = 0;   // damage dealt to horde (mills cards)
let hordeActive = false;
let hordeLastFlip = [];    // cards from last flip (for display)
let hordePlayerLife = 0;
let hordeTurnPhase = 'survivors'; // 'survivors' or 'horde'
let hordeTurnNumber = 0;

function buildHordeDeck(playerCount) {
  // Builds horde deck from whichever horde data is loaded (supports multiple tribal variants)
  const hordeData = getActiveHordeData();
  if (!hordeData) return [];
  const pc = playerCount || activePod.length || 4;
  const deck = [];

  // All non-tokens go in as SINGLETONS
  (hordeData.nonTokens || []).forEach(card => {
    deck.push({ ...card, isToken: false });
  });

  // Tokens scale by player count:
  // 1-2: 40, 3: 50, 4: 60 (standard), 5: 75, 6: 90
  const tokenCounts = { 1: 40, 2: 40, 3: 50, 4: 60, 5: 75, 6: 90 };
  const totalTokens = tokenCounts[Math.min(6, Math.max(1, pc))] || 60;
  const tokenTypes = (hordeData.tokens || []).length;
  if (tokenTypes > 0) {
    const perType = Math.floor(totalTokens / tokenTypes);
    const remainder = totalTokens % tokenTypes;
    hordeData.tokens.forEach((token, i) => {
      const qty = perType + (i < remainder ? 1 : 0);
      for (let j = 0; j < qty; j++) {
        deck.push({ ...token, isToken: true });
      }
    });
  }

  return deck;
}

function getActiveHordeData() {
  // Returns the currently selected horde variant data
  // Supports multiple horde decks (zombie, minotaur, cat, etc.)
  if (typeof HORDE_DECKS !== 'undefined' && selectedHordeDeck && HORDE_DECKS[selectedHordeDeck]) {
    return HORDE_DECKS[selectedHordeDeck];
  }
  // Fallback to legacy single-deck format
  if (typeof MTG_HORDE !== 'undefined') return MTG_HORDE;
  return null;
}

let selectedHordeDeck = (typeof HORDE_DECKS !== 'undefined') ? Object.keys(HORDE_DECKS)[0] : null;

function getHordeDeckSize(playerCount) {
  const hordeData = getActiveHordeData();
  const pc = playerCount || activePod.length || 4;
  const tokenCounts = { 1: 40, 2: 40, 3: 50, 4: 60, 5: 75, 6: 90 };
  const tokens = tokenCounts[Math.min(6, Math.max(1, pc))] || 60;
  const nonTokens = hordeData ? (hordeData.nonTokens || []).length : 40;
  return { tokens, nonTokens, total: tokens + nonTokens };
}

let hordeSetupTurns = 0; // counts down from 3 during setup phase

function hordeStart() {
  const hordeData = getActiveHordeData();
  if (!hordeData) { toast('Horde data not loaded'); return; }
  const pc = activePod.length;
  hordeDeck = shuffle(buildHordeDeck(pc));
  hordeGraveyard = [];
  hordeField = [];
  hordeDamagePool = 0;
  hordeLastFlip = [];
  hordeActive = true;
  hordePlayerLife = pc * 20;
  hordeTurnPhase = 'survivors';
  hordeTurnNumber = 0;
  hordeSetupTurns = 3; // 3 free turns before the Horde attacks
  // Start game timer if not running
  if (!timerRunning) {
    firstPlayerId = activePod[0];
    startTimer();
  }
  renderAll();
  const deckInfo = getHordeDeckSize(pc);
  toast(`🧟 ${hordeData.name || 'Horde'} unleashed — ${hordeDeck.length} cards (${deckInfo.tokens} tokens + ${deckInfo.nonTokens} spells). 3 setup turns!`);
}

function hordeReset() {
  hordeActive = false;
  hordeDeck = [];
  hordeGraveyard = [];
  hordeField = [];
  hordeDamagePool = 0;
  hordeLastFlip = [];
  hordePlayerLife = 0;
  hordeTurnPhase = 'survivors';
  hordeTurnNumber = 0;
  hordeSetupTurns = 0;
  renderAll();
  toast('🧟 Horde reset — unleash to start again');
}

function hordeNextPhase() {
  // During setup: survivors get 3 free turns (no Horde phase)
  if (hordeSetupTurns > 0) {
    hordeSetupTurns--;
    hordeTurnNumber++;
    if (hordeSetupTurns > 0) {
      toast(`🛡 Setup turn ${4 - hordeSetupTurns} of 3 — ${hordeSetupTurns} left before the Horde attacks`);
    } else {
      hordeTurnPhase = 'survivors';
      toast('⚠️ Setup complete! Next phase unleashes the Horde!');
    }
    renderAll();
    return;
  }

  if (hordeTurnPhase === 'survivors') {
    hordeTurnPhase = 'horde';
    // Auto-flip on horde's turn
    hordeFlipTurn();
    toast('🧟 Horde\'s turn — creatures attack!');
  } else {
    hordeTurnPhase = 'survivors';
    hordeTurnNumber++;
    toast('🛡 Survivors\' turn ' + hordeTurnNumber);
  }
  renderAll();
}

function hordeFlipTurn() {
  if (!hordeActive || hordeDeck.length === 0) {
    if (hordeField.length === 0) { toast('🎉 You survived the Horde!'); }
    else { toast('Horde deck empty — destroy remaining creatures to win!'); }
    return;
  }
  hordeLastFlip = [];
  // Flip until we hit a non-token (or deck runs out)
  while (hordeDeck.length > 0) {
    const card = hordeDeck.pop();
    hordeLastFlip.push(card);
    if (card.isToken) {
      hordeField.push(card);
    } else {
      // Non-token: creature goes to field, sorcery goes to graveyard after resolving
      if ((card.typeLine||'').toLowerCase().includes('creature')) {
        hordeField.push(card);
      } else {
        hordeGraveyard.push(card);
      }
      break; // Stop flipping after first non-token
    }
  }
  renderAll();
  const tokenCount = hordeLastFlip.filter(c => c.isToken).length;
  const spell = hordeLastFlip.find(c => !c.isToken);
  let msg = `🧟 Flipped ${hordeLastFlip.length} cards: ${tokenCount} tokens`;
  if (spell) msg += ` + ${spell.name}`;
  toast(msg);
}

function hordeTakeDamage(amount) {
  if (!hordeActive) return;
  const milled = Math.min(amount, hordeDeck.length);
  for (let i = 0; i < milled; i++) {
    hordeGraveyard.push(hordeDeck.pop());
  }
  renderAll();
  toast('⚔ Horde milled ' + milled + ' cards (' + hordeDeck.length + ' remaining)');
}

function hordeKillCreature(idx) {
  const c = hordeField.splice(idx, 1)[0];
  if (c) {
    hordeGraveyard.push(c);
    renderAll();
    toast('💀 Destroyed: ' + c.name);
  }
}

// ---- VARIANT ARRANGEMENTS ----
let arrangementSeed = Date.now();
function reshuffleArrangement() { arrangementSeed = Date.now(); renderAll(); }
function seededShuffle(arr) {
  // Use arrangementSeed for consistent shuffle within a render
  const a = [...arr];
  let s = arrangementSeed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render2HG(players) {
  const n = players.length;
  const maxTeams = Math.floor(n / 2);
  const result = renderTeamPicker(players, maxTeams, { showDecks: true });
  return result.html;
}

function assign2HGTeam(pid, teamIdx) {
  manualTeamAssignments[pid] = teamIdx;
  renderAll();
}

function randomize2HGTeams() {
  // Shuffle active pod and auto-pair
  const pids = [...activePod];
  for (let i = pids.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pids[i], pids[j]] = [pids[j], pids[i]];
  }
  pids.forEach((pid, i) => { manualTeamAssignments[pid] = Math.floor(i / 2); });
  renderAll();
}

function renderTeamPicker(players, maxTeams, opts) {
  // opts: { showDecks: bool, compact: bool }
  const showDecks = opts?.showDecks || false;
  const compact = opts?.compact || false;

  // Auto-init if needed
  if (!players.every(p => manualTeamAssignments[p.id] !== undefined)) {
    players.forEach((p, i) => { manualTeamAssignments[p.id] = Math.floor(i / 2); });
  }

  let html = `<div class="team-picker">`;

  // Player rows with team buttons
  players.forEach(p => {
    const pc = OWNER_COLORS[p.id] || '#888';
    const currentTeam = manualTeamAssignments[p.id] ?? 0;
    const selId = matchupSelections[p.id];
    const deck = selId ? DATA.decks.decks.find(d => d.id === selId) : null;

    html += `<div class="team-picker-row" style="border-color:${TEAM_COLOR_HEX[currentTeam % TEAM_COLOR_HEX.length]}44">`;
    html += `<div class="team-picker-name" style="color:${pc}">${esc(p.name)}</div>`;
    if (showDecks && deck) {
      html += `<div style="flex:1;font-size:11px;color:var(--text-dim);text-align:right;margin-right:8px">${esc(deck.name)}</div>`;
    }
    html += `<div class="team-picker-btns">`;
    for (let t = 0; t < maxTeams; t++) {
      const tc = TEAM_COLORS[t % TEAM_COLORS.length];
      const tcHex = TEAM_COLOR_HEX[t % TEAM_COLOR_HEX.length];
      const active = currentTeam === t;
      html += `<button class="team-picker-btn${active ? ' active' : ''}" onclick="assign2HGTeam('${p.id}', ${t})" style="border-color:${tcHex};${active ? `background:${tcHex};` : ''}">T${t + 1}</button>`;
    }
    html += `</div></div>`;
  });
  html += `</div>`;

  // Team summary below
  const teamGroups = {};
  players.forEach(p => {
    const ti = manualTeamAssignments[p.id] ?? 0;
    if (!teamGroups[ti]) teamGroups[ti] = [];
    teamGroups[ti].push(p);
  });
  const teamKeys = Object.keys(teamGroups).sort((a,b) => a - b);
  const allPaired = teamKeys.every(k => teamGroups[k].length === 2);
  const valid = teamKeys.length >= 2 && allPaired;

  html += `<div class="team-picker-summary">`;
  teamKeys.forEach((ti, idx) => {
    const tc = TEAM_COLORS[ti % TEAM_COLORS.length];
    const tcHex = TEAM_COLOR_HEX[ti % TEAM_COLOR_HEX.length];
    const bg = TEAM_BG[ti % TEAM_BG.length];
    if (idx > 0) html += `<div class="team-picker-vs">VS</div>`;
    html += `<div class="team-picker-team" style="border-color:${tcHex}55;background:${bg}">
      <div class="team-picker-team-label" style="color:${tc}">TEAM ${Number(ti) + 1}</div>
      <div class="team-picker-team-members">${teamGroups[ti].map(p => `<span style="color:${OWNER_COLORS[p.id]||'#888'}">${esc(p.name)}</span>`).join(' + ')}</div>
    </div>`;
  });
  html += `</div>`;

  // Validation
  if (!valid) {
    html += `<div style="color:var(--mtg-r);font-size:11px;text-align:center;margin-top:8px">⚠ Each team needs exactly 2 players</div>`;
  } else {
    html += `<div style="color:var(--green);font-size:11px;text-align:center;margin-top:8px">✓ ${teamKeys.length} teams — 60 shared life each</div>`;
  }

  // Randomize button
  html += `<div style="text-align:center;margin-top:8px"><button class="mode-btn" onclick="randomize2HGTeams()" style="font-size:10px">🔀 Randomize</button></div>`;

  return { html, valid };
}

// ---- MATCHUP SUGGESTION ----
function suggestMatchup() {
  const podPlayers = activePod.map(id => DATA.pod.players.find(p => p.id === id)).filter(Boolean);
  if (podPlayers.length < 2) { toast('Need at least 2 players'); return; }
  const playerDecks = {};
  podPlayers.forEach(p => { playerDecks[p.id] = DATA.decks.decks.filter(d => d.owner === p.id); });

  let best = -Infinity, bestPick = {};
  for (let a = 0; a < 200; a++) {
    const pick = {};
    podPlayers.forEach(p => {
      const d = playerDecks[p.id];
      if (d.length) pick[p.id] = d[Math.floor(Math.random()*d.length)];
    });
    const sel = Object.values(pick).filter(Boolean);
    if (sel.length < 2) continue;
    const brackets = sel.map(d => d.bracket||2);
    const avg = brackets.reduce((s,b)=>s+b,0)/brackets.length;
    const variance = brackets.reduce((s,b)=>s+Math.pow(b-avg,2),0)/brackets.length;
    const colors = new Set(); sel.forEach(d => (d.colors||[]).forEach(c => colors.add(COLOR_MAP[c]||c)));
    const styles = new Set(sel.map(d => d.style||'?'));
    const score = colors.size*3 + styles.size*2 - variance*5;
    if (score > best) { best = score; bestPick = pick; }
  }
  Object.entries(bestPick).forEach(([pid,d]) => { if(d) matchupSelections[pid] = d.id; });
  save('matchupSelections', matchupSelections);
  renderAll();
  toast('🎯 Balanced matchup suggested!');
}

  const players = [];
  let winDeckId = null;
  document.querySelectorAll('#gamePlayerRows .player-row').forEach(row => {
    const pid = row.querySelector('select').dataset.pid;
    const deckId = row.querySelector('select').value;
    if (deckId) {
      players.push({ playerId: pid, deckId });
      if (pid === winner) winDeckId = deckId;
    }
  });
  if (players.length < 2) { toast('Need at least 2 players with decks'); return; }

  const game = {
    id: 'g' + Date.now(),
    date,
    players,
    winningDeck: winDeckId,
    variant: activeVariant || 'standard',
    salt: gameSalt,
    duration: duration || null,
    notes: notes || null,
    travelLog: (activeVariant === 'planechase' && pcTravelLog.length > 0) ? [...pcTravelLog] : undefined,
  };
  DATA.games.games.push(game);
  save('games', DATA.games.games);
  // Update tonight's session record
  updateSessionRecord(winner, players.map(p => p.playerId));
  closeGameLogger();
  renderRecentGames();
  toast('🏆 Game logged!');

  // Check for new achievements after a short delay (let toast show first)
  setTimeout(() => checkAchievements(game), 800);

  // Reset timer
  timerElapsed = 0;
  document.getElementById('timerDisplay').textContent = '0:00';
}

// Load unlocked achievements from localStorage
let unlockedAchievements = load('achievements', {});

function checkAchievements(justSavedGame) {
  const defs = DATA.achievements?.definitions || [];
  const games = DATA.games.games;
  const newUnlocks = [];

  // Helper: get all games for a player
  const playerGames = (pid) => games.filter(g => g.players.some(p => p.playerId === pid));
  // Helper: get wins for a player
  const playerWins = (pid) => games.filter(g => {
    const pd = g.players.find(p => p.playerId === pid);
    return pd && pd.deckId === g.winningDeck;
  });
  // Helper: unique decks a player has won with
  const uniqueWinDecks = (pid) => new Set(playerWins(pid).map(g => g.players.find(p => p.playerId === pid)?.deckId)).size;
  // Helper: sessions grouped by date
  const sessions = {};
  games.forEach(g => { const d = g.date||'?'; if (!sessions[d]) sessions[d] = []; sessions[d].push(g); });
  // Helper: ELO rankings
  const elo = {};
  DATA.pod.players.forEach(p => elo[p.id] = 1200);
  games.forEach(g => {
    if (!g.winningDeck) return;
    const w = g.players.find(p => p.deckId === g.winningDeck);
    if (!w) return;
    g.players.filter(p => p.playerId !== w.playerId).forEach(l => {
      const we = elo[w.playerId]||1200, le = elo[l.playerId]||1200;
      const exp = 1/(1+Math.pow(10,(le-we)/400));
      elo[w.playerId] = Math.round(we + 16*(1-exp));
      elo[l.playerId] = Math.round(le + 16*(0-(1-exp)));
    });
  });
  const topPlayer = Object.entries(elo).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // Check each player who was in the just-saved game
  const relevantPlayers = justSavedGame
    ? [...new Set(justSavedGame.players.map(p => p.playerId))]
    : DATA.pod.players.map(p => p.id);

  relevantPlayers.forEach(pid => {
    const pWins = playerWins(pid);
    const pGames = playerGames(pid);

    defs.forEach(def => {
      const key = `${pid}:${def.id}`;
      if (unlockedAchievements[key]) return; // already earned

      let earned = false;

      switch(def.id) {
        case 'first-blood':
          earned = pWins.length >= 1;
          break;

        case 'iron-throne': {
          let streak = 0;
          for (let i = 0; i < pGames.length; i++) {
            const pd = pGames[i].players.find(p => p.playerId === pid);
            if (pd && pd.deckId === pGames[i].winningDeck) { streak++; if (streak >= 3) { earned = true; break; } }
            else streak = 0;
          }
          break;
        }

        case 'diversified':
          earned = uniqueWinDecks(pid) >= 5;
          break;

        case 'kingslayer':
          if (justSavedGame && topPlayer && topPlayer !== pid) {
            const pd = justSavedGame.players.find(p => p.playerId === pid);
            const wasInGame = justSavedGame.players.some(p => p.playerId === topPlayer);
            earned = pd && pd.deckId === justSavedGame.winningDeck && wasInGame;
          }
          break;

        case 'salt-mine': {
          const fiveSaltWins = pWins.filter(g => g.salt >= 5);
          earned = fiveSaltWins.length >= 3;
          break;
        }

        case 'jank-tank': {
          earned = pWins.some(g => {
            const pd = g.players.find(p => p.playerId === pid);
            const deck = pd ? DATA.decks.decks.find(d => d.id === pd.deckId) : null;
            return deck && deck.estimatedValue && deck.estimatedValue < 50;
          });
          break;
        }

        case 'one-more-game': {
          let lastGameWins = 0;
          Object.values(sessions).forEach(sGames => {
            const lastGame = sGames[sGames.length - 1];
            const pd = lastGame.players.find(p => p.playerId === pid);
            if (pd && pd.deckId === lastGame.winningDeck) lastGameWins++;
          });
          earned = lastGameWins >= 3;
          break;
        }

        case 'nemesis': {
          // Check if pid beat any single opponent 5 times consecutively
          const opponents = DATA.pod.players.filter(p => p.id !== pid).map(p => p.id);
          opponents.forEach(oppId => {
            if (earned) return;
            const shared = games.filter(g =>
              g.players.some(p => p.playerId === pid) && g.players.some(p => p.playerId === oppId)
            );
            let streak = 0;
            shared.forEach(g => {
              const pd = g.players.find(p => p.playerId === pid);
              if (pd && pd.deckId === g.winningDeck) { streak++; if (streak >= 5) earned = true; }
              else streak = 0;
            });
          });
          break;
        }

        case 'variety-hour': {
          Object.values(sessions).forEach(sGames => {
            if (earned) return;
            const playerInSession = sGames.some(g => g.players.some(p => p.playerId === pid));
            if (!playerInSession) return;
            const variants = new Set(sGames.filter(g => g.players.some(p => p.playerId === pid)).map(g => g.variant || 'standard'));
            if (variants.size >= 3) earned = true;
          });
          break;
        }

        case 'full-pod':
          earned = pWins.some(g => g.players.length >= 6);
          break;

        case 'deck-assassin': {
          if (justSavedGame) {
            const pd = justSavedGame.players.find(p => p.playerId === pid);
            if (pd && pd.deckId === justSavedGame.winningDeck) {
              // Check if any losing deck had a perfect record before this game
              justSavedGame.players.forEach(lp => {
                if (lp.playerId === pid || earned) return;
                const prevGames = games.slice(0, -1).filter(g => g.players.some(p => p.deckId === lp.deckId));
                if (prevGames.length >= 2 && prevGames.every(g => g.winningDeck === lp.deckId)) earned = true;
              });
            }
          }
          break;
        }

        case 'marathon':
          earned = pGames.some(g => {
            if (!g.duration) return false;
            const parts = g.duration.split(':');
            const mins = parts.length >= 2 ? +parts[0] : 0;
            const hrs = parts.length >= 3 ? +parts[0] * 60 + +parts[1] : mins;
            const totalMins = parts.length >= 3 ? hrs : mins;
            return totalMins >= 90;
          });
          break;

        case 'speed-run': {
          earned = pWins.some(g => {
            if (!g.duration) return false;
            const parts = g.duration.split(':');
            const mins = parts.length >= 2 ? +parts[0] : 0;
            return mins < 15;
          });
          break;
        }

        case 'loyal-subject': {
          const deckCounts = {};
          pGames.forEach(g => {
            const pd = g.players.find(p => p.playerId === pid);
            if (pd) deckCounts[pd.deckId] = (deckCounts[pd.deckId]||0) + 1;
          });
          earned = Object.values(deckCounts).some(c => c >= 5);
          break;
        }

        case 'arms-dealer': {
          const owned = DATA.decks.decks.filter(d => d.owner === pid).length;
          earned = owned >= 20;
          break;
        }

        case 'zero-salt': {
          const zeroSaltWins = pWins.filter(g => g.salt === 0 || g.salt == null);
          earned = zeroSaltWins.length >= 5;
          break;
        }
      }

      if (earned) {
        const now = new Date().toISOString();
        unlockedAchievements[key] = {
          date: now,
          gameId: justSavedGame?.id || null,
          context: justSavedGame ? `Game ${games.indexOf(justSavedGame)+1} on ${justSavedGame.date}` : 'Retroactive',
        };
        newUnlocks.push({ playerId: pid, achievement: def });
      }
    });
  });

  if (newUnlocks.length > 0) {
    save('achievements', unlockedAchievements);
    // Queue achievements for display
    showAchievementQueue(newUnlocks);
    // Fire notification hook
    newUnlocks.forEach(u => achievementNotify(u.playerId, u.achievement));
  }
}

// Achievement display queue
let achQueue = [];
let achShowing = false;

function showAchievementQueue(unlocks) {
  achQueue.push(...unlocks);
  if (!achShowing) showNextAchievement();
}

function showNextAchievement() {
  if (achQueue.length === 0) { achShowing = false; return; }
  achShowing = true;
  const { playerId, achievement } = achQueue.shift();
  const player = DATA.pod.players.find(p => p.id === playerId);

// ---- COLUMN RESIZER ----
(function initResizer() {
  const resizer = document.getElementById('colResizer');
  const layout = document.querySelector('.gn-layout');
  let dragging = false;

  // Don't apply saved split on init — renderAll() controls layout via CSS classes

  resizer.addEventListener('mousedown', e => {
    e.preventDefault();
    dragging = true;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = layout.getBoundingClientRect();
    const pct = ((e.clientX - rect.left) / rect.width) * 100;
    const clamped = Math.max(12, Math.min(40, pct));
    layout.style.gridTemplateColumns = `${clamped}% 6px 1fr`;
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ---- GEOMETRIC SEATING CHART ----
function getVertexPositions(n, cx, cy, r) {
  // Place n items in a circle/polygon, starting from top
  const positions = [];
  for (let i = 0; i < n; i++) {
    const angle = (2 * Math.PI / n) * i - Math.PI / 2;
    positions.push({
      x: cx + r * Math.cos(angle),
      y: cy + r * Math.sin(angle)
    });
  }
  return positions;
}

function renderSeatingChart(variant) {
  const players = activePod.map(id => {
    const p = DATA.pod.players.find(x => x.id === id);
    const selId = matchupSelections[id];
    const deck = selId ? DATA.decks.decks.find(d => d.id === selId) : null;
    return { ...p, deck, color: OWNER_COLORS[id] || '#888' };
  }).filter(Boolean);
  const n = players.length;

  if (variant === '2hg') return renderSeatingStandard(players); // 2HG uses same table layout with team badges
  if (variant === 'star') return renderSeatingStandard(players); // Star uses same table layout with enemy badges
  if (variant === 'kingdoms') return renderSeatingKingdoms(players);
  if (variant === 'archenemy') return renderSeatingArchenemy(players);
  // Standard + planechase/horde (show plain seating)
  return renderSeatingStandard(players);
}
