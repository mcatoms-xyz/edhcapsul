<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Night — MTGCapsul</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================
   Game Night — TV-Optimized Wide Layout
   55" close viewing, NO SCROLL, info-dense
   ============================================ */

@font-face { font-family: 'Museo Slab'; src: url('../../assets/fonts/MuseoSlab-500.woff2') format('woff2'); font-weight: 500; }
@font-face { font-family: 'Museo Sans'; src: url('../../assets/fonts/MuseoSans-500.woff2') format('woff2'); font-weight: 500; }

:root {
  --bg: #0a0a0a;
  --surface: rgba(10,10,14,0.85);
  --surface-hover: rgba(10,10,14,0.9);
  --surface-active: rgba(10,10,14,0.92);
  --border: rgba(255,255,255,0.12);
  --border-bright: rgba(255,255,255,0.2);
  --text: #f0f0f0;
  --text-dim: rgba(255,255,255,0.5);
  --text-mid: rgba(255,255,255,0.7);
  --orange: #E67201;
  --blue: #007EFF;
  --green: #1BBA01;
  --mtg-w: #F9FAF4; --mtg-u: #0E68AB; --mtg-b: #4A3728;
  --mtg-r: #D3202A; --mtg-g: #00733E; --mtg-c: #CAC5C0;
  --mtg-gold: #C9A849;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100vh;
  overflow: hidden;
  font-family: 'Museo Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
}

/* ---- TOP BAR ---- */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 24px;
  background: rgba(10,10,14,0.9);
  border-bottom: 1px solid var(--border);
  height: 56px;
  flex-shrink: 0;
}
.topbar-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 20px;
  color: var(--orange);
  white-space: nowrap;
  letter-spacing: 1px;
}
.topbar-divider {
  width: 1px;
  height: 28px;
  background: var(--border-bright);
  flex-shrink: 0;
}

/* Pod chips */
.pod-chips {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.pod-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 13px;
  color: var(--text-dim);
  transition: all 0.2s;
  user-select: none;
}
.pod-chip.active {
  color: var(--text);
  background: var(--surface-active);
}
.pod-chip .pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pod-action {
  display: flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; font-size: 11px; color: var(--text-dim);
  transition: all 0.2s; user-select: none; flex-shrink: 0;
}
.pod-action:hover { border-color: var(--orange); color: var(--orange); background: rgba(230,114,1,0.08); }
.pod-action.all { width: auto; border-radius: 13px; padding: 0 10px; font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; }

/* Landing state — left panel: player selector */
.landing-header {
  font-family: Cinzel, serif; font-size: 13px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.landing-header span { color: var(--orange); }
.landing-player-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; transition: all 0.25s; margin-bottom: 6px;
}
.landing-player-card:hover { border-color: var(--border-bright); background: var(--surface-hover); }
.landing-player-card.in-pod { border-color: var(--pod-color, var(--border-bright)); background: var(--surface); }
.landing-player-card .avatar {
  width: 44px; height: 44px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center;
  font-family: Cinzel, serif; font-size: 20px; font-weight: 700; color: #111;
  flex-shrink: 0; transition: all 0.25s;
}
.landing-player-card .pname {
  font-size: 18px; font-weight: 600; transition: color 0.2s;
}
.landing-player-card .pdeck-count {
  font-size: 14px; color: var(--text-dim); margin-left: auto;
}
.landing-player-card .check {
  margin-left: auto; font-size: 16px; opacity: 0; transition: opacity 0.2s;
}
.landing-player-card.in-pod .check { opacity: 1; }
.player-edit-btn {
  font-size: 24px; color: var(--text-dim); cursor: pointer;
  opacity: 0; transition: opacity 0.2s; padding: 4px 8px;
}
.landing-player-card:hover .player-edit-btn { opacity: 0.7; }
.player-edit-btn:hover { opacity: 1 !important; color: var(--orange); }
.landing-add-all {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px; border-radius: 8px; margin-top: 12px;
  font-size: 12px; font-family: Cinzel, serif; letter-spacing: 0.5px;
  background: rgba(230,114,1,0.08); border: 1px solid rgba(230,114,1,0.2);
  color: var(--orange); cursor: pointer; transition: all 0.2s;
  text-transform: uppercase;
}
.landing-add-all:hover { background: rgba(230,114,1,0.15); border-color: var(--orange); }

/* Landing state — right panel: mode showcase */
.mode-showcase { padding: 8px 0; }
.mode-showcase-header {
  text-align: center; margin-bottom: 20px;
}
.mode-showcase-icon { font-size: 40px; margin-bottom: 4px; }
.mode-showcase-title {
  font-family: Cinzel, serif; font-size: 24px; color: var(--text);
  letter-spacing: 1.5px; margin-bottom: 4px;
}
.mode-showcase-sub {
  font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px;
}
.mode-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.mode-tile {
  padding: 16px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
}
.mode-tile:hover { border-color: var(--border-bright); background: var(--surface-hover); transform: translateY(-1px); }
.mode-tile.selected { border-color: rgba(201,168,73,0.5); background: rgba(10,10,14,0.92); }
.mode-tile-icon { font-size: 28px; margin-bottom: 6px; }
.mode-tile-name {
  font-family: Cinzel, serif; font-size: 16px; font-weight: 600;
  color: var(--text); margin-bottom: 4px; letter-spacing: 0.5px;
}
.mode-tile.selected .mode-tile-name { color: var(--mtg-gold); }
.mode-tile-desc {
  font-size: 13px; color: var(--text-dim); line-height: 1.4;
}
.mode-tile-players {
  position: absolute; bottom: 8px; right: 10px;
  font-size: 34px; font-weight: 700; font-family: Cinzel, serif;
  color: rgba(255,255,255,0.4); line-height: 1;
  text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7;
}
.mode-tile-tag {
  position: absolute; top: 8px; right: 8px;
  font-size: 8px; padding: 2px 6px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
}
.mode-tile-tag.classic { background: rgba(0,126,255,0.12); color: var(--blue); }
.mode-tile-tag.team { background: rgba(27,186,1,0.12); color: var(--green); }
.mode-tile-tag.chaos { background: rgba(230,114,1,0.12); color: var(--orange); }
.mode-tile-tag.coop { background: rgba(201,168,73,0.12); color: var(--mtg-gold); }

/* Variant badges */
.variant-badges {
  display: flex;
  gap: 4px;
  flex-wrap: nowrap;
}
.v-badge {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 12px;
  color: var(--text-dim);
  transition: all 0.2s;
  white-space: nowrap;
  user-select: none;
}
.v-badge.active {
  background: rgba(201,168,73,0.15);
  border-color: rgba(201,168,73,0.4);
  color: var(--mtg-gold);
}
.v-badge:hover { border-color: var(--border-bright); }

/* Timer */
.timer-box {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.timer-display {
  font-family: 'Museo Slab', monospace;
  font-size: 28px;
  color: var(--text-dim);
  min-width: 90px;
  text-align: center;
  letter-spacing: 2px;
}
.timer-display.running { color: var(--green); }
.timer-btn {
  padding: 6px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-bright);
  background: var(--surface);
  color: var(--text);
  font-family: 'Museo Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.timer-btn.start { border-color: rgba(27,186,1,0.4); color: var(--green); }
.timer-btn.stop { border-color: rgba(211,32,42,0.4); color: #E88; }
.timer-btn:hover { background: var(--surface-hover); }

/* Arsenal link */
.arsenal-link {
  font-size: 12px;
  color: var(--text-dim);
  text-decoration: none;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.arsenal-link:hover { color: var(--text); border-color: var(--border-bright); }

/* Multiplayer toggle — pulses green when live */
.mp-btn { cursor: pointer; background: none; font-family: inherit; }
.mp-btn:hover { color: #C9A849; border-color: rgba(201,168,73,0.4); }
.mp-btn.mp-live {
  background: rgba(27,186,1,0.12);
  color: #1BBA01;
  border-color: rgba(27,186,1,0.4);
  animation: mpPulse 2.5s ease-in-out infinite;
}
.mp-btn.mp-live:hover { background: rgba(27,186,1,0.2); }
@keyframes mpPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(27,186,1,0); }
  50% { box-shadow: 0 0 10px 2px rgba(27,186,1,0.35); }
}

/* Save Games button — red when unlinked, green when ready */
.sg-wrap {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 2px;
  flex-shrink: 0;
}
.sg-btn {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
  font-weight: 700;
  letter-spacing: 0.5px;
  border: 1px solid;
}
.sg-btn:disabled { cursor: not-allowed; opacity: 0.6; }
.sg-btn.not-set {
  background: rgba(200,30,30,0.15);
  color: #ff6666;
  border-color: rgba(200,30,30,0.5);
}
.sg-btn.not-set:hover:not(:disabled) { background: rgba(200,30,30,0.28); }
.sg-btn.ready {
  background: rgba(27,186,1,0.15);
  color: #1BBA01;
  border-color: rgba(27,186,1,0.5);
}
.sg-btn.ready:hover { background: rgba(27,186,1,0.28); }
.sg-btn.saving {
  background: rgba(201,168,73,0.2);
  color: #C9A849;
  border-color: rgba(201,168,73,0.5);
}
.sg-btn.saved {
  background: rgba(27,186,1,0.35);
  color: #0a0;
  border-color: #1BBA01;
}
.sg-status {
  font-size: 9px;
  text-align: center;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  min-height: 11px;
}
.sg-status.not-set { color: rgba(255,102,102,0.7); }
.sg-status.ready { color: rgba(27,186,1,0.7); }
.sg-status.saving { color: rgba(201,168,73,0.85); }
.sg-status.saved { color: #1BBA01; }

/* ---- MAIN LAYOUT: 2-column top, 2-column bottom ---- */
.gn-layout {
  display: grid;
  grid-template-columns: 1fr 6px 1fr;
  grid-template-rows: 1fr auto;
  height: calc(100vh - 56px);
  gap: 0;
}

/* ---- LEFT: MATCHUP ARENA ---- */
/* Draggable column resizer */
.col-resizer {
  width: 6px;
  cursor: col-resize;
  background: var(--border);
  position: relative;
  transition: background 0.2s;
  z-index: 5;
}
.col-resizer:hover, .col-resizer.dragging {
  background: var(--orange);
}
.col-resizer::after {
  content: '⋮';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--text-dim);
  font-size: 14px;
  pointer-events: none;
}
.suggest-btn {
  padding: 5px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-bright);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.suggest-btn:hover { color: var(--mtg-gold); border-color: rgba(201,168,73,0.4); }

/* Deck selector dropdown */
.slot-select {
  width: 100%;
  padding: 6px 8px;
  background: rgba(0,0,0,0.4);
  border: none;
  border-top: 1px solid var(--border);
  color: var(--text);
  font-family: 'Museo Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
}
.slot-select option { background: #1a1a1a; }

/* Planechase mode */
.pc-frame {
  border-radius: var(--radius);
  overflow: hidden;
  background: linear-gradient(135deg, rgba(155,89,182,0.12), rgba(0,126,255,0.08));
  border: 1px solid rgba(155,89,182,0.25);
  margin-bottom: 12px;
  transition: all 0.4s;
}
.pc-frame.phenomenon {
  border-color: rgba(201,168,73,0.5);
  box-shadow: 0 0 40px rgba(201,168,73,0.2);
}
.pc-card-img {
  width: 100%;
  display: block;
  border-radius: var(--radius);
}
/* Plane card text fallback (shown below image) */
.pc-card-info {
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}
.pc-card-info .pc-info-name {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  color: var(--mtg-gold);
  margin-bottom: 2px;
}
.pc-card-info .pc-info-type {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.pc-card-info .pc-info-text {
  color: var(--text);
  font-size: 12px;
  white-space: pre-wrap;
}
.pc-body { padding: 12px 16px; }
.pc-name {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--mtg-gold);
  margin-bottom: 2px;
}
.pc-type {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.pc-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  white-space: pre-wrap;
  max-height: 100px;
  overflow-y: auto;
}
.pc-text::-webkit-scrollbar { width: 3px; }
.pc-text::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

.pc-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  margin: 10px 0;
}
.pc-die-box {
  width: 64px;
  height: 64px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  cursor: pointer;
  background: var(--surface);
  border: 2px solid var(--border-bright);
  transition: all 0.2s;
  user-select: none;
}
.pc-die-box:hover { transform: scale(1.05); border-color: rgba(155,89,182,0.5); }
.pc-die-box:active { transform: scale(0.95); }
.pc-die-box.rolling { animation: dieRoll 0.5s ease-in-out; }
@keyframes dieRoll {
  0% { transform: rotate(0) scale(1); }
  25% { transform: rotate(90deg) scale(1.1); }
  50% { transform: rotate(180deg) scale(1); }
  75% { transform: rotate(270deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}
.pc-die-result {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 700;
  min-width: 120px;
}
.pc-die-result.planeswalk { color: #9B59B6; }
.pc-die-result.chaos { color: var(--mtg-gold); }
.pc-die-result.blank { color: var(--text-dim); }

.mode-btn {
  padding: 5px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-bright);
  background: var(--surface);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.mode-btn:hover { background: var(--surface-hover); }
.mode-btn.primary { border-color: rgba(155,89,182,0.4); color: #C9A0DC; }
.mode-btn.danger { border-color: rgba(211,32,42,0.4); color: #E88; }

.pc-visited {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
}
.pc-visited-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
  max-height: 60px;
  overflow-y: auto;
}
.pc-visited-chip {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
}

/* Rules box */
.rules-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 12px;
}
.rules-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--mtg-gold);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.rules-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.rules-item {
  font-size: 11px;
  color: var(--text-mid);
  line-height: 1.5;
}

/* Archenemy mode */
.ae-frame {
  border-radius: var(--radius);
  overflow: hidden;
  background: linear-gradient(135deg, rgba(211,32,42,0.12), rgba(0,0,0,0.2));
  border: 1px solid rgba(211,32,42,0.25);
  margin-bottom: 12px;
}
.ae-card-img {
  width: 100%;
  max-width: 340px;
  display: block;
  border-radius: var(--radius);
  margin: 0 auto;
}
.ae-body { padding: 12px 16px; }
.ae-name {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 700;
  color: #D3202A;
}
.ae-type {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.ae-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  white-space: pre-wrap;
}
.ae-ongoing-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  background: rgba(211,32,42,0.2);
  border: 1px solid rgba(211,32,42,0.3);
  color: #E88;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 6px;
}
.ae-ongoing-section { margin-top: 10px; }
.ae-ongoing-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  margin-bottom: 4px;
  border-radius: var(--radius-sm);
  background: rgba(211,32,42,0.06);
  border: 1px solid rgba(211,32,42,0.15);
  font-size: 12px;
}
.ae-ongoing-name { color: #E88; font-family: 'Cinzel', serif; }
.ae-abandon {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  background: rgba(211,32,42,0.1);
  border: 1px solid rgba(211,32,42,0.25);
  color: #E88;
  cursor: pointer;
}

/* Entering animation */
.entering { animation: cardEnter 0.4s ease-out; }
@keyframes cardEnter {
  0% { opacity: 0; transform: translateY(12px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Horde mode */
.horde-stats {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin: 12px 0;
}
.horde-stat {
  text-align: center;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  min-width: 80px;
}
.horde-stat-val {
  font-family: 'Museo Slab', serif;
  font-size: 22px;
}
.horde-stat-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.horde-card-img {
  width: 100%;
  max-width: 280px;
  display: block;
  border-radius: var(--radius);
  margin: 0 auto 8px;
}
.horde-flip-area {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 8px 0;
  min-height: 40px;
}
.horde-flipped {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  border: 1px solid;
  animation: cardEnter 0.3s ease-out;
}
.horde-flipped.token { background: rgba(74,55,40,0.2); border-color: rgba(74,55,40,0.4); color: #b8a080; }
.horde-flipped.spell { background: rgba(211,32,42,0.15); border-color: rgba(211,32,42,0.3); color: #E88; }
.horde-graveyard {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
  text-align: center;
}
.horde-field-card {
  position: relative;
  width: 72px;
  cursor: pointer;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(74,55,40,0.4);
  transition: all 0.2s;
  animation: cardEnter 0.3s ease-out;
}
.horde-field-card:hover {
  border-color: rgba(211,32,42,0.6);
  transform: scale(1.08);
  z-index: 2;
}
.horde-field-card.no-img {
  width: 72px;
  height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(74,55,40,0.15);
  gap: 2px;
}
.horde-field-img {
  width: 100%;
  display: block;
}
.horde-field-pt {
  position: absolute;
  bottom: 2px;
  right: 3px;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  background: rgba(0,0,0,0.7);
  padding: 1px 4px;
  border-radius: 3px;
}
.horde-field-kill {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  background: rgba(211,32,42,0.3);
  opacity: 0;
  transition: opacity 0.2s;
}
.horde-field-card:hover .horde-field-kill { opacity: 1; }

/* ---- HORDE FULL-SCREEN LAYOUT ---- */
.horde-screen {
  display: flex;
  flex-direction: column;
  height: 100%;
  position: relative;
  z-index: 1;
}
.horde-main {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.horde-main::-webkit-scrollbar { width: 4px; }
.horde-main::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
.horde-title {
  font-family: Cinzel, serif;
  font-size: 14px;
  color: #D3202A;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.horde-big-field {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  align-content: flex-start;
  width: 100%;
  max-width: calc(100% - 24px);
  margin: 0 auto;
}
.horde-big-card {
  position: relative;
  width: 225px;
  cursor: pointer;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid rgba(74,55,40,0.5);
  transition: all 0.2s;
  animation: cardEnter 0.4s ease-out;
  background: rgba(74,55,40,0.1);
}
.horde-big-card:hover {
  border-color: rgba(211,32,42,0.7);
  transform: scale(1.05);
  z-index: 2;
  box-shadow: 0 6px 24px rgba(211,32,42,0.3);
}
.horde-big-card img {
  width: 100%;
  display: block;
}
.horde-big-card .horde-field-pt {
  font-size: 13px;
  bottom: 4px;
  right: 5px;
  padding: 3px 8px;
  border-radius: 5px;
}
.horde-big-card .horde-field-kill {
  font-size: 40px;
  background: rgba(211,32,42,0.35);
}
.horde-big-card:hover .horde-field-kill { opacity: 1; }
.horde-big-card.no-img {
  width: 225px;
  height: 314px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 13px;
  color: #b8a080;
}
.horde-field-stats {
  display: flex;
  gap: 20px;
  justify-content: center;
  padding: 10px 0;
  flex-wrap: wrap;
}
.horde-field-stat {
  text-align: center;
}
.horde-field-stat .val {
  font-family: 'Museo Slab', serif;
  font-size: 26px;
  display: block;
  line-height: 1.1;
}
.horde-field-stat .lbl {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
}
.horde-last-flip {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 8px;
}
.horde-flip-pill {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 5px;
  border: 1px solid;
  animation: cardEnter 0.3s ease-out;
}
.horde-flip-pill.token { background: rgba(74,55,40,0.2); border-color: rgba(74,55,40,0.5); color: #b8a080; }
.horde-flip-pill.spell { background: rgba(211,32,42,0.15); border-color: rgba(211,32,42,0.4); color: #E88; font-weight: 600; }
.horde-empty-field {
  color: var(--text-dim);
  font-size: 16px;
  text-align: center;
  padding: 40px 20px;
  font-style: italic;
  opacity: 0.6;
}

/* Horde game bar */
.horde-game-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  background: rgba(6,6,10,0.85);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(211,32,42,0.2);
  flex-shrink: 0;
  min-height: 56px;
}
.horde-game-bar .horde-bar-timer {
  font-family: 'Museo Sans', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  min-width: 70px;
}
.horde-game-bar .horde-bar-timer.running { color: var(--green); }
.horde-game-bar .horde-bar-turn {
  font-size: 13px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.horde-game-bar .horde-bar-info {
  font-size: 15px;
  color: var(--text);
  flex: 1;
  font-weight: 600;
}
.horde-game-bar .horde-bar-controls {
  display: flex;
  gap: 8px;
}

/* Horde player strip at bottom */
.horde-player-strip {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: rgba(6,6,10,0.92);
  border-top: 1px solid rgba(201,168,73,0.1);
  flex-shrink: 0;
  overflow-x: auto;
}
.horde-player-strip::-webkit-scrollbar { height: 3px; }
.horde-player-strip::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
.horde-player-card {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  flex-shrink: 0;
  transition: border-color 0.2s;
}
.horde-player-card .hp-art {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.1);
}
.horde-player-card .hp-art-placeholder {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.horde-player-card .hp-name {
  font-size: 12px;
  font-weight: 600;
}
.horde-player-card .hp-deck {
  font-size: 10px;
  color: var(--text-dim);
}
.horde-shared-life {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  flex-shrink: 0;
}
.horde-shared-life .life-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.horde-shared-life .life-val {
  font-family: 'Museo Slab', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--green);
}
.horde-shared-life button {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.horde-shared-life button:hover {
  background: rgba(255,255,255,0.08);
}
.horde-shared-life button.minus:hover { color: #D3202A; border-color: rgba(211,32,42,0.4); }
.horde-shared-life button.plus:hover { color: var(--green); border-color: rgba(27,186,1,0.4); }

/* Horde rules drawer */
.horde-rules-drawer {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  background: rgba(6,6,10,0.92);
  border-top: 1px solid rgba(211,32,42,0.1);
}
.horde-rules-drawer.open { max-height: 400px; }
.horde-rules-drawer-inner {
  padding: 14px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 24px;
}
.horde-rule-item {
  font-size: 14px;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
  align-items: baseline;
  flex: 1 1 45%;
  min-width: 280px;
  line-height: 1.4;
}
.horde-rule-num {
  color: #D3202A;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
}

/* ---- BOTTOM ROW: GAMES + STANDINGS ---- */
.bottom-row {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--border);
  max-height: 140px;
  overflow: hidden;
  background: rgba(10,10,14,0.8);
}
.bottom-section {
  padding: 8px 16px;
  overflow-y: auto;
}
.bottom-section:first-child { border-right: 1px solid var(--border); }
.bottom-section::-webkit-scrollbar { width: 4px; }
.bottom-section::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

.bottom-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Game rows */
.game-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.game-date { color: var(--text-dim); width: 70px; flex-shrink: 0; }
.game-players { flex: 1; }
.game-winner { color: var(--mtg-gold); font-weight: 600; }
.game-variant-tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--surface);
  color: var(--text-dim);
}
.game-duration { color: var(--text-dim); font-size: 11px; }
.game-salt { font-size: 12px; }
.game-travel-log { width: 100%; margin-top: 4px; }
.game-travel-toggle { font-size: 10px; color: rgba(155,89,182,0.7); cursor: pointer; }
.game-travel-toggle:hover { color: var(--mtg-gold); }
.game-travel-list { padding: 4px 0 2px 8px; border-left: 2px solid rgba(155,89,182,0.2); margin-top: 4px; }
.game-travel-item { font-size: 10px; color: var(--text-mid); padding: 1px 0; }

/* Standings rows */
.standing-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.standing-rank {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.standing-name { flex: 1; font-weight: 600; }
.standing-record { color: var(--text-dim); font-size: 12px; }
.standing-bar-wrap { width: 100px; height: 10px; background: var(--surface); border-radius: 3px; overflow: hidden; }
.standing-bar { height: 100%; border-radius: 3px; }

/* ---- GAME LOGGER MODAL ---- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #1a1a1a;
  border-radius: var(--radius);
  border: 1px solid var(--border-bright);
  max-width: 500px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 12px;
  right: 16px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 24px;
  cursor: pointer;
}
.game-form { padding: 24px; }
.game-form h2 {
  font-family: 'Cinzel', serif;
  color: var(--orange);
  margin-bottom: 16px;
}
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.form-input, .form-textarea {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Museo Sans', sans-serif;
  font-size: 14px;
}
.form-textarea { resize: vertical; min-height: 60px; }
.game-log-travel {
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(0,0,0,0.3);
  padding: 8px;
}
.game-log-travel::-webkit-scrollbar { width: 4px; }
.game-log-travel::-webkit-scrollbar-thumb { background: rgba(155,89,182,0.3); border-radius: 2px; }
.game-log-travel-entry {
  display: flex;
  gap: 8px;
  padding: 6px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.game-log-travel-entry:last-child { border-bottom: none; }
.game-log-travel-entry.current { background: rgba(201,168,73,0.06); border-radius: 6px; }
.game-log-travel-num {
  font-size: 10px;
  color: rgba(155,89,182,0.5);
  min-width: 18px;
  text-align: right;
  padding-top: 2px;
}
.game-log-travel-plane {
  font-size: 13px;
  color: var(--text);
  font-weight: 600;
}
.game-log-travel-meta {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 1px;
}
.player-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 13px;
}
.player-row select {
  flex: 1;
  padding: 6px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
}
.player-row select option { background: #1a1a1a; }
.win-radio { accent-color: var(--mtg-gold); }
.salt-slider {
  display: flex;
  gap: 8px;
  font-size: 20px;
}
.salt-level {
  cursor: pointer;
  opacity: 0.3;
  transition: opacity 0.2s;
}
.salt-level.active { opacity: 1; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-bright);
  background: var(--surface);
  color: var(--text);
  font-family: 'Museo Sans', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { background: var(--surface-hover); }
.btn-primary { background: var(--orange); border-color: var(--orange); color: #000; font-weight: 600; }
.btn-primary:hover { background: #ff8811; }

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1a1a1a;
  border: 1px solid var(--border-bright);
  padding: 10px 24px;
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--text);
  z-index: 200;
  transition: transform 0.3s;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ---- LAYOUT STATE MACHINE ---- */
.gn-layout.lobby { grid-template-columns: 220px 6px 1fr; }
.gn-layout.deckselect { grid-template-columns: 200px 6px 1fr; }
.gn-layout.ingame { grid-template-columns: 320px 6px 1fr; }
.gn-layout.ingame .left-panel {
  overflow-y: auto;
  overflow-x: hidden;
  border-right: 1px solid var(--border);
  position: relative;
}
.gn-layout.ingame .col-resizer {
  visibility: visible;
}
.gn-layout.ingame .right-panel {
  padding: 16px 0;
  position: relative;
}
.gn-layout.ingame .bottom-row { display: none; }

/* Left panel — generic container for both states */
.left-panel {
  padding: 16px 20px;
  overflow-y: auto;
  overflow-x: hidden;
  background: rgba(10,10,14,0.8);
}
.left-panel::-webkit-scrollbar { width: 4px; }
.left-panel::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

/* Right panel — generic container */
.right-panel {
  padding: 16px 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.right-panel::-webkit-scrollbar { width: 4px; }
.right-panel::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

/* ---- TURN HQ PANEL ---- */
.turn-hq { padding: 12px; min-height: 100%; display: flex; flex-direction: column; gap: 10px; }
.turn-hq-header { display: flex; align-items: center; gap: 10px; }
.turn-hq-back { font-size: 11px; color: var(--text-dim); cursor: pointer; padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); transition: all 0.2s; user-select: none; }
.turn-hq-back:hover { color: var(--orange); border-color: var(--orange); }
.turn-hq-label { font-family: Cinzel, serif; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); }

.turn-hq-commander {
  width: 100%;
  aspect-ratio: 626/457;
  background-size: cover;
  background-position: center;
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
  border: 2px solid var(--border);
  background-color: var(--surface);
}
.turn-hq-commander::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.85) 100%);
}
.turn-hq-commander-info {
  position: absolute;
  bottom: 8px;
  left: 10px;
  right: 10px;
  z-index: 1;
}
.turn-hq-commander-name {
  font-family: Cinzel, serif;
  font-size: 16px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.turn-hq-deck-name {
  font-size: 12px;
  color: var(--text-dim);
}

/* Life total controls */
.turn-hq-life {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px 0;
}
.turn-hq-life-num {
  font-family: Cinzel, serif;
  font-size: 48px;
  font-weight: 900;
  min-width: 80px;
  text-align: center;
  line-height: 1;
}
.life-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.life-btn:hover { background: var(--surface-hover); border-color: var(--border-bright); }
.life-btn.minus { color: var(--mtg-r); }
.life-btn.minus:hover { border-color: var(--mtg-r); }
.life-btn.plus { color: var(--green); }
.life-btn.plus:hover { border-color: var(--green); }

/* Commander zone tracker */
.turn-hq-zone {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12px;
}
.zone-label { color: var(--text-dim); }
.zone-tax { color: var(--mtg-r); font-weight: 600; margin-left: 4px; }
.zone-btn {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  transition: all 0.15s;
}
.zone-btn:hover { color: var(--text); border-color: var(--border-bright); }
.zone-btn.active { background: var(--orange); color: #111; border-color: var(--orange); font-weight: 600; }

.turn-hq-cast-btn {
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: Cinzel, serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 48px;
}
.turn-hq-cast-btn:hover { color: var(--text); border-color: var(--mtg-gold); background: rgba(201,168,73,0.08); }
.turn-hq-cast-btn .cast-label { white-space: nowrap; }
.turn-hq-cast-btn .cast-cost { display: flex; align-items: center; gap: 2px; }
.turn-hq-cast-btn .cast-tax { color: var(--mtg-r); font-size: 13px; font-weight: 700; margin-left: 6px; display: inline-flex; align-items: center; gap: 2px; letter-spacing: 0.5px; }

/* Status badges */
.turn-hq-statuses {
  display: flex;
  flex-wrap: nowrap;
  gap: 4px;
}
.status-badge {
  flex: 1;
  padding: 5px 6px;
  border-radius: 6px;
  font-size: 11px;
  text-align: center;
  white-space: nowrap;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  user-select: none;
}
.status-badge:hover { border-color: var(--border-bright); color: var(--text); }
.status-badge.active { background: var(--mtg-gold); color: #111; border-color: var(--mtg-gold); font-weight: 600; }

/* Full card art display */
.turn-hq-card-art {
  width: 100%;
  border-radius: var(--radius);
  border: 2px solid var(--border);
  display: block;
}

/* Counter rows */
.turn-hq-counters { display: flex; flex-direction: column; gap: 6px; }
.counter-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 2px solid var(--border);
}
.counter-row.poison { border-color: #39ff14; box-shadow: inset 0 0 8px rgba(57,255,20,0.1); }
.counter-row.energy { border-color: #ffd700; box-shadow: inset 0 0 8px rgba(255,215,0,0.1); }
.counter-row.experience { border-color: #f0f0f0; box-shadow: inset 0 0 8px rgba(240,240,240,0.08); }
.counter-row.rad {
  border: 3px solid transparent;
  background-image: linear-gradient(var(--surface), var(--surface)),
    repeating-linear-gradient(45deg, #111 0px, #111 6px, #ffd700 6px, #ffd700 12px);
  background-origin: padding-box, border-box;
  background-clip: padding-box, border-box;
  box-shadow: inset 0 0 16px rgba(57,255,20,0.15);
}
.counter-label { font-size: 13px; color: var(--text-dim); min-width: 70px; font-weight: 600; }
.counter-controls { display: flex; align-items: center; gap: 6px; }
.counter-num { font-family: Cinzel, serif; font-size: 20px; font-weight: 700; min-width: 28px; text-align: center; }
.counter-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-dim); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.counter-btn:hover { color: var(--text); border-color: var(--border-bright); }
.counter-clear {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid var(--border); background: none;
  color: var(--text-dim); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-left: 4px; transition: all 0.15s; opacity: 0.5;
}
.counter-clear:hover { opacity: 1; color: #ff4444; border-color: #ff4444; }

/* Counter add buttons (when all counters are 0) */
.counter-add-btn {
  flex: 1;
  padding: 12px 8px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 28px;
  text-align: center;
  transition: all 0.2s;
  position: relative;
}
.counter-add-btn:hover { border-color: var(--border-bright); color: var(--text); transform: scale(1.05); }
.counter-add-btn.poison-add:hover { border-color: #39ff14; box-shadow: 0 0 12px rgba(57,255,20,0.3); }
.counter-add-btn.energy-add:hover { border-color: #ffd700; box-shadow: 0 0 12px rgba(255,215,0,0.3); }
.counter-add-btn.experience-add:hover { border-color: #f0f0f0; box-shadow: 0 0 12px rgba(240,240,240,0.2); }
.counter-add-btn.rad-add:hover { border-color: #ffd700; box-shadow: 0 0 12px rgba(57,255,20,0.3); }
/* Tooltip for counter add buttons */
.counter-add-btn::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--text-dim);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.counter-add-btn:hover::after { opacity: 1; }

/* Commander damage grid */
.turn-hq-cmdr-dmg { display: flex; flex-direction: column; gap: 4px; }
.cmdr-dmg-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
}
.cmdr-dmg-source {
  font-size: 11px;
  min-width: 50px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cmdr-dmg-bar {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}
.cmdr-dmg-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
  background: var(--mtg-r);
}
.cmdr-dmg-num {
  font-family: Cinzel, serif;
  font-size: 14px;
  font-weight: 700;
  min-width: 24px;
  text-align: right;
}
.cmdr-dmg-row.lethal { background: rgba(211,32,42,0.15); border-color: rgba(211,32,42,0.4); }
.cmdr-dmg-row.lethal .cmdr-dmg-num { color: var(--mtg-r); }

/* Damage dealt/taken stats */
.turn-hq-damage-stats {
  display: flex;
  gap: 8px;
  padding: 6px 0;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.dmg-stat {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 11px;
}
.dmg-stat.dealt { border-color: rgba(211,32,42,0.25); }
.dmg-stat.taken { border-color: rgba(0,126,255,0.25); }
.dmg-label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-size: 9px; }
.dmg-stat.dealt .dmg-val { color: var(--mtg-r); font-weight: 700; font-family: Cinzel, serif; font-size: 14px; }
.dmg-stat.taken .dmg-val { color: var(--mtg-u); font-weight: 700; font-family: Cinzel, serif; font-size: 14px; }

/* Seat card life overlay (in compact roster) */
.seat-life-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 4px 0 2px;
}
.seat-life-num {
  font-family: Cinzel, serif;
  font-size: 22px;
  font-weight: 900;
  min-width: 36px;
  text-align: center;
  line-height: 1;
}
.seat-life-btn {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(10,10,14,0.8);
  color: var(--text-dim); font-size: 13px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.seat-life-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
.seat-status-badges {
  display: flex;
  gap: 3px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 2px;
  font-size: 10px;
}
.seat-badge {
  padding: 1px 4px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.5);
  white-space: nowrap;
  line-height: 1.3;
}
.seat-badge.poison { border-color: rgba(57,255,20,0.4); color: #39ff14; }
.seat-badge.energy { border-color: rgba(255,215,0,0.4); color: #ffd700; }
.seat-badge.experience { border-color: rgba(240,240,240,0.3); color: #f0f0f0; }
.seat-badge.rad { border-color: rgba(57,255,20,0.4); color: #39ff14; }
.seat-badge.monarch { border-color: rgba(201,168,73,0.4); color: var(--mtg-gold); }
.seat-badge.initiative { border-color: rgba(0,126,255,0.4); color: var(--mtg-u); }
.seat-badge.city { border-color: rgba(155,89,182,0.4); color: #b97aff; }
.seat-badge.cmdr-warn { border-color: rgba(211,32,42,0.4); color: var(--mtg-r); font-weight: 700; }

/* Turn HQ sticky footer */
.turn-hq-footer {
  position: sticky;
  bottom: 0;
  z-index: 5;
  background: linear-gradient(transparent, rgba(10,10,14,0.95) 20%);
  padding: 16px 0 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: auto;
}
.turn-hq-footer-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-sm);
  font-family: Cinzel, serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  border: 2px solid;
  transition: all 0.15s;
  text-transform: uppercase;
}
.turn-hq-footer-btn.next-turn {
  background: rgba(27,186,1,0.12);
  border-color: rgba(27,186,1,0.4);
  color: var(--green);
}
.turn-hq-footer-btn.next-turn:hover { background: rgba(27,186,1,0.2); border-color: var(--green); }
.turn-hq-footer-btn.pause {
  background: rgba(255,255,255,0.04);
  border-color: var(--border);
  color: var(--text-dim);
  font-size: 12px;
  padding: 8px;
}
.turn-hq-footer-btn.pause:hover { color: var(--text); border-color: var(--border-bright); }
.turn-hq-footer-btn.resume {
  background: rgba(0,126,255,0.12);
  border-color: rgba(0,126,255,0.4);
  color: var(--blue);
  font-size: 12px;
  padding: 8px;
}
.turn-hq-footer-btn.resume:hover { background: rgba(0,126,255,0.2); border-color: var(--blue); }

/* Game Log Drawer — slides out from right edge of left panel */
.log-drawer-handle {
  position: fixed;
  left: 320px;
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 64px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 8px 8px 0;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  z-index: 20;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
  writing-mode: vertical-rl;
  letter-spacing: 1px;
  font-size: 10px;
  font-family: Cinzel, serif;
  font-weight: 600;
  text-transform: uppercase;
}
.log-drawer-handle:hover { color: var(--orange); border-color: var(--orange); background: var(--surface-hover); }
.log-drawer-handle.active { color: var(--orange); border-color: var(--orange); }

.log-drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 15;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.log-drawer-overlay.open { opacity: 1; pointer-events: auto; }

.log-drawer {
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  width: 280px;
  background: rgba(10,10,14,0.97);
  border-right: 1px solid var(--border);
  z-index: 16;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
  backdrop-filter: blur(12px);
  visibility: hidden;
}
.log-drawer.open { transform: translateX(320px); visibility: visible; }
.log-drawer-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.log-drawer-title {
  font-family: Cinzel, serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text);
}
.log-drawer-close {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 12px;
}
.log-drawer-close:hover { color: var(--text); border-color: var(--border-bright); }
.log-drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
}
.log-turn-block {
  padding: 8px 10px;
  margin-bottom: 6px;
  background: rgba(255,255,255,0.02);
  border-radius: 6px;
}
.log-turn-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.log-turn-label {
  font-family: Cinzel, serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  min-width: 28px;
}
.log-turn-player {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}
.log-turn-dur {
  font-size: 10px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}
.log-turn-event {
  font-size: 11px;
  color: var(--text-mid);
  padding: 2px 0 2px 34px;
}

/* ---- SEATING CHART (in-game right panel for most modes) ---- */
.seating-chart {
  position: relative;
  width: 100%;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.seating-inner {
  position: relative;
  width: 100%;
  max-width: 850px;
  aspect-ratio: 4/3;
  max-height: 65vh;
}

/* ---- TABLE SHAPE ---- */
.table-rect {
  position: absolute;
  border-radius: 20px;
  border: 2px solid rgba(201,168,73,0.25);
  background:
    radial-gradient(ellipse at 30% 20%, rgba(14,104,171,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(211,32,42,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(201,168,73,0.05) 0%, transparent 60%),
    linear-gradient(160deg, rgba(20,18,15,1) 0%, rgba(12,10,8,1) 100%);
  z-index: 0;
  overflow: hidden;
}
.table-rect::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 18px;
  /* Felt texture via noise-like repeating gradient */
  background:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(201,168,73,0.012) 2px, rgba(201,168,73,0.012) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(201,168,73,0.008) 2px, rgba(201,168,73,0.008) 4px);
  opacity: 0.8;
}
.table-rect::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 18px;
  border: 1px solid rgba(201,168,73,0.1);
  box-shadow:
    inset 0 0 80px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(201,168,73,0.03),
    0 0 40px rgba(201,168,73,0.06),
    0 4px 24px rgba(0,0,0,0.5);
  pointer-events: none;
}
.table-center {
  position: absolute;
  top: 25%; left: 20%;
  width: 60%; height: 50%;
  text-align: center;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 24px 0 12px;
}
.table-timer {
  font-family: 'Museo Slab', monospace;
  font-size: 44px;
  color: var(--text-dim);
  letter-spacing: 3px;
}
.table-timer.running { color: var(--green); }
.table-colors {
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: center;
  margin: auto;
}
.table-bracket-avg {
  font-size: 10px;
  color: var(--text-dim);
  font-family: Cinzel, serif;
  letter-spacing: 1px;
}
.table-first-hint {
  font-size: 17px;
  color: var(--text-dim);
  margin: 6px 0 4px;
  font-style: italic;
}
.table-first-hint.set {
  color: var(--mtg-gold);
  font-style: normal;
  font-weight: 600;
}
.table-controls {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.table-btn {
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 15px;
  font-family: Cinzel, serif;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid;
}
.table-btn.start {
  background: rgba(27,186,1,0.1);
  border-color: rgba(27,186,1,0.3);
  color: var(--green);
}
.table-btn.start:hover {
  background: rgba(27,186,1,0.2);
  border-color: var(--green);
}
.table-btn.stop {
  background: rgba(211,32,42,0.1);
  border-color: rgba(211,32,42,0.3);
  color: #D3202A;
}
.table-btn.stop:hover {
  background: rgba(211,32,42,0.2);
  border-color: #D3202A;
}
.table-btn.log {
  background: rgba(201,168,73,0.1);
  border-color: rgba(201,168,73,0.3);
  color: var(--mtg-gold);
}
.table-btn.log:hover {
  background: rgba(201,168,73,0.2);
  border-color: var(--mtg-gold);
}
.table-btn.reset {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.15);
  color: var(--text-dim);
}
.table-btn.reset:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.3);
  color: var(--text);
}
.table-btn.ready {
  background: rgba(27,186,1,0.15);
  border-color: rgba(27,186,1,0.4);
  color: var(--green);
  font-size: 14px;
  font-weight: 600;
  animation: readyPulse 1.5s ease-in-out infinite;
}
.table-btn.ready:hover {
  background: rgba(27,186,1,0.25);
  border-color: var(--green);
}
@keyframes readyPulse {
  0%, 100% { box-shadow: 0 0 8px rgba(27,186,1,0.2); }
  50% { box-shadow: 0 0 18px rgba(27,186,1,0.4); }
}
.table-btn.turn {
  background: rgba(0,126,255,0.15);
  border-color: rgba(0,126,255,0.4);
  color: var(--blue);
  font-weight: 600;
}
.table-btn.turn:hover {
  background: rgba(0,126,255,0.25);
  border-color: var(--blue);
}
.table-btn.pause {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.15);
  color: var(--text-mid);
}
.table-btn.pause:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text);
}
.table-btn.resume {
  background: rgba(27,186,1,0.15);
  border-color: rgba(27,186,1,0.4);
  color: var(--green);
  font-weight: 600;
  animation: readyPulse 1.5s ease-in-out infinite;
}
.table-btn.resume:hover {
  background: rgba(27,186,1,0.25);
  border-color: var(--green);
}
.table-turn-info {
  font-size: 12px;
  color: var(--text-mid);
  margin: 2px 0;
  min-height: 16px;
  font-family: Cinzel, serif;
  letter-spacing: 0.5px;
}
.table-turn-counter {
  font-size: 11px;
  color: var(--text-dim);
  font-family: Cinzel, serif;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 2px;
}

/* ---- SEAT NODE (player card) ---- */
.seat-node {
  position: absolute;
  transform: translate(-50%, -50%);
  text-align: center;
  border-radius: var(--radius);
  border: 2px solid var(--border);
  background: rgba(10,10,14,0.92);
  width: 240px;
  overflow: visible;
  transition: transform 0.15s, box-shadow 0.15s;
  z-index: 2;
  cursor: grab;
  user-select: none;
}
.seat-node:hover { z-index: 3; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
/* Planechase: shrink player cards ~20% so the plane card dominates */
.seating-chart.pc-mode .seat-node {
  transform: translate(-50%, -50%) scale(0.78);
}
.seating-chart.pc-mode .seat-node:hover {
  transform: translate(-50%, -50%) scale(0.82);
}
.seating-chart.ae-mode .seat-node {
  transform: translate(-50%, -50%) scale(0.58);
}
.seating-chart.ae-mode .seat-node:hover {
  transform: translate(-50%, -50%) scale(0.62);
}
.seating-chart.ae-mode .seat-node.villain-seat {
  transform: translate(-50%, -50%) scale(0.74);
}
.seating-chart.ae-mode .seat-node.villain-seat:hover {
  transform: translate(-50%, -50%) scale(0.78);
}
/* Archenemy bottom game bar */
.ae-game-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  background: rgba(6,6,10,0.85);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(201,168,73,0.15);
  flex-shrink: 0;
  min-height: 56px;
}
.ae-game-bar .ae-bar-timer {
  font-family: 'Museo Sans', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  min-width: 70px;
}
.ae-game-bar .ae-bar-timer.running { color: var(--green); }
.ae-game-bar .ae-bar-turn {
  font-size: 13px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.ae-game-bar .ae-bar-info {
  font-size: 15px;
  color: var(--text);
  flex: 1;
  font-weight: 600;
}
.ae-game-bar .ae-bar-controls {
  display: flex;
  gap: 8px;
}
.ae-rules-drawer {
  max-height: 0;
  overflow: hidden;

  background: rgba(6,6,10,0.92);
  border-top: 1px solid rgba(201,168,73,0.1);
}
.ae-rules-drawer.open {
  max-height: 400px;
}
.ae-rules-drawer-inner {
  padding: 14px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 24px;
}
.ae-rule-item {
  font-size: 14px;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
  align-items: baseline;
  flex: 1 1 45%;
  min-width: 280px;
  line-height: 1.4;
}
.ae-rule-num {
  color: #E88;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
}
.seat-node.dragging {
  opacity: 0.85;
  z-index: 10;
  cursor: grabbing;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  transition: none;
}
.seat-node.drop-target {
  border-color: var(--orange) !important;
  box-shadow: 0 0 20px rgba(230,114,1,0.3);
}
.seat-node.empty-slot {
  border: 2px dashed rgba(255,255,255,0.12);
  background: rgba(10,10,14,0.3);
  cursor: default;
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.seat-node.empty-slot.drop-target {
  border-color: var(--orange) !important;
  background: rgba(230,114,1,0.12);
  box-shadow: 0 0 20px rgba(230,114,1,0.25);
}
.seat-node.highlighted { border-color: var(--mtg-gold); }
.seat-node.spinner-active {
  border-color: var(--orange) !important;
  box-shadow: 0 0 24px rgba(230,114,1,0.5), 0 0 48px rgba(230,114,1,0.2);
  z-index: 8;
  transition: border-color 0.08s, box-shadow 0.08s;
}
.seat-node.first-player {
  border-color: var(--mtg-gold) !important;
  box-shadow: 0 0 20px rgba(201,168,73,0.5), 0 0 40px rgba(201,168,73,0.2);
}
.seat-node.first-bounce {
  animation: firstPlayerBounce 0.6s ease 3;
}
@keyframes firstPlayerBounce {
  0%, 100% { transform: translate(-50%,-50%) scale(1); }
  40% { transform: translate(-50%,-50%) scale(1.12); }
  60% { transform: translate(-50%,-50%) scale(0.97); }
}
.first-player-badge {
  position: absolute;
  top: -10px;
  right: -10px;
  background: var(--mtg-gold);
  color: #000;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  z-index: 9;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.seat-node.active-turn {
  box-shadow: 0 0 16px rgba(0,126,255,0.4), 0 0 32px rgba(0,126,255,0.15);

}
.seat-turn-timer {

  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.9);
  color: var(--text-dim);
  font-size: 11px;
  font-family: 'Museo Slab', monospace;
  padding: 1px 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  z-index: 9;
  white-space: nowrap;
  pointer-events: none;
}
.seat-turn-timer.active {
  color: var(--blue);
  border-color: rgba(0,126,255,0.4);
  background: rgba(0,10,30,0.9);
}
.seat-node-art {
  width: 100%;
  height: 140px;
  background-size: cover;
  background-position: center top;
  position: relative;
  overflow: hidden;
  border-radius: var(--radius) var(--radius) 0 0;
}
.seat-node-art::after {
  content: '';

  inset: 0;
  background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.85) 100%);
}
.seat-node-art .seat-node-name {
  position: absolute;
  bottom: 6px;
  left: 10px;
  right: 10px;
  z-index: 1;
}
.seat-node-body {
  padding: 8px 14px 14px;
  background: rgba(10,10,14,0.95);
  border-radius: 0 0 var(--radius) var(--radius);
  position: relative;
}
.seat-node-name {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.seat-node-deck {
  font-size: 13px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}
.seat-node-mana { display: flex; gap: 3px; justify-content: center; margin-bottom: 4px; }
.seat-node-mana .mana-pip { width: 20px; height: 20px; }
.seat-node-bracket {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  border: 1px solid var(--border);
  background: var(--surface);
  margin-bottom: 4px;
}
/* Plays count — large bottom right, Cinzel font */
.seat-node-plays {
  position: absolute;
  bottom: 6px;
  right: 10px;
  font-family: 'Cinzel', serif;
  font-size: 28px;
  font-weight: 700;
  color: rgba(255,255,255,0.18);
  line-height: 1;
}
/* Wins count — large bottom left, gold, only shown if wins > 0 */
.seat-node-wins {
  position: absolute;
  bottom: 6px;
  left: 10px;
  font-family: 'Cinzel', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--mtg-gold);
  line-height: 1;
  text-shadow: 0 0 12px rgba(201,168,73,0.3);
}
.seat-node-role {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}
/* Legacy cpip fallback */
.seat-node-pips { display: flex; gap: 2px; justify-content: center; }
.seat-node-pips .cpip { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }

/* Table shape SVG lines */
.seating-lines {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}
.seating-lines line {
  stroke: var(--border);
  stroke-width: 1;
}

/* Center label (legacy — used by star/kingdoms/etc) */
.seating-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 1;
}
.seating-center-icon {
  font-size: 28px;
  margin-bottom: 2px;
}
.seating-center-label {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* Variant-specific in-game: split layout for mechanical modes */
.ingame-split {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 0;
  height: 100%;
}
.ingame-split.full-width { grid-template-columns: 1fr; }
.ingame-split > .seating-chart { max-width: none; }
.ingame-split > div:last-child {
  /* Mechanics panel — contained, scrollable, with backdrop */
  background: rgba(6,6,10,0.92);
  backdrop-filter: blur(8px);
  border-left: 1px solid var(--border);
  padding: 16px;
  overflow-y: auto;
  position: relative;
}

/* Team card for 2HG */
.team-node {
  position: absolute;
  transform: translate(-50%, -50%);
  text-align: center;
  padding: 10px 14px;
  border-radius: var(--radius);
  border: 2px solid;
  background: var(--surface);
  min-width: 120px;
  max-width: 160px;
  z-index: 2;
}
.team-label {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

/* 2HG Team badge on seat node */
.seat-team-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  z-index: 5;
  font-size: 10px;
  font-weight: 800;
  font-family: 'Cinzel', serif;
  padding: 2px 6px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

/* 2HG Team Picker */
.team-picker { display: flex; flex-direction: column; gap: 6px; }
.team-picker-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
}
.team-picker-name { flex: 1; font-size: 14px; font-weight: 600; }
.team-picker-btns { display: flex; gap: 4px; }
.team-picker-btn {
  width: 36px; height: 28px; border-radius: 6px; border: 2px solid;
  font-family: 'Cinzel', serif; font-size: 11px; font-weight: 800;
  cursor: pointer; transition: all 0.15s; background: transparent; color: var(--text-dim);
}
.team-picker-btn.active {
  color: #000; transform: scale(1.1);
}

.team-picker-summary {
  display: flex; gap: 12px; justify-content: center; margin-top: 10px; flex-wrap: wrap;
}
.team-picker-team {
  text-align: center; padding: 8px 16px; border-radius: 8px;
  border: 2px solid; min-width: 100px;
}
.team-picker-team-label {
  font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;
  letter-spacing: 1px; margin-bottom: 4px;
}
.team-picker-team-members { font-size: 12px; }
.team-picker-vs {
  font-family: 'Cinzel', serif; color: var(--text-dim);
  font-size: 16px; font-weight: 700; align-self: center;
}

/* 2HG Team banner in Turn HQ */
.turn-hq-team-banner {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid;
  margin-bottom: 6px;
  text-align: center;
}
.team-member-chip {
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  min-width: 80px;
}
.team-member-chip:hover { background: rgba(255,255,255,0.08); }
.team-member-chip.active { border-color: var(--chip-color); background: rgba(255,255,255,0.06); box-shadow: 0 0 8px rgba(255,255,255,0.05); }

/* Star kill-target badge on seats */
.seat-kill-target {
  font-size: 9px;
  color: #D3202A;
  text-align: center;
  margin-top: 2px;
  letter-spacing: 0.5px;
}

/* Archenemy hard mode toggle */
.ae-hard-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 8px 0;

  color: var(--text-dim);
}
.ae-hard-toggle label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
.ae-hard-toggle input[type="checkbox"] { accent-color: #D3202A; }

/* Planechase table center — plane card IS the table */
.pc-table-center {
  display: block !important;
  gap: 0 !important;
  padding: 0 !important;

  left: 6% !important;
  width: 88% !important;
  height: 96% !important;
  overflow: visible !important;
}
.pc-table-layout {
  display: grid;
  grid-template-columns: 90px 1fr 90px;
  gap: 6px;
  align-items: center;
  width: 100%;
  height: 100%;
}
.pc-table-rail {
  display: flex;
  flex-direction: column;
  gap: 5px;
  align-items: center;
  justify-content: center;
}
.pc-table-card-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
}
.pc-table-card {
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid rgba(155,89,182,0.35);

}
.pc-table-card.phenomenon {
  border-color: rgba(201,168,73,0.5);
  box-shadow: 0 4px 30px rgba(201,168,73,0.3), 0 0 60px rgba(201,168,73,0.12);
}
.pc-table-card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.pc-table-die {
  width: 52px;
  height: 52px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: #111;
  border: 2px solid #444;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  transition: all 0.2s;
  user-select: none;
}
.pc-table-die:hover { transform: scale(1.1); border-color: rgba(155,89,182,0.5); box-shadow: 0 4px 16px rgba(155,89,182,0.2); }
.pc-table-die:active { transform: scale(0.9); }
.pc-table-die.rolling { animation: dieRoll 0.5s ease-in-out; }
/* Taller side-rail buttons for Planechase */
.pc-table-rail .mode-btn,
.pc-table-rail .table-btn {
  padding: 8px 10px !important;
  font-size: 12px !important;
  min-height: 36px;
}
.pc-table-timer {
  font-family: 'Museo Slab', monospace;
  font-size: 24px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-align: center;
  margin-bottom: 4px;
}
.pc-table-timer.running { color: var(--green); }
/* Plane info overlay — top-right readable text */
.pc-plane-info {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 20;
  max-width: 340px;
  background: rgba(6,6,10,0.88);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(155,89,182,0.3);
  border-radius: 12px;
  padding: 14px 18px;

}
.pc-plane-info-name {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  color: var(--mtg-gold);
  margin-bottom: 3px;
}
.pc-plane-info-type {
  font-size: 12px;
  color: rgba(155,89,182,0.7);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.pc-plane-info-text {
  font-size: 14px;
  color: var(--text-mid);
  line-height: 1.6;
  white-space: pre-wrap;
}
.pc-plane-info-text::-webkit-scrollbar { width: 3px; }
.pc-plane-info-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.pc-plane-info-sep {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(155,89,182,0.4), transparent);
  margin: 8px 0;
}
.pc-rules-box {
  position: absolute;
  bottom: 8px;
  right: 8px;
  z-index: 20;
  max-width: 360px;
  pointer-events: auto;
}
.pc-rules-toggle {
  background: rgba(6,6,10,0.75);
  backdrop-filter: blur(8px);

  height: 32px;

  align-items: center;

}
.pc-rules-toggle:hover { color: var(--mtg-gold); border-color: var(--mtg-gold); }
.pc-rules-body {
  background: rgba(6,6,10,0.92);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(155,89,182,0.3);
  border-radius: 12px;
  padding: 14px 16px;
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-mid);
  line-height: 1.7;
}
.pc-rules-body .pc-rule-item {
  padding: 3px 0;
  display: flex;
  gap: 6px;
}
.pc-rules-body .pc-rule-num {
  color: rgba(155,89,182,0.6);
  font-size: 10px;
  min-width: 14px;
  text-align: right;
  margin-top: 1px;
}
.pc-travel-toggle {
  font-size: 10px;
  color: rgba(155,89,182,0.7);
  text-align: center;
  margin-top: 8px;
  cursor: pointer;
  padding: 3px 0;
  border-top: 1px solid rgba(155,89,182,0.15);
  transition: color 0.2s;
}
.pc-travel-toggle:hover { color: var(--mtg-gold); }
.pc-travel-log {
  max-height: 180px;
  overflow-y: auto;
  margin-top: 4px;
}
.pc-travel-log::-webkit-scrollbar { width: 3px; }
.pc-travel-log::-webkit-scrollbar-thumb { background: rgba(155,89,182,0.25); border-radius: 2px; }
.pc-travel-entry {
  padding: 4px 6px;
  border-left: 2px solid rgba(155,89,182,0.15);

}
.pc-travel-plane {
  font-size: 10px;
  color: var(--text-mid);

}
.pc-travel-meta {

  color: var(--text-dim);
  margin-top: 1px;
}
.pc-log-tag {
  display: inline-block;

  padding: 0 4px;

  letter-spacing: 0.5px;
}
.pc-log-tag.start { background: rgba(155,89,182,0.25); color: rgba(155,89,182,0.9); }
.pc-phenom-overlay {

  justify-content: center;
}
.pc-phenom-overlay.open { display: flex; }
.pc-phenom-dialog {
  background: linear-gradient(135deg, #1a1028 0%, #0f0f18 100%);

  border-radius: 16px;

  width: 90%;
  padding: 28px 28px 24px;
  text-align: center;
  box-shadow: 0 0 80px rgba(155,89,182,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
}
.pc-phenom-icon { font-size: 42px; margin-bottom: 8px; }
.pc-phenom-title {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  color: var(--mtg-gold);
  margin-bottom: 4px;
}
.pc-phenom-type {
  font-size: 11px;
  color: rgba(155,89,182,0.7);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 16px;
}
.pc-phenom-sep {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(155,89,182,0.4), transparent);
  margin: 14px 0;
}
.pc-phenom-text {
  font-size: 15px;
  color: var(--text-mid);
  line-height: 1.7;
  text-align: left;
  white-space: pre-wrap;
  margin-bottom: 6px;
}
.pc-phenom-hint {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
  margin-top: 12px;
}
.pc-phenom-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;

.pc-phenom-btns button {

/* Variant overlay bar — floating controls at bottom of full-width table */

  position: absolute;

  left: 0;
  right: 0;
  z-index: 10;
  background: linear-gradient(to top, rgba(6,6,10,0.95) 0%, rgba(6,6,10,0.85) 70%, transparent 100%);

  max-width: 900px;

/* Deck Select Styles */

}
.deckselect-card {

}

/* Scryfall Search */
.scryfall-search { position: relative; margin-top: 10px; }

<script>
/* ============================================
   Game Night Engine
   ============================================ */

// ---- COLOR MAPS ----
const COLOR_MAP = { White:'W', Blue:'U', Black:'B', Red:'R', Green:'G', Colorless:'C' };
const COLOR_HEX = { W:'#F9FAF4', U:'#0E68AB', B:'#4A3728', R:'#D3202A', G:'#00733E', C:'#CAC5C0' };

// ---- MANA SYMBOL RENDERING ----
const MANA_SVG_BASE = 'https://svgs.scryfall.io/card-symbols/';
function manaImg(symbol, size) {
  // symbol: 'W','U','B','R','G','C' etc.  size: px number (default 16)
  const s = size || 16;
  return `<img src="${MANA_SVG_BASE}${symbol}.svg" alt="{${symbol}}" width="${s}" height="${s}" style="vertical-align:middle;display:inline-block" class="mana-pip" onerror="this.style.display='none'">`;
}
function manaPips(colorsArr, size) {
  // Takes an array like ['W','U','B'] and returns inline mana symbol HTML
  if (!colorsArr || !colorsArr.length) return '';
  return colorsArr.map(c => manaImg(c, size)).join('');
}
function renderManaCost(costStr, size) {
  // Parses MTG mana cost string like "{3}{U}{B}" or "{X}{2}{G}{G}" into Scryfall SVG symbols
  // Also supports Scryfall notation: numbers (0-20), X, W, U, B, R, G, C, hybrid (W/U), phyrexian (W/P), etc.
  if (!costStr) return '';
  const s = size || 20;
  const symbols = [];
  const regex = /\{([^}]+)\}/g;
  let match;
  while ((match = regex.exec(costStr)) !== null) {
    symbols.push(match[1]);
  }
  if (symbols.length === 0) return '';
  return symbols.map(sym => {
    // Scryfall SVG naming: numbers as-is, colors as-is, hybrid uses slash (e.g. "W/U" → "WU.svg" won't work)
    // For hybrid: {W/U} → symbol "W%2FU" in URL. Scryfall actually uses the slash in the filename.
    const fileName = sym.replace('/', '%2F');
    return `<img src="${MANA_SVG_BASE}${fileName}.svg" alt="{${sym}}" width="${s}" height="${s}" style="vertical-align:middle;display:inline-block" class="mana-pip" onerror="this.style.display='none'">`;
  }).join('');
}
function getDeckRecord(deckId) {
  const games = DATA.games.games;
  const total = games.filter(g => g.players.some(p => p.deckId === deckId)).length;
  const wins = games.filter(g => g.players.some(p => p.deckId === deckId && p.deckId === g.winningDeck)).length;
  return { wins, losses: total - wins, total };
